      <script>
       let currentUser = null;
       const element = {}
       let myTableInstance = null;
       let currentTableData = [];
       let tableState = null;
       let tableOptions = null;
       let updateDOM = null;
       let chartStatusObj = null;
       let chartBranchObj = null;
       let chartTopicObj = null;
       let chartMonthObj = null;

       function handleLogin(e) {
           e.preventDefault();
           const btn = e.target.querySelector('button');
           const originalText = btn.innerHTML;
           btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> กำลังตรวจสอบ...';
           btn.disabled = true;
           
           google.script.run
               .withSuccessHandler(res => {
                   btn.innerHTML = originalText;
                   btn.disabled = false;
                   if (res.success) {
                       currentUser = res;
                       localStorage.setItem('shiftF2User', JSON.stringify(res));
                       localStorage.setItem('shiftF2LoginTime', new Date().getTime().toString());
                       
                       document.getElementById('login-container').classList.add('hidden');
                       document.getElementById('app-container').classList.remove('hidden');
                       
                       applyRolePermissions();
                       
                       Swal.fire({
                           toast: true,
                           position: 'top-end',
                           icon: 'success',
                           title: `ยินดีต้อนรับ ${res.name} (${res.role})`,
                           showConfirmButton: false,
                           timer: 3000
                       });
                       
                       if(myTableInstance && updateDOM) updateDOM();
                   } else {
                       Swal.fire('เข้าสู่ระบบไม่สำเร็จ', res.message, 'error');
                   }
               })
               .withFailureHandler(err => {
                   btn.innerHTML = originalText;
                   btn.disabled = false;
                   Swal.fire('ข้อผิดพลาด', err.message, 'error');
               })
               .checkLogin(document.getElementById('username').value, document.getElementById('password').value);
       }

       function applyRolePermissions() {
           if (currentUser && currentUser.role === 'แอดมิน') {
               document.getElementById('btnViewSettings').classList.remove('d-none');
               document.getElementById('btnViewSettings').classList.add('d-flex');
           } else {
               document.getElementById('btnViewSettings').classList.remove('d-flex');
               document.getElementById('btnViewSettings').classList.add('d-none');
           }
       }

       function handleLogout() {
           Swal.fire({
               title: 'ยืนยันการออกจากระบบ?',
               text: "คุณต้องการออกจากระบบใช่หรือไม่?",
               icon: 'question',
               showCancelButton: true,
               confirmButtonColor: '#2563eb',
               cancelButtonColor: '#d33',
               confirmButtonText: 'ใช่, ออกจากระบบ',
               cancelButtonText: 'ยกเลิก'
           }).then((result) => {
               if (result.isConfirmed) {
                   currentUser = null;
                   localStorage.removeItem('shiftF2User');
                   localStorage.removeItem('shiftF2LoginTime');
                   
                   // Reset UI views
                   document.getElementById('app-container').classList.add('hidden');
                   document.getElementById('login-container').classList.remove('hidden');
                   
                   // Make sure dashboard and table containers reset if needed, or leave them as is since app-container hides all
                   
                   // Clear inputs
                   document.getElementById('username').value = '';
                   document.getElementById('password').value = '';
                   
                   Swal.fire({
                       toast: true,
                       position: 'top-end',
                       icon: 'success',
                       title: 'ออกจากระบบเรียบร้อยแล้ว',
                       showConfirmButton: false,
                       timer: 2000
                   });
               }
           });
       }
       function checkSession() {
           const storedUser = localStorage.getItem('shiftF2User');
           const loginTime = localStorage.getItem('shiftF2LoginTime');
           
           if (storedUser && loginTime) {
               const now = new Date().getTime();
               const daysPassed = (now - parseInt(loginTime)) / (1000 * 60 * 60 * 24);
               if (daysPassed < 120) {
                   currentUser = JSON.parse(storedUser);
                   document.getElementById('login-container').classList.add('hidden');
                   document.getElementById('app-container').classList.remove('hidden');
                   applyRolePermissions();
                   return;
               } else {
                   localStorage.removeItem('shiftF2User');
                   localStorage.removeItem('shiftF2LoginTime');
               }
           }
           
           document.getElementById('login-container').classList.remove('hidden');
           document.getElementById('app-container').classList.add('hidden');
       }
       
       document.addEventListener('DOMContentLoaded',pageLoad)
       function pageLoad(){
          checkSession();
          element.alerts = document.getElementById("alerts");
          element.search = document.getElementById("search");

          // Toggles
          document.getElementById('btnViewTable').addEventListener('click', () => {
              document.getElementById('table-container').classList.remove('hidden');
              document.getElementById('dashboard-container').classList.add('hidden');
              document.getElementById('settings-container').classList.add('hidden');
              
              document.getElementById('btnViewTable').classList.add('bg-slate-100', 'shadow-sm', 'text-green-700');
              document.getElementById('btnViewTable').classList.remove('text-slate-500', 'hover:text-slate-700');
              
              document.getElementById('btnViewChart').classList.remove('bg-slate-100', 'shadow-sm', 'text-green-700');
              document.getElementById('btnViewChart').classList.add('text-slate-500', 'hover:text-slate-700');

              document.getElementById('btnViewSettings').classList.remove('bg-slate-100', 'shadow-sm', 'text-green-700');
              document.getElementById('btnViewSettings').classList.add('text-slate-500', 'hover:text-slate-700');
           });

          document.getElementById('btnViewChart').addEventListener('click', () => {
              document.getElementById('table-container').classList.add('hidden');
              document.getElementById('dashboard-container').classList.remove('hidden');
              document.getElementById('settings-container').classList.add('hidden');
              
              document.getElementById('btnViewChart').classList.add('bg-slate-100', 'shadow-sm', 'text-green-700');
              document.getElementById('btnViewChart').classList.remove('text-slate-500', 'hover:text-slate-700');
              
              document.getElementById('btnViewTable').classList.remove('bg-slate-100', 'shadow-sm', 'text-green-700');
              document.getElementById('btnViewTable').classList.add('text-slate-500', 'hover:text-slate-700');

              document.getElementById('btnViewSettings').classList.remove('bg-slate-100', 'shadow-sm', 'text-green-700');
              document.getElementById('btnViewSettings').classList.add('text-slate-500', 'hover:text-slate-700');
              
              if(chartStatusObj) window.dispatchEvent(new Event('resize'));
          });

          element.search.addEventListener("input", searchData)
          
          // Status Tabs Logic
          document.querySelectorAll('.tab-btn').forEach(btn => {
              btn.addEventListener('click', (e) => {
                  // Update Active State
                  document.querySelectorAll('.tab-btn').forEach(b => {
                      b.classList.remove('border-green-500', 'text-green-600', 'font-semibold');
                      b.classList.add('border-transparent', 'text-slate-500', 'font-medium');
                  });
                  e.currentTarget.classList.remove('border-transparent', 'text-slate-500', 'font-medium');
                  e.currentTarget.classList.add('border-green-500', 'text-green-600', 'font-semibold');
                  
                  // Filter Table
                  if (myTableInstance) {
                      const val = e.currentTarget.getAttribute('data-val');
                      if (val) {
                          tableState.columnFilters = [{ id: 'สถานะ', value: val }];
                      } else {
                          tableState.columnFilters = [];
                      }
                      myTableInstance.setOptions(tableOptions);
                      if(updateDOM) updateDOM();
                  }
              });
          });

         loadData()

         google.script.run.withSuccessHandler(function(data) {
             const topicSelect = document.getElementById('topicSelect');
             if(topicSelect) {
                 data.topics.forEach(function(topic) {
                    const opt = document.createElement('option');
                    opt.value = topic;
                    opt.innerHTML = topic;
                    topicSelect.appendChild(opt);
                 });
             }
             
             const branchSelect = document.getElementById('branchSelect');
             if(branchSelect) {
                 data.locations.forEach(function(loc) {
                    const opt = document.createElement('option');
                    opt.value = loc;
                    opt.innerHTML = loc;
                    branchSelect.appendChild(opt);
                 });
             }

             $('#topicSelect').select2({
                 theme: 'bootstrap-5',
                 dropdownParent: $('#staticBackdrop2'),
                 width: '100%',
                 placeholder: '-- กรุณาเลือกเรื่อง --'
             });
             $('#branchSelect').select2({
                 theme: 'bootstrap-5',
                 dropdownParent: $('#staticBackdrop2'),
                 width: '100%',
                 placeholder: '-- กรุณาเลือกสาขา --'
             });

    const loadingToast = Swal.fire({
        toast: true,
        position: 'top-end',
        title: 'กำลังโหลดข้อมูล...',
        showConfirmButton: false,

            Swal.showLoading();
        }
    });

    google.script.run
    .withSuccessHandler((tabledata)=>{
        renderTanStackTable(tabledata);
        renderCharts(tabledata);
        updateSummaryCards(tabledata);
        loadingToast.close();
    })
    .withFailureHandler((er)=>{
        loadingToast.close();
        Swal.fire({
            toast: true,
            position: 'top-end',
            icon: 'error',

  }

function updateSummaryCards(data) {
    if (!data) return;
    let counts = { "อนุมัติ": 0, "ไม่อนุมัติ": 0, "รออนุมัติ": 0, "ทั้งหมด": data.length };
    data.forEach(row => {
        const status = row['สถานะ'] || "รออนุมัติ";
        if (counts[status] !== undefined) counts[status]++;
    });
    
    const elAll = document.getElementById("sum-all");
    const elPending = document.getElementById("sum-pending");
    const elApproved = document.getElementById("sum-approved");
    const elRejected = document.getElementById("sum-rejected");
    
    if (elAll) elAll.textContent = counts["ทั้งหมด"];
    if (elPending) elPending.textContent = counts["รออนุมัติ"];
    if (elApproved) elApproved.textContent = counts["อนุมัติ"];
    if (elRejected) elRejected.textContent = counts["ไม่อนุมัติ"];
}

function renderCharts(data) {
    if (!data || data.length === 0) return;
    
    let statusCounts = { "อนุมัติ": 0, "ไม่อนุมัติ": 0, "รออนุมัติ": 0 };
    let branchCounts = {};
    let topicCounts = {};
    let monthCounts = {};
    
    data.forEach(row => {
        const status = row['สถานะ'] || "รออนุมัติ";
        const branch = row['สาขา'] || "ไม่ระบุ";
        const topic = row['เรื่อง'] || "ไม่ระบุ";
        
        let sortKey = "";
        let monthName = "";
        const idTimestamp = parseInt(row['ID'] || row['Timestamp'] || row['ประทับเวลา'] || 0);
        if(idTimestamp > 1000000000000) {
            const d = new Date(idTimestamp);
            const m = d.getMonth();
            const y = d.getFullYear();
            const thaiMonths = ["ม.ค.","ก.พ.","มี.ค.","เม.ย.","พ.ค.","มิ.ย.","ก.ค.","ส.ค.","ก.ย.","ต.ค.","พ.ย.","ธ.ค."];
            monthName = thaiMonths[m] + " " + (y+543).toString().substring(2);
            sortKey = `${y}-${(m+1).toString().padStart(2, '0')}`;
        } else if (row['Timestamp'] || row['ประทับเวลา']) {
            const dateStr = row['Timestamp'] || row['ประทับเวลา'];
            const d = new Date(dateStr);
            if(!isNaN(d)) {
                const m = d.getMonth();
                const y = d.getFullYear();
                const thaiMonths = ["ม.ค.","ก.พ.","มี.ค.","เม.ย.","พ.ค.","มิ.ย.","ก.ค.","ส.ค.","ก.ย.","ต.ค.","พ.ย.","ธ.ค."];
                monthName = thaiMonths[m] + " " + (y+543).toString().substring(2);
                sortKey = `${y}-${(m+1).toString().padStart(2, '0')}`;
            }
        }
        
        if(statusCounts[status] !== undefined) statusCounts[status]++;
        else statusCounts[status] = 1;
        
        branchCounts[branch] = (branchCounts[branch] || 0) + 1;
        topicCounts[topic] = (topicCounts[topic] || 0) + 1;
        
        if(sortKey) {
            if(!monthCounts[sortKey]) monthCounts[sortKey] = { name: monthName, count: 0 };
            monthCounts[sortKey].count++;
        }
    });

    const statusOptions = {
        series: [statusCounts["อนุมัติ"], statusCounts["ไม่อนุมัติ"], statusCounts["รออนุมัติ"]],
        labels: ["อนุมัติ", "ไม่อนุมัติ", "รออนุมัติ"],
        chart: { type: 'donut', height: 320, fontFamily: 'Kanit, sans-serif' },
        colors: ['#16a34a', '#dc2626', '#eab308'],
        plotOptions: { donut: { size: '65%' } },
        dataLabels: { enabled: true, formatter: function (val, opts) { return opts.w.globals.seriesTotals[opts.seriesIndex] } },
        legend: { position: 'bottom' },
        stroke: { show: true, width: 2, colors: ['transparent'] }
    };
    
    if (chartStatusObj) {
        chartStatusObj.updateOptions(statusOptions);
    } else {
        chartStatusObj = new ApexCharts(document.querySelector("#chart-status"), statusOptions);
        chartStatusObj.render();
    }

    const branchNames = Object.keys(branchCounts).sort((a,b) => branchCounts[b] - branchCounts[a]).slice(0, 10);
    const branchValues = branchNames.map(name => branchCounts[name]);

    const branchOptions = {
        series: [{ name: 'จำนวนคำขอ', data: branchValues }],
        chart: { type: 'bar', height: 320, fontFamily: 'Kanit, sans-serif', toolbar: { show: false } },
        colors: ['#0ea5e9'],
        plotOptions: { bar: { borderRadius: 6, horizontal: true, dataLabels: { position: 'top' } } },
        dataLabels: { enabled: true, offsetX: 20, style: { colors: ['#333'] } },
        xaxis: { categories: branchNames },
        grid: { strokeDashArray: 4 }
    };

    if (chartBranchObj) {
        chartBranchObj.updateOptions(branchOptions);
    } else {
        chartBranchObj = new ApexCharts(document.querySelector("#chart-branch"), branchOptions);
        chartBranchObj.render();
    }

    const topicNames = Object.keys(topicCounts).sort((a,b) => topicCounts[b] - topicCounts[a]);
    const topicValues = topicNames.map(name => topicCounts[name]);

    const topicOptions = {
        series: [{ name: 'จำนวนคำขอ', data: topicValues }],
        chart: { type: 'bar', height: 320, fontFamily: 'Kanit, sans-serif', toolbar: { show: false } },
        colors: ['#a855f7'],
        plotOptions: { bar: { borderRadius: 6, horizontal: true, dataLabels: { position: 'top' } } },
        dataLabels: { enabled: true, offsetX: 20, style: { colors: ['#333'] } },
        xaxis: { categories: topicNames },
        grid: { strokeDashArray: 4 }
    };

    if (chartTopicObj) {
        chartTopicObj.updateOptions(topicOptions);
    } else {
        chartTopicObj = new ApexCharts(document.querySelector("#chart-topic"), topicOptions);
        chartTopicObj.render();
    }

    // Render Month Timeline
    const sortedMonthKeys = Object.keys(monthCounts).sort();
    const monthNames = sortedMonthKeys.map(k => monthCounts[k].name);
    const monthValues = sortedMonthKeys.map(k => monthCounts[k].count);

    const monthOptions = {
        series: [{ name: 'จำนวนคำขอ', data: monthValues }],
        chart: { type: 'area', height: 320, fontFamily: 'Kanit, sans-serif', toolbar: { show: false } },
        colors: ['#f97316'],
        fill: { type: 'gradient', gradient: { shadeIntensity: 1, opacityFrom: 0.7, opacityTo: 0.1, stops: [0, 90, 100] } },
        dataLabels: { enabled: true, style: { colors: ['#333'] } },
        stroke: { curve: 'smooth', width: 3 },
        xaxis: { categories: monthNames },
        grid: { strokeDashArray: 4 }
    };

    if (chartMonthObj) {
        chartMonthObj.updateOptions(monthOptions);
    } else {
        chartMonthObj = new ApexCharts(document.querySelector("#chart-month"), monthOptions);
        chartMonthObj.render();
    }
}

    const { createTable, getCoreRowModel, getFilteredRowModel, getPaginationRowModel } = TableCore;

    if (!myTableInstance) {
        tableOptions = {
            data: currentTableData,
            columns,
            getCoreRowModel: getCoreRowModel(),
            getFilteredRowModel: getFilteredRowModel(),
            getPaginationRowModel: getPaginationRowModel(),
            globalFilterFn: (row, columnId, filterValue) => {
                const val = String(row.getValue(columnId) || "").toLowerCase();
                return val.includes(String(filterValue).toLowerCase());
            },
        };
        
        // 1. Create table to let it generate initialState
        myTableInstance = createTable(tableOptions);
        
        // 2. Extract default state and inject our overrides
        if (!tableState) {
            tableState = {
                ...myTableInstance.initialState,
                pagination: { pageIndex: 0, pageSize: 15 },
                globalFilter: '',
                columnFilters: [{ id: 'สถานะ', value: 'รออนุมัติ' }] // Default to Pending
            };
        }
        
        // 3. Setup state management and onStateChange
        tableOptions.state = tableState;
        tableOptions.onStateChange = (updater) => {
            tableState = typeof updater === 'function' ? updater(tableState) : updater;
            tableOptions.state = tableState;
            myTableInstance.setOptions(tableOptions);
            if(updateDOM) updateDOM();
        };
        
        // 4. Update the table with the fully controlled options
        myTableInstance.setOptions(tableOptions);
    } else {
        // Just update data and optionally global filter if it was changed
        tableOptions.data = currentTableData;
        tableOptions.state.globalFilter = element.search.value || '';
        // Don't overwrite columnFilters, keep whatever tableState has
        myTableInstance.setOptions(tableOptions);
    }

        return typeof comp === 'function' ? comp(props) : comp;
    }

    updateDOM = function() {

        myTableInstance.getHeaderGroups().forEach(headerGroup => {
            const tr = document.createElement('tr');

                const th = document.createElement('th');

                th.innerHTML = flexRender(header.column.columnDef.header, header.getContext());
                tr.appendChild(th);
            });
            thead.appendChild(tr);
        });

        tbody.innerHTML = '';
        const rows = myTableInstance.getRowModel().rows;
        if(rows.length === 0) {
            const tr = document.createElement('tr');

        } else {
            rows.forEach(row => {

                row.getVisibleCells().forEach(cell => {
                    const td = document.createElement('td');

                    td.className = `py-3 px-4 text-[14px] text-slate-800 text-left align-middle border-x border-slate-200 ${customClass}`;
                    td.innerHTML = flexRender(cell.column.columnDef.cell, cell.getContext());
                    tr.appendChild(td);
                });
                tbody.appendChild(tr);
            });
        }

        const totalRows = myTableInstance.getPrePaginationRowModel().rows.length;
        const pageCount = myTableInstance.getPageCount();
        const currentPage = myTableInstance.getState().pagination.pageIndex + 1;
        
        paginationEl.innerHTML = `
            <div class="text-sm text-gray-500 flex items-center">
                แสดง <span class="font-medium text-gray-900 mx-1">${myTableInstance.getRowModel().rows.length}</span> จาก <span class="font-medium text-gray-900 mx-1">${totalRows}</span> แถว
            </div>

                <select class="form-select border border-gray-300 rounded-md text-sm text-gray-700 bg-white shadow-sm outline-none px-2 py-1.5 focus:border-blue-500 focus:ring-1 focus:ring-blue-500 w-auto" id="pageSizeSelect">
                    ${[100, 200, 300, 500, 1000].map(size => `<option value="${size}" ${myTableInstance.getState().pagination.pageSize === size ? 'selected' : ''}>แสดง ${size}</option>`).join('')}
                </select>
                <button class="px-2 py-1.5 rounded-md border border-gray-300 bg-white text-gray-500 hover:bg-gray-50 hover:text-gray-700 transition-colors shadow-sm disabled:opacity-50 disabled:hover:bg-white" id="btnFirst" ${!myTableInstance.getCanPreviousPage() ? 'disabled' : ''}><i class="fa-solid fa-angles-left"></i></button>
                <button class="px-2 py-1.5 rounded-md border border-gray-300 bg-white text-gray-500 hover:bg-gray-50 hover:text-gray-700 transition-colors shadow-sm disabled:opacity-50 disabled:hover:bg-white" id="btnPrev" ${!myTableInstance.getCanPreviousPage() ? 'disabled' : ''}><i class="fa-solid fa-angle-left"></i></button>
                <span class="px-3 py-1.5 text-sm text-gray-900 font-medium bg-gray-100 rounded-md border border-gray-200">หน้า ${currentPage}/${pageCount || 1}</span>
                <button class="px-2 py-1.5 rounded-md border border-gray-300 bg-white text-gray-500 hover:bg-gray-50 hover:text-gray-700 transition-colors shadow-sm disabled:opacity-50 disabled:hover:bg-white" id="btnNext" ${!myTableInstance.getCanNextPage() ? 'disabled' : ''}><i class="fa-solid fa-angle-right"></i></button>
                <button class="px-2 py-1.5 rounded-md border border-gray-300 bg-white text-gray-500 hover:bg-gray-50 hover:text-gray-700 transition-colors shadow-sm disabled:opacity-50 disabled:hover:bg-white" id="btnLast" ${!myTableInstance.getCanNextPage() ? 'disabled' : ''}><i class="fa-solid fa-angles-right"></i></button>
            </div>

        document.getElementById('pageSizeSelect').addEventListener('change', e => {
            myTableInstance.setPageSize(Number(e.target.value));
        });
        document.getElementById('btnFirst').addEventListener('click', () => { myTableInstance.setPageIndex(0); });
        document.getElementById('btnPrev').addEventListener('click', () => { myTableInstance.previousPage(); });
        document.getElementById('btnNext').addEventListener('click', () => { myTableInstance.nextPage(); });
        document.getElementById('btnLast').addEventListener('click', () => { myTableInstance.setPageIndex(pageCount - 1); });

        document.querySelectorAll('.btn-expand').forEach(el => {

                const rowId = e.currentTarget.getAttribute('data-rowid');
                const row = myTableInstance.getRowModel().rows.find(r => r.id === rowId);
                
                if (row) {
                    let detailsHTML = `<div class="grid grid-cols-1 gap-4">`;
                    row.getAllCells().forEach(cell => {
                        if (cell.column.id !== 'expander' && cell.column.id !== 'ID') {
                            const headerText = cell.column.columnDef.header.replace(/<[^>]*>?/gm, '').trim(); 
                            const val = flexRender(cell.column.columnDef.cell, cell.getContext());
                            detailsHTML += `
                                <div class="flex flex-col border-b border-gray-100 pb-3">
                                    <span class="text-[13px] text-gray-500 font-medium mb-1">${headerText}</span>
                                    <span class="text-[15px] text-gray-900 font-medium break-words whitespace-normal">${val}</span>
                                </div>
                            `;
                        }
                    });
                    detailsHTML += `</div>`;
                    
                    document.getElementById('detailsModalBody').innerHTML = detailsHTML;
                    
                    document.getElementById('detailsModalBody').querySelectorAll('.status-editable').forEach(el => {
                        el.addEventListener('click', (e) => {
                            if(typeof currentUser !== 'undefined' && currentUser && currentUser.role === 'พนักงาน') {
                                Swal.fire('ไม่มีสิทธิ์', 'เฉพาะหัวหน้างานหรือแอดมินเท่านั้นที่สามารถเปลี่ยนสถานะได้', 'warning');
                                return;
                            }
                            // Close modal before opening sweetalert
                            const modalInstance = bootstrap.Modal.getInstance(document.getElementById('detailsModal'));
                            if(modalInstance) modalInstance.hide();
                            
                            handleStatusClick(e);
                        });
                    });

                    const modal = new bootstrap.Modal(document.getElementById('detailsModal'));
                    modal.show();
                }
            });
        });

        document.querySelectorAll('.status-editable').forEach(el => {
            el.addEventListener('click', (e) => {
                if(typeof currentUser !== 'undefined' && currentUser && currentUser.role === 'พนักงาน') {
                    Swal.fire('ไม่มีสิทธิ์', 'เฉพาะหัวหน้างานหรือแอดมินเท่านั้นที่สามารถเปลี่ยนสถานะได้', 'warning');
                    return;
                }
                handleStatusClick(e);
            });
        });
    };

    updateDOM();
}

function handleStatusClick(e) {
    const el = e.currentTarget;
    const id = el.getAttribute('data-id');
    const name = el.getAttribute('data-name');
    const currentVal = el.getAttribute('data-val');

    Swal.fire({
        title: 'เลือกสถานะ',
        input: 'select',
        inputOptions: {
            'อนุมัติ': 'อนุมัติ',
            'รออนุมัติ': 'รออนุมัติ',
            'ไม่อนุมัติ': 'ไม่อนุมัติ'
        },
        inputValue: currentVal,
        showCancelButton: true,
        confirmButtonText: 'ตกลง',
        cancelButtonText: 'ยกเลิก',
        confirmButtonColor: '#2563eb'
    }).then((result) => {
        if (result.isConfirmed) {
            const newVal = result.value;
            if(newVal !== currentVal) {
                updateStatusDirectly(id, name, 'สถานะ', newVal);
            }
        }
    });
}

        textAutoResize : false,
        textResizeFactor : 0.25,
        text : "กำลังบันทึก..." ,
    });
    google.script.run
    .withSuccessHandler(()=>{
        Swal.fire({
            position: 'top',
            icon: 'success',
            html: '<h2><b style="color:blue">'+name+'</b></h2><h4>แก้ไข  <b style="color:blue">'+field+'</b> เป็น<h2 style="color:red">'+val+'</h2></h4>',
            confirmButtonColor: '#2563eb',
            confirmButtonText: 'ตกลง',
        });
        $.LoadingOverlay("hide");
        element.alerts.textContent = "บันทึกข้อมูลสำเร็จแล้ว";
        clearAlerts(element.alerts);
        
        const rowIdx = currentTableData.findIndex(r => {
            const rId = r.ID || r['ประทับเวลา'] || r.Timestamp;
            return String(rId) === String(id);
        });
        if(rowIdx > -1) {
            currentTableData[rowIdx][field] = val;
            // Force data reference update for TanStack
            currentTableData = [...currentTableData];
            tableOptions.data = currentTableData;
            myTableInstance.setOptions(tableOptions);
            updateSummaryCards(currentTableData);
            if(updateDOM) updateDOM();
        } else {
            loadData();
        }
    })
    .withFailureHandler((er)=>{
        element.alerts.textContent = "บันทึกข้อมูล..ไม่สำเร็จ";
        clearAlerts(element.alerts);
        $.LoadingOverlay("hide");
    })
    .editCell({id:id, val:val, field:field});
}


function clearAlerts(el){
  setTimeout(()=>{
    el.textContent = ""
  },2500)
}

function searchData(e){
  if(myTableInstance) {
      myTableInstance.setGlobalFilter(e.target.value);
  }
}

 function submitCustomForm(event) {
   event.preventDefault();
   const form = event.target;
   
   const promoVal = form.promotionPeriod.value ? form.promotionPeriod.value.trim() : "";
   if (!promoVal || (!promoVal.includes(" to ") && !promoVal.includes("ถึง") && !promoVal.includes("-"))) {
     Swal.fire({
       icon: 'warning',
       title: 'แจ้งเตือน',
       text: 'กรุณาระบุระยะเวลาโปรโมชั่นให้ครบถ้วน (วันเริ่มต้น ถึง วันสิ้นสุด)'
     });
     return;
   }
   
   const formData = {
     topic: form.topic.value,
     branch: form.branch.value,
     productDetail: form.productDetail.value,
     barcode: form.barcode.value,
     systemPrice: form.systemPrice.value,
     shiftF2Price: form.shiftF2Price.value,
     netPrice: form.netPrice.value,
     promotionPeriod: form.promotionPeriod.value,
     customerInfo: form.customerInfo.value,
     aisPackage: form.aisPackage.value,
     imeiTrade: form.imeiTrade.value
   };

   $('#staticBackdrop2').modal('hide');
   $.LoadingOverlay("show", {
     text: "กำลังบันทึกข้อมูล..."
   });

   google.script.run
     .withSuccessHandler(function() {
       $.LoadingOverlay("hide");
       form.reset();
       $('#topicSelect').val('').trigger('change');
       $('#branchSelect').val('').trigger('change');
       const fp = document.querySelector("input[name='promotionPeriod']")._flatpickr;
       if(fp) fp.clear();
       loadData();
       Swal.fire({
         position: 'top',
         icon: 'success',
         title: 'บันทึกข้อมูลเรียบร้อย',
         showConfirmButton: false,
         timer: 1500
       });
     })
     .withFailureHandler(function(error) {
       $.LoadingOverlay("hide");
       Swal.fire('ข้อผิดพลาด', error.message, 'error');
     })
     .submitNewForm(formData);
 }
