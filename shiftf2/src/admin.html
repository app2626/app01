<div id="settings-container" class="hidden mt-4 mb-5 animate__animated animate__fadeIn">
  <div class="bg-white border border-slate-200 shadow-sm rounded-2xl p-6">
    <h3 class="text-xl font-semibold text-slate-800 mb-6"><i class="fa-solid fa-gear text-blue-500 me-2"></i>ตั้งค่าระบบผู้ดูแล</h3>
    
    <form id="adminSettingsForm" onsubmit="saveSettingsForm(event)">
      
      <!-- Users Management -->
      <div class="mb-6 p-4 bg-purple-50 rounded-xl border border-purple-100">
        <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-4 gap-3">
            <h4 class="text-md font-semibold text-purple-800 m-0"><i class="fa-solid fa-users me-2"></i>จัดการผู้ใช้งานระบบ</h4>
            <button type="button" class="btn btn-sm btn-primary bg-purple-600 hover:bg-purple-700 border-0" onclick="openUserModal(true)"><i class="fa-solid fa-user-plus me-1"></i>เพิ่มผู้ใช้ใหม่</button>
        </div>
        <div class="table-responsive bg-white rounded-lg border border-slate-200">
            <table class="table table-hover text-sm mb-0">
                <thead class="table-light">
                    <tr>
                        <th class="py-3 px-4 font-semibold text-slate-600">Username</th>
                        <th class="py-3 px-4 font-semibold text-slate-600">Password</th>
                        <th class="py-3 px-4 font-semibold text-slate-600">ชื่อ-สกุล</th>
                        <th class="py-3 px-4 font-semibold text-slate-600">สิทธิ์การใช้งาน</th>
                        <th class="py-3 px-4 font-semibold text-slate-600 text-center">จัดการ</th>
                    </tr>
                </thead>
                <tbody id="userTableBody">
                    <tr><td colspan="5" class="text-center text-slate-500 py-4">กำลังโหลดข้อมูล...</td></tr>
                </tbody>
            </table>
        </div>
      </div>

      <!-- Telegram -->
      <div class="mb-6 p-4 bg-blue-50 rounded-xl border border-blue-100">
        <h4 class="text-md font-semibold text-blue-800 mb-3"><i class="fa-brands fa-telegram me-2"></i>ตั้งค่า Telegram</h4>
        <div class="row g-3">
          <div class="col-md-6">
            <label class="form-label text-sm text-blue-700">Bot Token (สำหรับแจ้งเตือนคำขอใหม่)</label>
            <input type="text" class="form-control" id="set_botToken1" placeholder="เช่น 123456:ABC-DEF...">
          </div>
          <div class="col-md-6">
            <label class="form-label text-sm text-blue-700">Chat ID (สำหรับแจ้งเตือนคำขอใหม่)</label>
            <input type="text" class="form-control" id="set_chatId1" placeholder="เช่น -1001234567890">
          </div>
          <div class="col-md-6">
            <label class="form-label text-sm text-blue-700">Bot Token (สำหรับแจ้งเตือนอนุมัติแล้ว)</label>
            <input type="text" class="form-control" id="set_botToken2" placeholder="เช่น 123456:ABC-DEF...">
          </div>
          <div class="col-md-6">
            <label class="form-label text-sm text-blue-700">Chat ID (สำหรับแจ้งเตือนอนุมัติแล้ว)</label>
            <input type="text" class="form-control" id="set_chatId2" placeholder="เช่น -1001234567890">
          </div>
        </div>
      </div>

      <!-- Dropdowns -->
      <div class="mb-6 p-4 bg-green-50 rounded-xl border border-green-100">
        <h4 class="text-md font-semibold text-green-800 mb-3"><i class="fa-solid fa-list me-2"></i>จัดการตัวเลือก (Dropdowns)</h4>
        <div class="row g-3">
          <div class="col-md-6">
            <label class="form-label text-sm text-green-700">เรื่อง (Topic) - กด Enter เพื่อขึ้นบรรทัดใหม่</label>
            <textarea class="form-control" id="set_topics" rows="5"></textarea>
          </div>
          <div class="col-md-6">
            <label class="form-label text-sm text-green-700">สาขา (Branch) - กด Enter เพื่อขึ้นบรรทัดใหม่</label>
            <textarea class="form-control" id="set_branches" rows="5"></textarea>
          </div>
        </div>
      </div>

      <!-- Emails -->
      <div class="mb-6 p-4 bg-orange-50 rounded-xl border border-orange-100">
        <h4 class="text-md font-semibold text-orange-800 mb-3"><i class="fa-solid fa-envelope me-2"></i>ตั้งค่าอีเมลแจ้งเตือน</h4>
        
        <div class="row g-4">
          <div class="col-md-6">
            <label class="form-label text-sm text-orange-700 font-semibold">ผู้รับหลัก (To)</label>
            <div id="emailToListContainer" class="mb-2"></div>
            <button type="button" class="btn btn-sm btn-outline-secondary" onclick="addEmailToRow()"><i class="fa-solid fa-plus me-1"></i>เพิ่มผู้รับ (To)</button>
          </div>
          <div class="col-md-6">
            <label class="form-label text-sm text-orange-700 font-semibold">ผู้รับสำเนา (CC)</label>
            <div id="emailCcListContainer" class="mb-2"></div>
            <button type="button" class="btn btn-sm btn-outline-secondary" onclick="addEmailCcRow()"><i class="fa-solid fa-plus me-1"></i>เพิ่มสำเนา (CC)</button>
          </div>
        </div>
      </div>

      <div class="text-end">
        <button type="submit" class="btn btn-primary px-5 py-2"><i class="fa-solid fa-save me-2"></i>บันทึกการตั้งค่า</button>
      </div>
    </form>
  </div>
</div>

<script>
function showSettings() {
    if (typeof currentUser !== 'undefined' && currentUser && currentUser.role === 'แอดมิน') {
        openSettingsPanel();
    } else {
        Swal.fire('ไม่มีสิทธิ์', 'เฉพาะแอดมินเท่านั้นที่เข้าถึงการตั้งค่าได้', 'error');
    }
}

function openSettingsPanel() {
    document.getElementById('table-container').classList.add('hidden');
    document.getElementById('dashboard-container').classList.add('hidden');
    document.getElementById('settings-container').classList.remove('hidden');
    
    // Update tabs UI
    document.getElementById('btnViewSettings').classList.add('bg-white', 'shadow-sm', 'text-green-700');
    document.getElementById('btnViewSettings').classList.remove('text-slate-500', 'hover:text-slate-700');
    
    document.getElementById('btnViewChart').classList.remove('bg-white', 'shadow-sm', 'text-green-700');
    document.getElementById('btnViewChart').classList.add('text-slate-500', 'hover:text-slate-700');
    document.getElementById('btnViewTable').classList.remove('bg-white', 'shadow-sm', 'text-green-700');
    document.getElementById('btnViewTable').classList.add('text-slate-500', 'hover:text-slate-700');

    // Load Data
    Swal.fire({ title: 'กำลังโหลดตั้งค่า...', didOpen: () => Swal.showLoading(), allowOutsideClick: false, showConfirmButton: false });
    google.script.run.withSuccessHandler(data => {
        document.getElementById('set_botToken1').value = data.botToken1;
        document.getElementById('set_chatId1').value = data.chatId1;
        document.getElementById('set_botToken2').value = data.botToken2;
        document.getElementById('set_chatId2').value = data.chatId2;
        document.getElementById('set_topics').value = data.topics;
        document.getElementById('set_branches').value = data.branches;
        
        renderEmailRows(data.emails);
        
        loadUsers();
        // Swal is closed inside loadUsers or we can close it here
        Swal.close();
    }).getAdminSettings();
}

function renderEmailRows(emails) {
    document.getElementById('emailToListContainer').innerHTML = '';
    document.getElementById('emailCcListContainer').innerHTML = '';
    
    let hasTo = false;
    let hasCc = false;

    if(emails && emails.length > 0) {
        emails.forEach(e => {
            if(e.to) { addEmailToRow(e.to); hasTo = true; }
            if(e.cc) { addEmailCcRow(e.cc); hasCc = true; }
        });
    }
    
    if(!hasTo) addEmailToRow();
    if(!hasCc) addEmailCcRow();
}

function addEmailToRow(value = '') {
    const container = document.getElementById('emailToListContainer');
    const row = document.createElement('div');
    row.className = 'd-flex gap-2 mb-2 email-to-row';
    row.innerHTML = `
        <input type="email" class="form-control email-to-val" placeholder="ระบุอีเมลผู้รับหลัก" value="${value}">
        <button type="button" class="btn btn-outline-danger" onclick="this.parentElement.remove()"><i class="fa-solid fa-trash"></i></button>
    `;
    container.appendChild(row);
}

function addEmailCcRow(value = '') {
    const container = document.getElementById('emailCcListContainer');
    const row = document.createElement('div');
    row.className = 'd-flex gap-2 mb-2 email-cc-row';
    row.innerHTML = `
        <input type="email" class="form-control email-cc-val" placeholder="ระบุอีเมลผู้รับสำเนา" value="${value}">
        <button type="button" class="btn btn-outline-danger" onclick="this.parentElement.remove()"><i class="fa-solid fa-trash"></i></button>
    `;
    container.appendChild(row);
}

function saveSettingsForm(e) {
    e.preventDefault();
    
    const toEmails = [];
    document.querySelectorAll('.email-to-val').forEach(el => {
        if(el.value.trim()) toEmails.push(el.value.trim());
    });
    
    const ccEmails = [];
    document.querySelectorAll('.email-cc-val').forEach(el => {
        if(el.value.trim()) ccEmails.push(el.value.trim());
    });

    const emails = [];
    const maxLen = Math.max(toEmails.length, ccEmails.length);
    for(let i=0; i<maxLen; i++) {
        emails.push({
            to: toEmails[i] || "",
            cc: ccEmails[i] || ""
        });
    }

    const data = {
        botToken1: document.getElementById('set_botToken1').value.trim(),
        chatId1: document.getElementById('set_chatId1').value.trim(),
        botToken2: document.getElementById('set_botToken2').value.trim(),
        chatId2: document.getElementById('set_chatId2').value.trim(),
        topics: document.getElementById('set_topics').value,
        branches: document.getElementById('set_branches').value,
        emails: emails
    };

    Swal.fire({ title: 'กำลังบันทึก...', didOpen: () => Swal.showLoading(), allowOutsideClick: false, showConfirmButton: false });
    google.script.run.withSuccessHandler(res => {
        Swal.fire('บันทึกสำเร็จ', 'การตั้งค่าถูกบันทึกเรียบร้อยแล้ว', 'success').then(() => {
            // refresh data dropodowns
            google.script.run.withSuccessHandler(function(dropdownData) {
                 const topicSelect = document.getElementById('topicSelect');
                 if(topicSelect) {
                     topicSelect.innerHTML = '<option value="">-- กรุณาเลือกเรื่อง --</option>';
                     dropdownData.topics.forEach(function(topic) {
                        const opt = document.createElement('option');
                        opt.value = topic; opt.innerHTML = topic;
                        topicSelect.appendChild(opt);
                     });
                 }
                 const branchSelect = document.getElementById('branchSelect');
                 if(branchSelect) {
                     branchSelect.innerHTML = '<option value="">-- กรุณาเลือกสาขา --</option>';
                     dropdownData.locations.forEach(function(loc) {
                        const opt = document.createElement('option');
                        opt.value = loc; opt.innerHTML = loc;
                        branchSelect.appendChild(opt);
                     });
                 }
            }).getDropdownOptions();
        });
    }).withFailureHandler(err => {
        Swal.fire('เกิดข้อผิดพลาด', err.message, 'error');
    }).saveAdminSettings(data);
}

let currentUsersList = [];
let isEditingUser = false;
let userModalInstance = null;

function loadUsers() {
    google.script.run.withSuccessHandler(users => {
        currentUsersList = users;
        renderUserTable();
    }).getUsers();
}

function renderUserTable() {
    const tbody = document.getElementById('userTableBody');
    tbody.innerHTML = '';
    if (currentUsersList.length === 0) {
        tbody.innerHTML = '<tr><td colspan="5" class="text-center text-slate-500 py-4">ไม่พบข้อมูลผู้ใช้งาน</td></tr>';
        return;
    }
    
    currentUsersList.forEach(u => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
            <td class="align-middle py-3 px-4 font-medium text-slate-700">${u.username}</td>
            <td class="align-middle py-3 px-4 text-slate-600">${u.password}</td>
            <td class="align-middle py-3 px-4 text-slate-600">${u.name}</td>
            <td class="align-middle py-3 px-4">
                <span class="badge ${u.role === 'แอดมิน' ? 'bg-danger' : (u.role === 'หัวหน้างาน' ? 'bg-warning text-dark' : 'bg-primary')} px-2 py-1 rounded-full text-xs font-semibold">${u.role}</span>
            </td>
            <td class="text-center align-middle py-3 px-4">
                <button type="button" class="btn btn-sm btn-outline-secondary me-1 hover:bg-slate-100 border-slate-300" onclick="openUserModal(false, '${u.username}')"><i class="fa-solid fa-pen text-slate-600"></i></button>
                <button type="button" class="btn btn-sm btn-outline-danger hover:bg-red-50 border-red-200" onclick="deleteUser('${u.username}')" ${u.username === (typeof currentUser !== 'undefined' ? currentUser.username : '') ? 'disabled title="ไม่สามารถลบตัวเองได้"' : ''}><i class="fa-solid fa-trash text-red-500"></i></button>
            </td>
        `;
        tbody.appendChild(tr);
    });
}

function openUserModal(isNew, username = '') {
    isEditingUser = !isNew;
    const form = document.getElementById('userForm');
    form.reset();
    
    const unInput = document.getElementById('user_username');
    if (isNew) {
        document.getElementById('userModalTitle').textContent = 'เพิ่มผู้ใช้งานใหม่';
        unInput.readOnly = false;
        unInput.classList.remove('bg-slate-100', 'cursor-not-allowed');
    } else {
        document.getElementById('userModalTitle').textContent = 'แก้ไขข้อมูลผู้ใช้งาน';
        const u = currentUsersList.find(x => x.username === username);
        if (u) {
            unInput.value = u.username;
            unInput.readOnly = true;
            unInput.classList.add('bg-slate-100', 'cursor-not-allowed');
            document.getElementById('user_password').value = u.password;
            document.getElementById('user_name').value = u.name;
            document.getElementById('user_role').value = u.role;
        }
    }
    
    if (!userModalInstance) {
        userModalInstance = new bootstrap.Modal(document.getElementById('userModal'));
    }
    userModalInstance.show();
}

function saveUserModal() {
    const form = document.getElementById('userForm');
    if (!form.checkValidity()) {
        form.reportValidity();
        return;
    }
    
    const userData = {
        username: document.getElementById('user_username').value.trim(),
        password: document.getElementById('user_password').value.trim(),
        name: document.getElementById('user_name').value.trim(),
        role: document.getElementById('user_role').value
    };
    
    userModalInstance.hide();
    Swal.fire({ title: 'กำลังบันทึก...', didOpen: () => Swal.showLoading(), allowOutsideClick: false, showConfirmButton: false });
    
    google.script.run.withSuccessHandler(() => {
        Swal.fire('บันทึกสำเร็จ', 'ข้อมูลผู้ใช้งานถูกบันทึกแล้ว', 'success');
        loadUsers();
    }).withFailureHandler(err => {
        Swal.fire('ข้อผิดพลาด', err.message, 'error');
    }).saveUser(userData, !isEditingUser);
}

function deleteUser(username) {
    Swal.fire({
        title: 'ยืนยันการลบ',
        text: `คุณต้องการลบผู้ใช้งาน "${username}" ใช่หรือไม่?`,
        icon: 'warning',
        showCancelButton: true,
        confirmButtonColor: '#d33',
        cancelButtonColor: '#6c757d',
        confirmButtonText: 'ใช่, ลบเลย!',
        cancelButtonText: 'ยกเลิก'
    }).then((result) => {
        if (result.isConfirmed) {
            Swal.fire({ title: 'กำลังลบ...', didOpen: () => Swal.showLoading(), allowOutsideClick: false, showConfirmButton: false });
            google.script.run.withSuccessHandler(() => {
                Swal.fire('ลบสำเร็จ', 'ลบผู้ใช้งานเรียบร้อยแล้ว', 'success');
                loadUsers();
            }).withFailureHandler(err => {
                Swal.fire('ข้อผิดพลาด', err.message, 'error');
            }).deleteUser(username);
        }
    });
}
</script>

<!-- User Modal -->
<div class="modal fade" id="userModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content border-0 rounded-2xl shadow-lg">
      <div class="modal-header bg-slate-50 border-b border-slate-200 rounded-t-2xl px-5 py-4">
        <h5 class="modal-title font-semibold text-slate-800 text-lg" id="userModalTitle">เพิ่มผู้ใช้งานใหม่</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body p-5">
        <form id="userForm">
            <div class="mb-4">
                <label class="form-label text-sm font-medium text-slate-700">Username <span class="text-red-500">*</span></label>
                <input type="text" class="form-control rounded-lg border-slate-300 focus:border-blue-500 focus:ring focus:ring-blue-200" id="user_username" required placeholder="กรอกชื่อบัญชีผู้ใช้">
            </div>
            <div class="mb-4">
                <label class="form-label text-sm font-medium text-slate-700">Password <span class="text-red-500">*</span></label>
                <input type="text" class="form-control rounded-lg border-slate-300 focus:border-blue-500 focus:ring focus:ring-blue-200" id="user_password" required placeholder="กรอกรหัสผ่าน">
            </div>
            <div class="mb-4">
                <label class="form-label text-sm font-medium text-slate-700">ชื่อ-สกุล <span class="text-red-500">*</span></label>
                <input type="text" class="form-control rounded-lg border-slate-300 focus:border-blue-500 focus:ring focus:ring-blue-200" id="user_name" required placeholder="กรอกชื่อ นามสกุล">
            </div>
            <div class="mb-2">
                <label class="form-label text-sm font-medium text-slate-700">สิทธิ์การเข้าถึง <span class="text-red-500">*</span></label>
                <select class="form-select rounded-lg border-slate-300 focus:border-blue-500 focus:ring focus:ring-blue-200" id="user_role" required>
                    <option value="พนักงาน">พนักงาน (Staff)</option>
                    <option value="หัวหน้างาน">หัวหน้างาน (Supervisor)</option>
                    <option value="แอดมิน">แอดมิน (Admin)</option>
                </select>
            </div>
        </form>
      </div>
      <div class="modal-footer bg-slate-50 border-t border-slate-200 rounded-b-2xl px-5 py-3">
        <button type="button" class="btn text-slate-600 bg-white border border-slate-300 hover:bg-slate-100 rounded-lg px-4" data-bs-dismiss="modal">ยกเลิก</button>
        <button type="button" class="btn btn-primary bg-blue-600 hover:bg-blue-700 border-0 rounded-lg px-5" onclick="saveUserModal()">บันทึก</button>
      </div>
    </div>
  </div>
</div>
