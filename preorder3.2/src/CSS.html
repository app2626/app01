<style>
  /* ===================================================
     ENTERPRISE E-COMMERCE DESIGN SYSTEM
     Premium UI - Dark Nav + Light Content
     =================================================== */

  /* === CSS Custom Properties === */
  :root {
    /* รอบปรับโทน "พรีเมี่ยม" (2026-07-10): slate-navy เข้ม+เรียบหรู แทน indigo สดเดิม — ให้ตรงกับ Tailwind indigo scale ที่แก้ใน Index.html */
    --color-primary: #366891;
    --color-primary-dark: #254d71;
    --color-primary-darker: #1b3a59;
    --color-primary-light: #5485ad;
    --color-primary-bg: #eef3f8;
    --color-accent: #06b6d4;
    --color-accent-dark: #0891b2;
    --color-success: #10b981;
    --color-success-bg: #ecfdf5;
    --color-warning: #f59e0b;
    --color-warning-bg: #fffbeb;
    --color-danger: #f43f5e;
    --color-danger-bg: #fff1f2;
    --color-surface: #ffffff;
    --color-surface-secondary: #f8fafc;
    --color-border: #e2e8f0;
    --color-border-light: #f1f5f9;
    --color-text-primary: #0f172a;
    --color-text-secondary: #475569;
    --color-text-muted: #94a3b8;
    --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.03), 0 1px 3px 0 rgb(0 0 0 / 0.04);
    --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.05), 0 2px 4px -2px rgb(0 0 0 / 0.03);
    --shadow-lg: 0 10px 25px -3px rgb(0 0 0 / 0.06), 0 4px 10px -4px rgb(0 0 0 / 0.04);
    --shadow-xl: 0 20px 40px -8px rgb(0 0 0 / 0.08), 0 8px 16px -6px rgb(0 0 0 / 0.04);
    --shadow-glow: 0 0 20px -5px rgba(37, 77, 113, 0.25);
    --radius-sm: 0.5rem;
    --radius-md: 0.75rem;
    --radius-lg: 1rem;
    --radius-xl: 1.25rem;
    --radius-2xl: 1.5rem;
    --radius-3xl: 2rem;
    --transition-fast: 150ms cubic-bezier(0.4, 0, 0.2, 1);
    --transition-normal: 250ms cubic-bezier(0.4, 0, 0.2, 1);
    --transition-slow: 400ms cubic-bezier(0.4, 0, 0.2, 1);
  }

  /* === Base Styles === */
  body {
    font-family: 'Prompt', sans-serif;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    background: linear-gradient(135deg, #f0f4ff 0%, #faf5ff 25%, #f0fdfa 50%, #f8fafc 100%);
    background-attachment: fixed;
  }

  /* === Custom Scrollbar - Ultra Refined === */
  .custom-scrollbar::-webkit-scrollbar { 
    width: 0.3cm; 
    height: 0.3cm; 
  }
  .custom-scrollbar::-webkit-scrollbar-track { 
    background: transparent; 
    border-radius: 10px;
  }
  .custom-scrollbar::-webkit-scrollbar-thumb {
    background: linear-gradient(180deg, #b8cee1, #85abc9);
    border-radius: 10px;
  }
  .custom-scrollbar::-webkit-scrollbar-thumb:hover {
    background: linear-gradient(180deg, #85abc9, #5485ad);
  }

  /* Global scrollbar */
  ::-webkit-scrollbar { width: 0.3cm; height: 0.3cm; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
  ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

  /* === Premium Animations === */
  .animate-fade-in { 
    animation: fadeIn 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; 
  }
  .animate-fade-in-up { 
    animation: fadeInUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; 
  }
  
  @keyframes fadeIn { 
    from { opacity: 0; } 
    to { opacity: 1; } 
  }
  @keyframes fadeInUp {
    from { 
      opacity: 0; 
      transform: translateY(20px) scale(0.98); 
    }
    to { 
      opacity: 1; 
      transform: translateY(0) scale(1); 
    }
  }
  @keyframes slideInRight {
    from { 
      opacity: 0; 
      transform: translateX(30px); 
    }
    to { 
      opacity: 1; 
      transform: translateX(0); 
    }
  }
  @keyframes scaleIn {
    from { 
      opacity: 0; 
      transform: scale(0.92); 
    }
    to { 
      opacity: 1; 
      transform: scale(1); 
    }
  }
  @keyframes shimmer {
    0% { background-position: -200% 0; }
    100% { background-position: 200% 0; }
  }
  @keyframes pulse-ring {
    0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(37, 77, 113, 0.4); }
    70% { transform: scale(1); box-shadow: 0 0 0 6px rgba(37, 77, 113, 0); }
    100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(37, 77, 113, 0); }
  }
  @keyframes float {
    0%, 100% { transform: translateY(0px); }
    50% { transform: translateY(-6px); }
  }
  @keyframes gradient-shift {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }
  @keyframes countUp {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .animate-slide-in-right { animation: slideInRight 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
  .animate-scale-in { animation: scaleIn 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; }

  /* === Skeleton Loading === */
  .skeleton {
    background: linear-gradient(90deg, #f1f5f9 25%, #e2e8f0 37%, #f1f5f9 63%);
    background-size: 400% 100%;
    animation: shimmer 1.8s infinite ease-in-out;
    border-radius: var(--radius-lg);
  }

  /* === Premium Glass Navigation === */
  .glass-nav {
    background: rgba(238, 242, 255, 0.85);
    backdrop-filter: blur(20px) saturate(180%);
    -webkit-backdrop-filter: blur(20px) saturate(180%);
    border-bottom: 1px solid rgba(226, 232, 240, 0.6);
    box-shadow: 0 1px 3px 0 rgb(0 0 0 / 0.02), 0 4px 20px -4px rgb(0 0 0 / 0.04);
  }

  /* === Glassmorphism Panels === */
  .glass-panel {
    background: rgba(255, 255, 255, 0.78);
    backdrop-filter: blur(24px) saturate(160%);
    -webkit-backdrop-filter: blur(24px) saturate(160%);
    border: 1px solid rgba(255, 255, 255, 0.5);
    box-shadow: var(--shadow-md);
  }

  /* === Enterprise Card System === */
  .enterprise-card {
    background: rgba(255, 255, 255, 0.85);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid rgba(226, 232, 240, 0.5);
    border-radius: var(--radius-2xl);
    box-shadow: var(--shadow-sm);
    transition: all var(--transition-normal);
    position: relative;
    overflow: hidden;
  }
  .enterprise-card::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(37, 77, 113, 0.15), transparent);
    opacity: 0;
    transition: opacity var(--transition-normal);
  }
  .enterprise-card:hover {
    transform: translateY(-3px);
    box-shadow: var(--shadow-lg);
    border-color: rgba(37, 77, 113, 0.15);
  }
  .enterprise-card:hover::before {
    opacity: 1;
  }

  .premium-card {
    background: rgba(255, 255, 255, 0.88);
    border: 1px solid rgba(226, 232, 240, 0.6);
    border-radius: var(--radius-2xl);
    box-shadow: var(--shadow-sm);
    transition: all var(--transition-normal);
    position: relative;
  }
  .premium-card:hover {
    transform: translateY(-4px);
    box-shadow: var(--shadow-xl);
    border-color: rgba(37, 77, 113, 0.2);
  }

  /* === POS Product Cards - Premium Hover Effect === */
  .product-card-hover {
    transition: all var(--transition-normal);
    border: 1px solid var(--color-border-light);
    background: var(--color-surface);
    border-radius: var(--radius-xl);
    position: relative;
    overflow: hidden;
  }
  .product-card-hover::after {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: inherit;
    opacity: 0;
    transition: opacity var(--transition-normal);
    background: linear-gradient(135deg, rgba(37, 77, 113, 0.03) 0%, rgba(6, 182, 212, 0.03) 100%);
  }
  .product-card-hover:hover {
    transform: translateY(-5px) scale(1.01);
    box-shadow: 0 16px 32px -6px rgba(37, 77, 113, 0.12), 0 6px 12px -4px rgba(37, 77, 113, 0.06);
    border-color: rgba(37, 77, 113, 0.25);
  }
  .product-card-hover:hover::after {
    opacity: 1;
  }

  /* === KPI Cards - Premium Gradient System === */
  .kpi-gradient-total {
    background: linear-gradient(135deg, #ffffff 0%, #eef3f8 60%, #dce7f0 100%);
    border-left: 4px solid var(--color-primary);
    position: relative;
    overflow: hidden;
  }
  .kpi-gradient-total::after {
    content: '';
    position: absolute;
    top: -50%;
    right: -50%;
    width: 100%;
    height: 100%;
    background: radial-gradient(circle, rgba(37, 77, 113, 0.06) 0%, transparent 70%);
  }
  .kpi-gradient-mob {
    background: linear-gradient(135deg, #ffffff 0%, #ecfdf5 60%, #d1fae5 100%);
    border-left: 4px solid var(--color-success);
    position: relative;
    overflow: hidden;
  }
  .kpi-gradient-mob::after {
    content: '';
    position: absolute;
    top: -50%;
    right: -50%;
    width: 100%;
    height: 100%;
    background: radial-gradient(circle, rgba(16, 185, 129, 0.06) 0%, transparent 70%);
  }
  .kpi-gradient-acc {
    background: linear-gradient(135deg, #ffffff 0%, #f8fafc 60%, #f1f5f9 100%);
    border-left: 4px solid #64748b;
    position: relative;
    overflow: hidden;
  }
  .kpi-gradient-acc::after {
    content: '';
    position: absolute;
    top: -50%;
    right: -50%;
    width: 100%;
    height: 100%;
    background: radial-gradient(circle, rgba(100, 116, 139, 0.06) 0%, transparent 70%);
  }
  .kpi-gradient-resT {
    background: linear-gradient(135deg, #ffffff 0%, #fffbeb 60%, #fef3c7 100%);
    border-left: 4px solid var(--color-warning);
    position: relative;
    overflow: hidden;
  }
  .kpi-gradient-resT::after {
    content: '';
    position: absolute;
    top: -50%;
    right: -50%;
    width: 100%;
    height: 100%;
    background: radial-gradient(circle, rgba(245, 158, 11, 0.06) 0%, transparent 70%);
  }
  .kpi-gradient-resF {
    background: linear-gradient(135deg, #ffffff 0%, #eff6ff 60%, #dbeafe 100%);
    border-left: 4px solid #3b82f6;
    position: relative;
    overflow: hidden;
  }
  .kpi-gradient-resF::after {
    content: '';
    position: absolute;
    top: -50%;
    right: -50%;
    width: 100%;
    height: 100%;
    background: radial-gradient(circle, rgba(59, 130, 246, 0.06) 0%, transparent 70%);
  }
  .kpi-gradient-aov {
    background: linear-gradient(135deg, #ffffff 0%, #faf5ff 60%, #f3e8ff 100%);
    border-left: 4px solid #a855f7;
    position: relative;
    overflow: hidden;
  }
  .kpi-gradient-aov::after {
    content: '';
    position: absolute;
    top: -50%;
    right: -50%;
    width: 100%;
    height: 100%;
    background: radial-gradient(circle, rgba(168, 85, 247, 0.06) 0%, transparent 70%);
  }
  .kpi-gradient-conv {
    background: linear-gradient(135deg, #ffffff 0%, #ecfdf5 60%, #d1fae5 100%);
    border-left: 4px solid #10b981;
    position: relative;
    overflow: hidden;
  }
  .kpi-gradient-conv::after {
    content: '';
    position: absolute;
    top: -50%;
    right: -50%;
    width: 100%;
    height: 100%;
    background: radial-gradient(circle, rgba(16, 185, 129, 0.06) 0%, transparent 70%);
  }

  /* === SweetAlert Enterprise Theme === */
  .swal2-popup { 
    border-radius: var(--radius-2xl) !important; 
    font-family: 'Prompt', sans-serif !important; 
    box-shadow: var(--shadow-xl) !important; 
    padding: 2.25rem !important;
    border: 1px solid rgba(226, 232, 240, 0.5) !important;
  }
  .swal2-title { 
    font-size: 1.3rem !important; 
    color: var(--color-text-primary) !important; 
    font-weight: 800 !important; 
    letter-spacing: -0.025em !important;
  }
  .swal2-html-container { 
    font-size: 0.925rem !important; 
    color: var(--color-text-secondary) !important; 
    line-height: 1.7 !important;
  }
  .swal2-actions { 
    margin-top: 1.75rem !important; 
    gap: 0.75rem !important; 
  }
  .swal2-styled.swal2-confirm { 
    background: linear-gradient(135deg, var(--color-primary) 0%, var(--color-primary-darker) 100%) !important;
    border-radius: var(--radius-lg) !important; 
    font-weight: 700 !important; 
    padding: 0.75rem 1.75rem !important; 
    font-size: 0.875rem !important; 
    box-shadow: 0 4px 12px -2px rgba(37, 77, 113, 0.35) !important;
    border: none !important;
    transition: all var(--transition-fast) !important;
  }
  .swal2-styled.swal2-confirm:hover {
    background: linear-gradient(135deg, var(--color-primary-dark) 0%, #112840 100%) !important;
    transform: translateY(-1px) !important;
    box-shadow: 0 6px 16px -2px rgba(37, 77, 113, 0.45) !important;
  }
  .swal2-styled.swal2-cancel { 
    background: var(--color-surface) !important; 
    color: var(--color-text-secondary) !important; 
    border: 1px solid var(--color-border) !important; 
    border-radius: var(--radius-lg) !important; 
    font-weight: 700 !important; 
    padding: 0.75rem 1.75rem !important; 
    font-size: 0.875rem !important;
    transition: all var(--transition-fast) !important;
  }
  .swal2-styled.swal2-cancel:hover {
    background: var(--color-surface-secondary) !important;
    border-color: #cbd5e1 !important;
  }

  /* === Data Table - Enterprise Grade === */
  #dataTable {
    border-spacing: 0;
  }
  #dataTable th {
    position: sticky;
    top: 0;
    z-index: 10;
    background: linear-gradient(135deg, #254d71 0%, #1b3a59 100%);
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: #ffffff;
    font-weight: 700;
    padding: 0.875rem 1rem;
    border-bottom: 2px solid #112840;
    white-space: nowrap;
  }
  #dataTable tbody tr {
    transition: all var(--transition-fast);
  }
  #dataTable tbody tr:hover { 
    background-color: rgba(37, 77, 113, 0.03); 
  }
  #dataTable tbody td {
    padding: 0.75rem 1rem;
    font-size: 0.8rem;
    color: var(--color-text-secondary);
  }

  /* === UI Input Focus Effects === */
  input:focus, select:focus, textarea:focus {
    box-shadow: 0 0 0 3px rgba(37, 77, 113, 0.12), 0 1px 2px 0 rgba(0, 0, 0, 0.05) !important;
    border-color: var(--color-primary) !important;
    outline: none !important;
  }

  /* === Active Navigation State === */
  .nav-link.active-link {
    background: linear-gradient(135deg, var(--color-primary) 0%, var(--color-primary-darker) 100%) !important;
    color: #ffffff !important;
    box-shadow: 0 4px 12px -2px rgba(37, 77, 113, 0.4), inset 0 1px 1px rgba(255,255,255,0.1) !important;
    font-weight: 700 !important;
  }

  /* === Badge Glow Effects === */
  .badge-glow-emerald {
    box-shadow: 0 0 12px rgba(16, 185, 129, 0.25), inset 0 1px 1px rgba(255,255,255,0.3);
  }
  .badge-glow-amber {
    box-shadow: 0 0 12px rgba(245, 158, 11, 0.25), inset 0 1px 1px rgba(255,255,255,0.3);
  }
  .badge-glow-rose {
    box-shadow: 0 0 12px rgba(244, 63, 94, 0.25), inset 0 1px 1px rgba(255,255,255,0.3);
  }

  /* === Blob Background Animations === */
  @keyframes blob {
    0% { transform: translate(0px, 0px) scale(1); }
    33% { transform: translate(30px, -50px) scale(1.1); }
    66% { transform: translate(-20px, 20px) scale(0.9); }
    100% { transform: translate(0px, 0px) scale(1); }
  }
  .animate-blob {
    animation: blob 8s infinite;
  }
  .animation-delay-2000 {
    animation-delay: 2s;
  }
  .animation-delay-4000 {
    animation-delay: 4s;
  }

  /* === Enterprise Section Dividers === */
  .section-divider {
    position: relative;
    display: flex;
    align-items: center;
    gap: 0.75rem;
    padding: 1.5rem 0 0.75rem 0;
    margin-bottom: 1.5rem;
  }
  .section-divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, var(--color-border), transparent);
  }

  /* === Premium Button Styles === */
  .btn-enterprise {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 0.5rem;
    padding: 0.625rem 1.25rem;
    font-weight: 700;
    font-size: 0.8125rem;
    border-radius: var(--radius-lg);
    transition: all var(--transition-fast);
    cursor: pointer;
    border: none;
    outline: none;
    position: relative;
    overflow: hidden;
  }
  .btn-enterprise-primary {
    background: linear-gradient(135deg, var(--color-primary) 0%, var(--color-primary-darker) 100%);
    color: white;
    box-shadow: 0 4px 12px -2px rgba(37, 77, 113, 0.35);
  }
  .btn-enterprise-primary:hover {
    transform: translateY(-1px);
    box-shadow: 0 6px 20px -2px rgba(37, 77, 113, 0.5);
  }
  .btn-enterprise-secondary {
    background: var(--color-surface);
    color: var(--color-text-secondary);
    border: 1px solid var(--color-border);
    box-shadow: var(--shadow-sm);
  }
  .btn-enterprise-secondary:hover {
    background: var(--color-surface-secondary);
    border-color: #cbd5e1;
    transform: translateY(-1px);
    box-shadow: var(--shadow-md);
  }

  /* === Chart Card Wrapper === */
  .chart-card {
    background: rgba(255, 255, 255, 0.85);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid rgba(226, 232, 240, 0.5);
    border-radius: var(--radius-2xl);
    box-shadow: var(--shadow-sm);
    transition: all var(--transition-normal);
    padding: 1.5rem;
  }
  .chart-card:hover {
    box-shadow: var(--shadow-lg);
    border-color: rgba(37, 77, 113, 0.12);
  }
  .chart-card h6 {
    font-weight: 700;
    font-size: 0.8125rem;
    color: var(--color-text-primary);
    margin-bottom: 1rem;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }

  /* === Chart export (download/copy) buttons — วางไว้บนกราฟ ในกรอบ .relative ที่ห่อ canvas อยู่แล้ว === */
  .chart-export-btns {
    position: absolute;
    top: 2px;
    right: 2px;
    z-index: 5;
    display: flex;
    gap: 0.25rem;
  }
  /* ตารางสรุป (ไม่ใช่กราฟ) มีแถบหัวข้อของตัวเองอยู่แล้ว — วางปุ่มแบบ static ในแถบหัวแทนการลอยทับเนื้อหา
     ตั้งใจไม่ใช้ชื่อ class "inline" — ชนกับ utility class ของ Tailwind (display:inline) ที่โหลดทีหลัง CSS.html
     ใน cascade แล้วชนะ (กฎข้อ 18 ของโปรเจกต์) จนปุ่มเรียงตัวผิดเพี้ยน — ใช้ !important กันเผื่อไว้ด้วย */
  .table-export-btns {
    position: static !important;
    display: flex !important;
    gap: 0.25rem;
  }
  .chart-export-btn {
    width: 26px;
    height: 26px;
    border-radius: var(--radius-sm);
    background: rgba(255, 255, 255, 0.92);
    border: 1px solid var(--color-border);
    color: var(--color-text-secondary);
    font-size: 11px;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: var(--shadow-sm);
    cursor: pointer;
    transition: var(--transition-fast);
  }
  .chart-export-btn:hover {
    background: var(--color-primary);
    color: #ffffff;
    border-color: var(--color-primary);
  }

  /* === Login Page Enhancements === */
  .login-container {
    position: relative;
  }
  .login-card {
    background: rgba(255, 255, 255, 0.88);
    backdrop-filter: blur(32px) saturate(180%);
    -webkit-backdrop-filter: blur(32px) saturate(180%);
    border: 1px solid rgba(255, 255, 255, 0.4);
    box-shadow: 0 32px 64px -12px rgba(0, 0, 0, 0.25), 0 0 0 1px rgba(255, 255, 255, 0.1);
  }

  /* === Footer Enterprise Style === */
  .enterprise-footer {
    background: linear-gradient(180deg, rgba(255,255,255,0.9) 0%, rgba(248,250,252,0.95) 100%);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border-top: 1px solid rgba(226, 232, 240, 0.6);
  }

  /* === Cart Drawer Enhancement === */
  .cart-drawer-shadow {
    box-shadow: -20px 0 60px -15px rgba(0, 0, 0, 0.15);
  }

  /* ============================================================
     Cart Drawer — 3-Zone Flexbox Layout
     Zone 1: Header  — fixed 60px  (flex: 0 0 60px)
     Zone 2: Content — fills gap   (flex: 1 1 0  + min-height:0)
     Zone 3: Footer  — natural h   (flex-shrink: 0)
     รายการสินค้าไม่มีทางเลื่อนใต้ Header หรือ Footer ได้เลย
  ============================================================ */

  /* Drawer wrapper: Flexbox column เต็มความสูงจอ */
  #cartDrawer {
    display: flex;
    flex-direction: column;
    height: 100vh;            /* fallback สำหรับเบราว์เซอร์ที่ไม่รองรับ dvh */
    height: 100dvh;           /* เต็มความสูง viewport บนมือถือ */
    overflow: hidden;          /* ป้องกัน drawer เองไม่ scroll */
  }

  /* Zone 1 — Header: สูง 60px, อยู่คงที่ (sticky) */
  .cart-drawer-header {
    flex: 0 0 60px;
    height: 60px;
