    resetFilters: function() { 
      ['dashStartDate','dashEndDate','dashBranch','dashSales'].forEach(id=>{
        const el = document.getElementById(id);
        if(el) el.value = id.includes('Date') ? '' : 'ALL';
      });
      this.applyFilters(); 
    },
    applyFilters: function() {
      const elSD = document.getElementById('dashStartDate'); const elED = document.getElementById('dashEndDate');
      const elB = document.getElementById('dashBranch'); const elS = document.getElementById('dashSales');
      const sD = elSD ? elSD.value : ''; const eD = elED ? elED.value : '';
      const b = elB ? elB.value : 'ALL'; const s = elS ? elS.value : 'ALL';

      this.filteredOrders = this.rawOrders.filter(o => {
        if (sD && new Date(o.Timestamp) < new Date(sD + "T00:00:00")) return false;
        if (eD && new Date(o.Timestamp) > new Date(eD + "T23:59:59")) return false;
        if (b !== 'ALL' && o['Branch Code'] !== b) return false;
        if (s !== 'ALL' && o['Staff'] !== s) return false;
        return true;
      });
      // ช่วง/ตัวกรองที่เลือกไม่มีออเดอร์ — แสดง empty state มาตรฐาน (5A.4) เหนือ KPI (KPI ยังแสดงค่า 0 ตามจริง)
      const emptyEl = document.getElementById('dashEmptyState');
      if (emptyEl) {
        if (this.filteredOrders.length === 0) {
          const hasAnyOrder = this.rawOrders.length > 0;
          emptyEl.innerHTML = window.app.emptyState({
            icon: 'fa-calendar-times',
            title: hasAnyOrder ? 'ไม่มีออเดอร์ในช่วงที่เลือก' : 'ยังไม่มีออเดอร์ในระบบ',
            subtitle: hasAnyOrder ? 'ลองขยายช่วงวันที่ หรือล้างตัวกรองเพื่อดูออเดอร์ทั้งหมด' : 'เมื่อมีการคีย์ออเดอร์แรก ข้อมูลสรุปจะแสดงที่นี่',
            actionLabel: hasAnyOrder ? 'ล้างตัวกรอง' : '',
            onclick: hasAnyOrder ? 'window.app.dashboard.resetFilters()' : ''
          });
          emptyEl.classList.remove('hidden');
        } else {
          emptyEl.classList.add('hidden');
          emptyEl.innerHTML = '';
        }
      }
      this.updateKPIs(); this.renderCharts(); this.renderPromotionsTable(); this.renderGiftsTable(); this.renderInterestsTable();
    },
    updateKPIs: function() {
      let t = 0; let u = new Set(); let completedOrders = new Set();
      let resT = 0; let resF = 0;
      let totalMobiles = 0; let totalAccessories = 0;
      const orderResStatusMap = {};
      this.filteredOrders.forEach(o => { if(o['Reservation Status'] && o['Reservation Status'].trim() !== '') { orderResStatusMap[o.OrderID] = o['Reservation Status']; } });

      this.filteredOrders.forEach(o => {
        if (o['Order Status'] !== 'Cancelled') { 
            let rTotal = parseFloat((o['Row Total'] || '0').toString().replace(/,/g,''));
            t += isNaN(rTotal) ? 0 : rTotal;
            u.add(o.OrderID);
            if (o['Order Status'] === 'Completed') completedOrders.add(o.OrderID);
            
            let isMobile = o.Category === 'โมบาย';
            // 6C.3 — "อุปกรณ์เสริม" แยกเป็น 3 หมวดย่อย (อุปกรณ์เสริม/สมาร์ทวอทช์/หูฟัง) แต่ KPI นี้ยังรวมเป็นยอดเดียว
            let isAcc = ['อุปกรณ์เสริม', 'สมาร์ทวอทช์', 'หูฟัง'].includes(o.Category);
            if (isMobile || isAcc) {
                let qty = parseInt(String(o.Qty || 0).replace(/,/g,''), 10); if(isNaN(qty)) qty = 0;
                if(isMobile) totalMobiles += qty;
                if(isAcc) totalAccessories += qty;
                
                let rStatus = o['Reservation Status'] || orderResStatusMap[o.OrderID] || '';
                if(rStatus.includes('จอง T')) resT += qty;
                if(rStatus.includes('จอง F')) resF += qty;
            }
        }
      });
      
      if(document.getElementById('dashKpiTotal')) document.getElementById('dashKpiTotal').innerText = '฿' + t.toLocaleString();
      if(document.getElementById('dashKpiMobiles')) document.getElementById('dashKpiMobiles').innerText = totalMobiles; 
      if(document.getElementById('dashKpiAccessories')) document.getElementById('dashKpiAccessories').innerText = totalAccessories; 
      if(document.getElementById('dashKpiResT')) document.getElementById('dashKpiResT').innerText = resT;
      if(document.getElementById('dashKpiResF')) document.getElementById('dashKpiResF').innerText = resF;
      if(document.getElementById('dashKpiConv')) document.getElementById('dashKpiConv').innerText = (u.size>0 ? ((completedOrders.size/u.size)*100).toFixed(1) : 0) + '%';
      if(document.getElementById('dashKpiAov')) document.getElementById('dashKpiAov').innerText = '฿' + (u.size>0 ? (t/u.size) : 0).toLocaleString();
    },
    renderCharts: function() {
      if (typeof ChartDataLabels !== 'undefined') {
          Chart.register(ChartDataLabels);
          Chart.defaults.set('plugins.datalabels', {
              color: window.app.chartTheme().datalabel,
              font: { family: 'Sarabun', weight: 'bold', size: 10 },
              align: 'end',
              anchor: 'end',
              offset: 4,
              formatter: function(value) { return value > 0 ? value.toLocaleString() : ''; }
          });
      }
      const validCategories = ['โมบาย', 'อุปกรณ์เสริม', 'สมาร์ทวอทช์', 'หูฟัง'];
      const isDevice = (o) => o && o.Category && validCategories.includes(o.Category.toString().trim());

      // เก็บ key แยกจาก label ที่โชว์ — label เป็น th-TH locale string (D/M/YYYY ไม่เติม 0 นำหน้า) เรียงตามตัวอักษรตรงๆ ไม่ได้
      // (เช่น "10/1/2569" < "2/1/2569" แบบ string แต่ผิดลำดับวันที่จริง) ต้อง sort ด้วย key YYYY-MM-DD ตาม rule 1 แล้วค่อย map กลับเป็น label
      const trendData = {};
      this.filteredOrders.forEach(o => {
        if(o['Order Status'] !== 'Cancelled' && isDevice(o)) {
          const dt = new Date(o.Timestamp);
          const dKey = dt.getFullYear() + '-' + String(dt.getMonth() + 1).padStart(2, '0') + '-' + String(dt.getDate()).padStart(2, '0');
          if (!trendData[dKey]) trendData[dKey] = { label: dt.toLocaleDateString('th-TH'), qty: 0 };
          let qty = parseInt(String(o.Qty || 0).replace(/,/g,''), 10); trendData[dKey].qty += (isNaN(qty) ? 0 : qty);
        }
      });
      const sortedDayKeys = Object.keys(trendData).sort();
      this.createChart('chartSalesTrend', 'line', sortedDayKeys.map(k => trendData[k].label), sortedDayKeys.map(k => trendData[k].qty), 'จำนวนเครื่อง', '#254d71');
      
      const weeklyTrend = {};
      this.filteredOrders.forEach(o => {
        if(o['Order Status'] !== 'Cancelled' && isDevice(o)) {
          let w = window.app.getWeekString(o.Timestamp);
          let qty = parseInt(String(o.Qty || 0).replace(/,/g,''), 10); weeklyTrend[w] = (weeklyTrend[w] || 0) + (isNaN(qty) ? 0 : qty);
        }
      });
      const sortedWeeks = Object.keys(weeklyTrend).sort();
      this.createChart('chartWeeklyTrend', 'bar', sortedWeeks, sortedWeeks.map(w => weeklyTrend[w]), 'จำนวนเครื่อง', '#2563eb');

      const modelsData = {}; 
      let grandTotalQty = 0;
      this.filteredOrders.forEach(o => {
        if(o['Order Status'] === 'Cancelled' || !isDevice(o)) return;
        let mName = o.Model && o.Model !== '-' ? o.Model : o['Product Name'];
        if (o.Capacity && o.Capacity !== '-' && o.Capacity.trim() !== '') mName += ` (${o.Capacity})`;
        let qty = parseInt(String(o.Qty || 0).replace(/,/g,''), 10); if(isNaN(qty)) qty = 0;
        modelsData[mName] = (modelsData[mName] || 0) + qty;
        grandTotalQty += qty;
      });
      let sortedModels = Object.keys(modelsData).sort((a,b) => modelsData[b] - modelsData[a]).slice(0, 15);
      
      if(this.charts['chartModelAdvanced']) this.charts['chartModelAdvanced'].destroy();
      const ctxModel = document.getElementById('chartModelAdvanced');
      if(ctxModel) {
        this.charts['chartModelAdvanced'] = new Chart(ctxModel.getContext('2d'), {
            type: 'bar',
            data: { labels: sortedModels, datasets: [{ label: 'จำนวนเครื่อง', data: sortedModels.map(m => modelsData[m]), backgroundColor: '#254d71', borderRadius: 6 }] },
            options: { responsive: true, maintainAspectRatio: false, scales: { y: { beginAtZero: true, grid: { color: window.app.chartTheme().grid }, grace: '15%' }, x: { grid: { display: false } } }, plugins: { legend: { display: false }, tooltip: { callbacks: { footer: (tooltipItems) => { let mName = tooltipItems[0].label; let part = modelsData[mName] || 0; let percent = grandTotalQty > 0 ? ((part / grandTotalQty) * 100).toFixed(1) : 0; return 'คิดเป็นสัดส่วน: ' + percent + '% ของยอดจองทั้งหมด'; } } } } }
        });
        window.app.chartExportButtons('chartModelAdvanced');
      }

      // Promotions summary is rendered as a table via renderPromotionsTable()

      const buildCountChart = (field, canvasId, colorHex) => {
          const counts = {};
          this.filteredOrders.forEach(o => {
            if (o['Order Status'] !== 'Cancelled' && isDevice(o) && o[field] && o[field] !== '-') {
              let qty = parseInt(String(o.Qty || 0).replace(/,/g,''), 10); counts[o[field]] = (counts[o[field]] || 0) + (isNaN(qty) ? 0 : qty);
            }
          });
          let labels = Object.keys(counts).sort((a,b)=>counts[b]-counts[a]);
          let data = labels.map(l => counts[l]);
          this.createChart(canvasId, 'bar', labels, data, 'จำนวนเครื่อง', colorHex);
      };
      
      buildCountChart('Mall', 'chartMall', '#17a2b8'); buildCountChart('Region', 'chartRegion', '#10b981');
      buildCountChart('Province', 'chartProvince', '#f59e0b'); buildCountChart('Type Name', 'chartType', '#8b5cf6');

      const branchCounts = {};
      this.filteredOrders.forEach(o => { if(o['Order Status'] !== 'Cancelled' && isDevice(o)) { let qty = parseInt(String(o.Qty || 0).replace(/,/g,''), 10); branchCounts[o['Branch Code']] = (branchCounts[o['Branch Code']] || 0) + (isNaN(qty) ? 0 : qty); } });
      let sortedBranches = Object.keys(branchCounts).sort((a,b)=>branchCounts[b]-branchCounts[a]).slice(0, 10);
      this.createChart('chartTopBranches', 'bar', sortedBranches, sortedBranches.map(b=>branchCounts[b]), 'จำนวนเครื่องรวม', '#254d71');

      const salesCounts = {};
      this.filteredOrders.forEach(o => { if(o['Order Status'] !== 'Cancelled' && isDevice(o) && o['Staff']) { let qty = parseInt(String(o.Qty || 0).replace(/,/g,''), 10); salesCounts[o['Staff']] = (salesCounts[o['Staff']] || 0) + (isNaN(qty) ? 0 : qty); } });
      let sortedSales = Object.keys(salesCounts).sort((a,b)=>salesCounts[b]-salesCounts[a]).slice(0, 10);
      this.createChart('chartSalesRank', 'bar', sortedSales, sortedSales.map(s=>salesCounts[s]), 'จำนวนเครื่อง', '#2563eb', true);

      // Gifts summary is rendered as a table via renderGiftsTable()

      // Data for Channel vs Model (Split Mobile and Accessories)
      const channelModelDataMobile = {};
      const channelModelDataAcc = {};
      const allChannelsMobile = new Set();
      const allChannelsAcc = new Set();
      
      this.filteredOrders.forEach(o => {
        if(o['Order Status'] === 'Cancelled' || !isDevice(o)) return;
        let mName = o.Model && o.Model !== '-' ? o.Model : o['Product Name'];
        if (o.Capacity && o.Capacity !== '-' && o.Capacity.trim() !== '') mName += ` (${o.Capacity})`;
        
        let ch = o.Channel || 'Unknown';
        let qty = parseInt(String(o.Qty || 0).replace(/,/g,''), 10); if(isNaN(qty)) qty = 0;
        
        if (o.Category === 'โมบาย') {
            allChannelsMobile.add(ch);
            if(!channelModelDataMobile[mName]) channelModelDataMobile[mName] = { total: 0, channels: {} };
            channelModelDataMobile[mName].total += qty;
            channelModelDataMobile[mName].channels[ch] = (channelModelDataMobile[mName].channels[ch] || 0) + qty;
        } else if (['อุปกรณ์เสริม', 'สมาร์ทวอทช์', 'หูฟัง'].includes(o.Category)) {
            allChannelsAcc.add(ch);
            if(!channelModelDataAcc[mName]) channelModelDataAcc[mName] = { total: 0, channels: {} };
            channelModelDataAcc[mName].total += qty;
            channelModelDataAcc[mName].channels[ch] = (channelModelDataAcc[mName].channels[ch] || 0) + qty;
        }
      });
      
      const renderStackedChart = (canvasId, dataMap, channelsSet) => {
          let topModels = Object.keys(dataMap).sort((a,b) => dataMap[b].total - dataMap[a].total).slice(0, 15);
          let datasets = [];
          let colorsChannel = ['#254d71', '#ec4899', '#10b981', '#f59e0b', '#3b82f6', '#8b5cf6', '#14b8a6', '#f43f5e', '#64748b'];
          let chIdx = 0;
          
          Array.from(channelsSet).forEach(ch => {
             let dataPoints = topModels.map(m => dataMap[m].channels[ch] || 0);
             if (dataPoints.some(v => v > 0)) {
                 datasets.push({
                     label: ch,
                     data: dataPoints,
                     backgroundColor: colorsChannel[chIdx % colorsChannel.length],
                     borderRadius: 4
                 });
                 chIdx++;
             }
          });
          
          if(this.charts[canvasId]) this.charts[canvasId].destroy();
          const ctx = document.getElementById(canvasId);
          if(ctx) {
            this.charts[canvasId] = new Chart(ctx.getContext('2d'), {
                type: 'bar',
                data: { labels: topModels, datasets: datasets },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    indexAxis: 'y',
                    scales: {
                        x: { stacked: true, grid: { color: window.app.chartTheme().grid }, grace: '15%' },
                        y: { stacked: true, grid: { display: false }, ticks: { font: { family: 'Sarabun', size: 10 } } }
                    },
                    plugins: {
                        legend: { display: true, position: 'top', labels: { font: { family: 'Sarabun' } } },
                        datalabels: {
                            color: '#fff',
                            font: { family: 'Sarabun', weight: 'bold', size: 10 },
                            anchor: 'center',
                            align: 'center',
                            formatter: (val) => val > 0 ? val : ''
                        }
                    }
                }
            });
            window.app.chartExportButtons(canvasId);
          }
      };

      renderStackedChart('chartChannelModelMobile', channelModelDataMobile, allChannelsMobile);
      renderStackedChart('chartChannelModelAcc', channelModelDataAcc, allChannelsAcc);
    },
    renderPromotionsTable: function() {
      const tbody = document.getElementById('tablePromotionsBody'); if(!tbody) return;
      const promoData = {}; const promoProcessed = new Set(); let totalPromos = 0;
      const isDevice = (o) => { const validCat = ['โมบาย', 'อุปกรณ์เสริม', 'สมาร์ทวอทช์', 'หูฟัง']; return o.Category && validCat.includes(o.Category.toString().trim()); };
      this.filteredOrders.forEach(o => {
        if(o['Order Status'] !== 'Cancelled' && !promoProcessed.has(o.OrderID)) {
           let orderItems = this.filteredOrders.filter(x => x.OrderID === o.OrderID);
           if(orderItems.some(x => isDevice(x))) {
               let firstRow = orderItems[0];
               if(firstRow && firstRow.Promo && firstRow.Promo !== '-') { promoData[firstRow.Promo] = (promoData[firstRow.Promo] || 0) + 1; totalPromos++; }
           }
           promoProcessed.add(o.OrderID);
        }
      });
      const sorted = Object.keys(promoData).sort((a,b) => promoData[b]-promoData[a]);
      if(sorted.length===0){ tbody.innerHTML='<tr><td colspan="3" class="text-center p-6 text-slate-400">ไม่มีข้อมูลโปรโมชั่น</td></tr>'; return; }
      let html = '';
      sorted.forEach(k => {
          let p = totalPromos > 0 ? ((promoData[k]/totalPromos)*100).toFixed(1) : '0.0';
          html +='<tr class="hover:bg-slate-50 transition-colors"><td class="py-4 px-4 text-slate-700 font-medium whitespace-nowrap">'+window.app.esc(k)+'</td><td class="py-4 px-4 text-center font-black text-pink-600 whitespace-nowrap">'+promoData[k]+'</td><td class="py-4 px-4 text-center whitespace-nowrap"><div class="flex items-center gap-2 justify-end"><span class="text-xs text-slate-500 w-8 text-right">'+p+'%</span><div class="w-16 h-1.5 bg-slate-100 rounded-full overflow-hidden"><div class="bg-pink-500 h-full rounded-full" style="width:'+p+'%"></div></div></div></td></tr>';
      });
      tbody.innerHTML = html;
    },

      });

    renderInterestsTable: function() {
      const tbody = document.getElementById('tableInterestsBody'); if(!tbody) return;
      let tbodyHtml = ''; let counts = {}; let totalInterests = 0; const ordersById = {};
      this.filteredOrders.forEach(o => {
        if(o['Order Status'] !== 'Cancelled') {
           if(!ordersById[o.OrderID]) ordersById[o.OrderID] = [];
           ordersById[o.OrderID].push(o);
        }
      });
      
      const validCat = ['โมบาย', 'อุปกรณ์เสริม', 'สมาร์ทวอทช์', 'หูฟัง'];
      Object.values(ordersById).forEach(orderLines => {
         let hasDevice = orderLines.some(x => x.Category && validCat.includes(x.Category.toString().trim()));
         if(hasDevice) {
             let firstRow = orderLines.find(r => r['Customer Interests'] && r['Customer Interests'].trim() !== ""); 
             if(firstRow) {
                 firstRow['Customer Interests'].split(',').forEach(i => {
                    let interest = i.trim();
                    if (interest) { counts[interest] = (counts[interest] || 0) + 1; totalInterests++; }

      });
      tbody.innerHTML = tbodyHtml;
    },

    createChart: function(id, type, lbls, data, lblName='Data', col=null, isHoriz=false) {
      if(window.app.dashboard.charts[id]) window.app.dashboard.charts[id].destroy();
      const el = document.getElementById(id); if(!el) return;
      const ctx = el.getContext('2d');
      
      const themeColor = col || '#254d71';
      let datasetConfig = {
        label: lblName,
        data: data,
        borderWidth: type === 'line' ? 2.5 : 0,
        borderRadius: type === 'bar' ? (isHoriz ? [0, 8, 8, 0] : [8, 8, 0, 0]) : 0
      };
      
      if (type === 'line') {
        const gradient = ctx.createLinearGradient(0, 0, 0, 300);
        gradient.addColorStop(0, hexToRgba(themeColor, 0.18));
        gradient.addColorStop(1, hexToRgba(themeColor, 0.0));
        
        datasetConfig.borderColor = themeColor;
        datasetConfig.backgroundColor = gradient;
        datasetConfig.fill = true;
        datasetConfig.tension = 0.4;
        datasetConfig.pointBackgroundColor = '#ffffff';
        datasetConfig.pointBorderColor = themeColor;
        datasetConfig.pointBorderWidth = 2;
        datasetConfig.pointRadius = 4;
        datasetConfig.pointHoverRadius = 6;
      } else {
        datasetConfig.backgroundColor = themeColor;
      }
      
      function hexToRgba(hex, alpha) {
        const r = parseInt(hex.slice(1, 3), 16);
        const g = parseInt(hex.slice(3, 5), 16);
        const b = parseInt(hex.slice(5, 7), 16);
        return `rgba(${r}, ${g}, ${b}, ${alpha})`;
      }

      window.app.dashboard.charts[id] = new Chart(ctx, {
        type: type,
        data: {
          labels: lbls,
          datasets: [datasetConfig]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          indexAxis: isHoriz ? 'y' : 'x',
          plugins: {
            legend: { display: false },
            tooltip: {
              backgroundColor: '#0f172a',
              titleFont: { family: 'Sarabun', size: 12, weight: '700' },
              bodyFont: { family: 'Sarabun', size: 11, weight: '400' },
              padding: 10,
              cornerRadius: 10,
              displayColors: false,
              titleColor: '#ffffff',
              bodyColor: '#e2e8f0'
            }
          },
          scales: {
            y: {
              grid: { color: window.app.chartTheme().grid, drawBorder: false },
              ticks: {
                color: window.app.chartTheme().text,
                font: { family: 'Sarabun', size: 10, weight: '500' }
              },
              grace: '15%'
            },
            x: {
              grid: { display: false, drawBorder: false },
              ticks: {
                color: window.app.chartTheme().text,
                font: { family: 'Sarabun', size: 10, weight: '500' }
              },
              grace: '15%'
            }
          }
        }
      });
      window.app.chartExportButtons(id);
    },
    exportCSV: function() {
      if(window.app.dashboard.filteredOrders.length===0) return Swal.fire('ไม่มีข้อมูล', '', 'warning');
      const headers = Object.keys(window.app.dashboard.filteredOrders[0]); 
      let csvContent = "\uFEFF" + headers.join(",") + "\r\n";
      window.app.dashboard.filteredOrders.forEach(row => { 
        csvContent += headers.map(h => '"' + (row[h]?row[h].toString().replace(/"/g, '""'):"") + '"').join(",") + "\r\n"; 
      });
      const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
      const url = URL.createObjectURL(blob);
      const lnk = document.createElement("a");
      lnk.href = url;
      // ชื่อไฟล์ต้องเป็นวันที่ local — toISOString เป็น UTC ทำให้วันเลื่อนถอยหลังช่วงก่อน 7 โมงเช้า (โซน +7)
      const _d = new Date();
      lnk.download = 'Report_' + _d.getFullYear() + '-' + String(_d.getMonth() + 1).padStart(2, '0') + '-' + String(_d.getDate()).padStart(2, '0') + '.csv';
      document.body.appendChild(lnk); 
      lnk.click(); 
      document.body.removeChild(lnk);
    }
  },

  analytics: {
    chart: null,
    init: async function() {
      const content = document.getElementById('page-content');
      const tmpl = document.getElementById('tmpl-analytics');
      if(content && tmpl) content.innerHTML = tmpl.innerHTML;
      
      window.app.showLoading('กำลังโหลดข้อมูล...');
      try {
        const res = await window.app.api('GET_TABLE', { tableName: 'Orders' });
        Swal.close();
        if(res && res.status === 'success') {
           this.render(res.data);
        } else {
           this.renderLoadError(res ? res.message : 'ไม่สามารถโหลดข้อมูลยอดขายได้');
        }
      } catch(e) {
        Swal.close(); this.renderLoadError(e.message);
      }
    },
    renderLoadError: function(msg) {
      const content = document.getElementById('analytics-content');
      if (!content) { Swal.fire('Error', msg, 'error'); return; }
      content.innerHTML = '<div class="bg-white border border-slate-200 rounded-2xl shadow-sm">' + window.app.emptyState({
        icon: 'fa-exclamation-triangle',
        title: 'โหลดข้อมูลไม่สำเร็จ',
        subtitle: msg,
        actionLabel: 'ลองใหม่',
        onclick: 'window.app.analytics.init()'
      }) + '</div>';
    },
    render: function(orders) {
      // กัน async race: ผู้ใช้อาจสลับหน้าไปแล้วก่อนข้อมูลโหลดเสร็จ — element ปลายทางไม่อยู่ ห้ามเขียนทับ
      const analyticsEl = document.getElementById('analytics-content');
      if (!analyticsEl) return;
      const settings = window.app.globalData.settings || {};
      const startStr = settings.ReserveStart;
      const endStr = settings.ReserveEnd;
      if(!startStr || !endStr) {
         const canSetup = window.app.user && window.app.user.Role === 'Admin';
         analyticsEl.innerHTML = '<div class="bg-white border border-slate-200 rounded-2xl shadow-sm">' + window.app.emptyState({
           icon: 'fa-clock',
           title: 'ยังไม่ได้ตั้งค่าช่วงเวลาการจอง',
           subtitle: 'กรุณาตั้งค่า วันเริ่ม-วันสิ้นสุดการจอง ในเมนู "ตั้งเวลารับจองสินค้า" ก่อนใช้งานหน้านี้',
           actionLabel: canSetup ? 'ไปตั้งค่าช่วงเวลาการจอง' : '',
           onclick: canSetup ? "location.hash='bookingsettings'" : ''
         }) + '</div>';
         return;
      }
      
      const startDate = new Date(startStr);
      const endDate = new Date(endStr);
      const now = new Date();
      
      const formatTh = (d) => { const m=['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.']; return `${d.getDate()} ${m[d.getMonth()]} ${(d.getFullYear()+543).toString().substring(2)}`; };
      const rangeEl = document.getElementById('analyticsDateRange');
      if (rangeEl) rangeEl.innerText = `(${formatTh(startDate)} - ${formatTh(endDate)})`;

      // นับจำนวนวันตามปฏิทิน (ไม่สนใจเวลา) — ReserveStart/ReserveEnd กรอกผ่าน datetime-local จึงแทบไม่มีวันตรง 00:00 พร้อมกัน
      // เดิมใช้ Math.ceil ของผลต่างเป็นมิลลิวินาทีตรงๆ ทำให้ totalDays ปัดขึ้นเกินจำนวนวันจริง 1 วันเกือบทุกกรณี
      const startDateOnly = new Date(startDate.getFullYear(), startDate.getMonth(), startDate.getDate());
      const endDateOnly = new Date(endDate.getFullYear(), endDate.getMonth(), endDate.getDate());
      const totalDays = Math.max(1, Math.round((endDateOnly - startDateOnly) / (1000 * 60 * 60 * 24)));
      let currentDays = Math.max(0, Math.ceil((now - startDate) / (1000 * 60 * 60 * 24)));
      if (now > endDate) currentDays = totalDays;
      
      const validOrders = orders.filter(o => o['Order Status'] !== 'Cancelled' && o['Order Status'] !== 'ยกเลิก' && o.Timestamp);
      let totalMobile = 0;
      let totalAcc = 0;
      
      const dailyMobile = {};
      const dailyAcc = {};
      
      const products = window.app.globalData.products || [];
      const getCat = (sku) => {
         const p = products.find(x => x.SKU === sku);
         return p ? (p.Category || '').toString().trim() : '';
      };

      // แปลงวันที่เป็น key รูปแบบ YYYY-MM-DD (local time) — รองรับทั้ง ISO และ display string จาก sheet
      const toDateKey = (dt) => dt.getFullYear() + '-' + String(dt.getMonth()+1).padStart(2,'0') + '-' + String(dt.getDate()).padStart(2,'0');
      const startKey = toDateKey(startDate);
      const endKey = toDateKey(endDate);
      const nowKey = toDateKey(now);

      validOrders.forEach(o => {
          let cat = getCat(o.SKU);
          if (cat.includes('ของแถม')) return;

          let qty = parseInt(String(o.Qty || 0).replace(/,/g,''), 10);
          if(isNaN(qty)) qty = 0;
          let tsObj = new Date(o.Timestamp);
          if (isNaN(tsObj)) return;
          let d = toDateKey(tsObj);
          if (d < startKey || d > endKey) return; // นอกช่วงการจอง — ตัดออกทั้ง KPI และกราฟให้ตรงกัน
          
          if (cat === 'โมบาย') {
             totalMobile += qty;
             dailyMobile[d] = (dailyMobile[d] || 0) + qty;
          } else if (['อุปกรณ์เสริม', 'สมาร์ทวอทช์', 'หูฟัง'].includes(cat)) {
             totalAcc += qty;
             dailyAcc[d] = (dailyAcc[d] || 0) + qty;
          }
      });
      
      const totalSales = totalMobile + totalAcc;
      const avgPerDayMobile = currentDays > 0 ? (totalMobile / currentDays) : 0;
      const avgPerDayAcc = currentDays > 0 ? (totalAcc / currentDays) : 0;
      
      const forecastedTotal = Math.round((avgPerDayMobile + avgPerDayAcc) * totalDays);
      
      const tTot = document.getElementById('anKpiTotal'); if(tTot) tTot.innerText = totalSales.toLocaleString();
      const tMob = document.getElementById('anKpiMobile'); if(tMob) tMob.innerText = totalMobile.toLocaleString();
      const tAcc = document.getElementById('anKpiAcc'); if(tAcc) tAcc.innerText = totalAcc.toLocaleString();
      const tFor = document.getElementById('anKpiForecast'); if(tFor) tFor.innerText = forecastedTotal.toLocaleString();
      
      let labels = [];
      let actualMobile = [];
      let forecastMobile = [];
      let actualAcc = [];
      let forecastAcc = [];
      
      let cumMobile = 0;
      let cumAcc = 0;
      let projectedMobile = 0;
      let projectedAcc = 0;
      
      let dailyMobileArr = [];
      let dailyAccArr = [];
      
      let lastActualIdx = -1;
      for(let i=0; i<=totalDays; i++) {
         let d = new Date(startDateOnly.getTime() + (i * 24*60*60*1000));
         let dStr = toDateKey(d);
         labels.push(dStr);

         let dMob = dailyMobile[dStr] || 0;
         let dAcc = dailyAcc[dStr] || 0;

         if (dStr <= nowKey) {
            lastActualIdx = i;
            cumMobile += dMob;
            cumAcc += dAcc;
            
            dailyMobileArr.push(dMob);
            dailyAccArr.push(dAcc);
            
            projectedMobile = cumMobile;
            projectedAcc = cumAcc;
            
            actualMobile.push(cumMobile);
            forecastMobile.push(null);
            
            actualAcc.push(cumAcc);
            forecastAcc.push(null);
         } else {
            actualMobile.push(null);
            
            let pMob = Math.round(avgPerDayMobile);
            let pAcc = Math.round(avgPerDayAcc);
            
            dailyMobileArr.push(pMob);
            dailyAccArr.push(pAcc);
            
            projectedMobile += avgPerDayMobile;
            forecastMobile.push(Math.round(projectedMobile)); 
            
            actualAcc.push(null);
            projectedAcc += avgPerDayAcc;
            forecastAcc.push(Math.round(projectedAcc));
         }
      }
      
      if(lastActualIdx > -1 && lastActualIdx < totalDays) {
          // Connect the dashed line to the last point of the solid line
          forecastMobile[lastActualIdx] = actualMobile[lastActualIdx];
          forecastAcc[lastActualIdx] = actualAcc[lastActualIdx];
      }
      
      const ctx = document.getElementById('chartAnalytics');
      if(!ctx) return;
      if(this.chart) this.chart.destroy();
      
      if (typeof ChartDataLabels !== 'undefined') Chart.register(ChartDataLabels);
      
      this.chart = new Chart(ctx.getContext('2d'), {
         type: 'line',
         data: {
            labels: labels,
            datasets: [
               { label: 'โมบาย (Actual)', data: actualMobile, dailyData: dailyMobileArr, borderColor: '#3b82f6', backgroundColor: 'rgba(59, 130, 246, 0.1)', fill: true, tension: 0.4, borderWidth: 3, pointRadius: 4, pointHoverRadius: 6 },
               { label: 'โมบาย (Forecast)', data: forecastMobile, dailyData: dailyMobileArr, borderColor: '#93c5fd', borderDash: [5, 5], tension: 0.4, borderWidth: 3, pointRadius: 0, pointHoverRadius: 4 },
               { label: 'อุปกรณ์เสริม (Actual)', data: actualAcc, dailyData: dailyAccArr, borderColor: '#ec4899', backgroundColor: 'rgba(236, 72, 153, 0.1)', fill: true, tension: 0.4, borderWidth: 3, pointRadius: 4, pointHoverRadius: 6 },
               { label: 'อุปกรณ์เสริม (Forecast)', data: forecastAcc, dailyData: dailyAccArr, borderColor: '#f9a8d4', borderDash: [5, 5], tension: 0.4, borderWidth: 3, pointRadius: 0, pointHoverRadius: 4 }
            ]
         },
         options: {
            responsive: true, maintainAspectRatio: false,
            plugins: { 
               datalabels: { 
                  display: true, 
                  align: 'top', 
                  color: function(ctx) { return ctx.dataset.borderColor; },
                  font: { size: 9, weight: 'bold' },
                  formatter: function(value, ctx) {
                     if (value === null) return '';
                     if (ctx.dataset.label.includes('Forecast')) return ''; // ซ่อนตัวเลขบนเส้นฟอแคช
                     let daily = ctx.dataset.dailyData[ctx.dataIndex];
                     if (daily === 0 && ctx.dataset.label.includes('Actual')) return '';
                     return '+' + daily;
                  }
               }, 
               legend: { position: 'bottom', labels: { usePointStyle: true, boxWidth: 8 } },
               tooltip: {
                  callbacks: {
                     label: function(ctx) {
                        let val = ctx.raw;
                        let daily = ctx.dataset.dailyData[ctx.dataIndex];
                        return `${ctx.dataset.label}: ${val} (รายวัน: +${daily})`;
                     }
                  }
               }
            },
            scales: { y: { beginAtZero: true, grid: { borderDash: [2,4], color: window.app.chartTheme().grid } }, x: { grid: { display: false } } },
            interaction: { mode: 'index', intersect: false }
         }
      });
      window.app.chartExportButtons('chartAnalytics');
    }
  },

  target: {
    init: async function() {
      const content = document.getElementById('page-content');
      const tmpl = document.getElementById('tmpl-target');
      if(content && tmpl) content.innerHTML = tmpl.innerHTML;
      
      window.app.showLoading('กำลังโหลดข้อมูลเป้าหมาย...');
      try {
        const resOrders = await window.app.api('GET_TABLE', { tableName: 'Orders' });
        const resTarget = await window.app.api('GET_TABLE', { tableName: 'Target' });
        Swal.close();
        if(resOrders && resOrders.status === 'success' && resTarget && resTarget.status === 'success') {
           this.render(resTarget.data, resOrders.data);
        } else {
           this.renderLoadError('ไม่พบข้อมูล กรุณาตรวจสอบว่ามีชีต "Target" แล้วหรือไม่');
        }
      } catch(e) {
        Swal.close(); this.renderLoadError(e.message);
      }
    },
    renderLoadError: function(msg) {
      const tbody = document.getElementById('targetTableBody');
      if (!tbody) { Swal.fire('Error', msg, 'error'); return; }
      tbody.innerHTML = '<tr><td colspan="5">' + window.app.emptyState({
        icon: 'fa-exclamation-triangle',
        title: 'โหลดข้อมูลไม่สำเร็จ',
        subtitle: msg,
        actionLabel: 'ลองใหม่',
        onclick: 'window.app.target.init()'
      }) + '</td></tr>';
    },
    render: function(targets, orders) {
      // กัน async race: element อาจถูกเปลี่ยนหน้าไปแล้วระหว่างรอข้อมูล
      const targetBodyEl = document.getElementById('targetTableBody');
      if (!targetBodyEl) return;
      const settings = window.app.globalData.settings || {};
      const startStr = settings.ReserveStart;
      const endStr = settings.ReserveEnd;
      if(!startStr || !endStr) {
         const canSetup = window.app.user && window.app.user.Role === 'Admin';
         targetBodyEl.innerHTML = '<tr><td colspan="5">' + window.app.emptyState({
           icon: 'fa-clock',
           title: 'ยังไม่ได้ตั้งค่าช่วงเวลาการจอง',
           subtitle: 'กรุณาตั้งค่า วันเริ่ม-วันสิ้นสุดการจอง ในเมนู "ตั้งเวลารับจองสินค้า" ก่อนใช้งานหน้านี้',
           actionLabel: canSetup ? 'ไปตั้งค่าช่วงเวลาการจอง' : '',
           onclick: canSetup ? "location.hash='bookingsettings'" : ''
         }) + '</td></tr>';
         return;
      }
      
      const startDate = new Date(startStr);
      const endDate = new Date(endStr);
      const now = new Date();
      
      const formatTh = (d) => { const m=['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.']; return `${d.getDate()} ${m[d.getMonth()]} ${(d.getFullYear()+543).toString().substring(2)}`; };
      const rangeEl = document.getElementById('targetDateRange');
      if (rangeEl) rangeEl.innerText = `(${formatTh(startDate)} - ${formatTh(endDate)})`;
      
      // นับจำนวนวันตามปฏิทิน (ไม่สนใจเวลา) — เหมือน analytics.render กัน Math.ceil ปัดเกิน 1 วันเมื่อเวลาเริ่ม/สิ้นสุดไม่ตรง 00:00
      const startDateOnly = new Date(startDate.getFullYear(), startDate.getMonth(), startDate.getDate());
      const endDateOnly = new Date(endDate.getFullYear(), endDate.getMonth(), endDate.getDate());
      const totalDays = Math.max(1, Math.round((endDateOnly - startDateOnly) / (1000 * 60 * 60 * 24)));
      let currentDays = Math.max(0, Math.ceil((now - startDate) / (1000 * 60 * 60 * 24)));
      if (now > endDate) currentDays = totalDays;

      // แปลงวันที่เป็น key YYYY-MM-DD (local time) — เหมือน analytics.render เพื่อกรองออเดอร์ให้อยู่ในช่วงจองเดียวกัน
      const toDateKey = (dt) => dt.getFullYear() + '-' + String(dt.getMonth()+1).padStart(2,'0') + '-' + String(dt.getDate()).padStart(2,'0');
      const startKey = toDateKey(startDate);
      const endKey = toDateKey(endDate);

      const validOrders = orders.filter(o => {
          if (o['Order Status'] === 'Cancelled' || o['Order Status'] === 'ยกเลิก' || !o.Timestamp) return false;
          // นอกช่วงเวลาการจอง (ReserveStart/ReserveEnd) — ตัดออก ไม่งั้นยอดจองรวมออเดอร์เก่าข้ามแคมเปญทั้งหมด (Orders sheet ไม่เคยถูกล้าง)
          const tsObj = new Date(o.Timestamp);
          if (isNaN(tsObj)) return false;
          const d = toDateKey(tsObj);
          return d >= startKey && d <= endKey;
      });
      const salesByName = {};
      let totalMobileQty = 0;

      const products = window.app.globalData.products || [];
      const getCat = (sku) => {
         const p = products.find(x => x.SKU === sku);
         return p ? (p.Category || '').toString().trim() : '';
      };

      const branches = window.app.globalData.branches || [];

      // หา key ของคอลัมน์ Area ใน Branches แบบไม่สนตัวพิมพ์ (Area / AREA / area)
      const areaKey = branches.length > 0
         ? (Object.keys(branches[0]).find(k => k.toLowerCase().trim() === 'area') || 'Area')
         : 'Area';

      validOrders.forEach(o => {
          let cat = getCat(o.SKU);
          if (cat === 'โมบาย') {
             let qty = parseInt(String(o.Qty || 0).replace(/,/g,''), 10);
             if(!isNaN(qty) && qty > 0) {
                 totalMobileQty += qty;
                 let staff = (o['Staff'] || '').toString().trim().toUpperCase();
                 let branchInput = (o['Branch Code'] || '').toString().trim().toUpperCase();

                 if (staff) salesByName[staff] = (salesByName[staff] || 0) + qty;

                 const bInfo = branches.find(b =>
                     (b['Branch Code'] || '').toString().trim().toUpperCase() === branchInput ||
                     (b['Branch Name'] || '').toString().trim().toUpperCase() === branchInput
                 );

                 if (bInfo) {
                     let area = (bInfo[areaKey] || '').toString().trim().toUpperCase();
                     let branchName = (bInfo['Branch Name'] || '').toString().trim().toUpperCase();
                     let branchCode = (bInfo['Branch Code'] || '').toString().trim().toUpperCase();

                     if (area) salesByName[area] = (salesByName[area] || 0) + qty;
                     if (branchName) salesByName[branchName] = (salesByName[branchName] || 0) + qty;
                     if (branchCode && branchCode !== branchName) salesByName[branchCode] = (salesByName[branchCode] || 0) + qty;
                 } else {
                     // หาสาขาไม่เจอ — นับด้วยค่าที่บันทึกมาตรงๆ เผื่อชื่อใน Target ตรงกับค่านี้
                     if (branchInput) salesByName[branchInput] = (salesByName[branchInput] || 0) + qty;
                     salesByName['UNKNOWN AREA'] = (salesByName['UNKNOWN AREA'] || 0) + qty;
                 }
             }
          }
      });
      
      let html = '';
      if(!targets || targets.length === 0) {
          html = '<tr><td colspan="5" class="text-center py-8 text-slate-500">ไม่มีข้อมูลในชีต Target</td></tr>';
      } else {
          let actualKeys = Object.keys(targets[0]).filter(k => k !== '_rowIndex');
          
          let nameKey = actualKeys.find(k => k.toLowerCase() === 'area' || k.includes('Area') || k.includes('สาขา') || k.includes('พนักงาน') || k.includes('ชื่อ') || k.includes('รับเป้า')) || actualKeys[0];
          let targetKey = actualKeys.find(k => k !== nameKey && (k === 'เป้า' || k.includes('เป้า') || k.toLowerCase().includes('target'))) || actualKeys.find(k => k !== nameKey) || actualKeys[1];
          
          
          let totalTargetSum = 0;
          let totalActualSum = 0;
          let totalForecastSum = 0;
          
          targets.forEach(t => {
              let name = (t[nameKey] || '').toString().trim();
              if(!name) return;
              
              // ลบลูกน้ำ (comma) ออกก่อนแปลงเป็นตัวเลข เพื่อป้องกันปัญหาการดึงข้อมูลผิดพลาด
              let targetValStr = (t[targetKey] || '').toString().replace(/,/g, '').trim();
              let targetVal = parseFloat(targetValStr) || 0;
              let upperName = name.toUpperCase();
              // "ALL" / "ALL BRANCHES" = ยอดรวมโมบายทุกสาขา
              let actualVal = (upperName === 'ALL' || upperName === 'ALL BRANCHES') ? totalMobileQty : (salesByName[upperName] || 0);
              
              let displayName = name;
              if (window.app.globalData.branches) {
                  const bInfo = window.app.globalData.branches.find(b => b['Branch Code'] === name || b['Branch Name'] === name);
                  if (bInfo) displayName = bInfo['Branch Name'];
              }
              if (displayName === name && window.app.globalData.members) {
                  const mInfo = window.app.globalData.members.find(m => m['Username'] === name || m['Name'] === name);
                  if (mInfo) displayName = mInfo['Name'] || mInfo['Username'];
              }
              
              const eName = window.app.esc(name); const eDisp = window.app.esc(displayName);
              let nameHtml = displayName === name ? eName : `${eDisp} <span class="text-[10px] text-slate-400 font-normal block md:inline md:ml-1">(${eName})</span>`;
              
              let avgPerDay = currentDays > 0 ? (actualVal / currentDays) : 0;
              let forecastVal = Math.round(avgPerDay * totalDays);
              let diffVal = actualVal - targetVal;
              
              totalTargetSum += targetVal;
              totalActualSum += actualVal;
              totalForecastSum += forecastVal;
              
              let diffClass = diffVal >= 0 ? 'text-emerald-600 bg-emerald-50' : 'text-rose-600 bg-rose-50';
              let diffIcon = diffVal >= 0 ? '<i class="fas fa-arrow-up mr-1"></i>' : '<i class="fas fa-arrow-down mr-1"></i>';
              
              html += `
              <tr class="hover:bg-slate-50 border-b border-slate-100 transition-colors">
                 <td class="py-4 px-4 font-bold text-slate-800">${nameHtml}</td>
                 <td class="py-4 px-4 text-center text-slate-600">${targetVal.toLocaleString()}</td>
                 <td class="py-4 px-4 text-center font-bold text-indigo-600">${actualVal.toLocaleString()}</td>
                 <td class="py-4 px-4 text-center"><span class="inline-flex items-center px-2.5 py-1 rounded-lg text-xs font-bold ${diffClass}">${diffIcon}${diffVal > 0 ? '+' : ''}${diffVal.toLocaleString()}</span></td>
                 <td class="py-4 px-4 text-center font-bold text-amber-500">${forecastVal.toLocaleString()}</td>
              </tr>
              `;
          });
          
          let tDiff = totalActualSum - totalTargetSum;
          let tDiffClass = tDiff >= 0 ? 'text-emerald-600' : 'text-rose-600';
          let tDiffIcon = tDiff >= 0 ? '<i class="fas fa-arrow-up mr-1"></i>' : '<i class="fas fa-arrow-down mr-1"></i>';
          html += `
              <tr class="bg-indigo-50/50 border-t-2 border-indigo-100">
                 <td class="py-4 px-4 font-black text-indigo-900 text-right">รวมทั้งหมด:</td>
                 <td class="py-4 px-4 text-center font-black text-indigo-900">${totalTargetSum.toLocaleString()}</td>
                 <td class="py-4 px-4 text-center font-black text-indigo-700">${totalActualSum.toLocaleString()}</td>
                 <td class="py-4 px-4 text-center font-black ${tDiffClass}">${tDiffIcon}${tDiff > 0 ? '+' : ''}${tDiff.toLocaleString()}</td>
                 <td class="py-4 px-4 text-center font-black text-amber-600">${totalForecastSum.toLocaleString()}</td>
              </tr>
          `;
      }
      
      targetBodyEl.innerHTML = html;
      const targetCard = targetBodyEl.closest('.chart-card');
      if (targetCard) window.app.tableExportButtons(targetCard);
    }
  },

  // สรุปยอดจองรายวัน: แถว = วันที่ (Timestamp) / คอลัมน์ = Product Name จัดกลุ่ม, sub-column = Capacity (ความจุ/รุ่นย่อย)
  bookingSummary: {
    rawOrders: [],
    currentCategory: '',
    init: async function() {
      const content = document.getElementById('page-content');
      const tmpl = document.getElementById('tmpl-bookingsummary');
      if (content && tmpl) content.innerHTML = tmpl.innerHTML;

      window.app.showLoading('กำลังโหลดข้อมูลสรุปยอดจอง...');
      try {
        const res = await window.app.api('GET_ADVANCED_DASHBOARD', {});
        Swal.close();
        if (res && res.status === 'success') {
          this.rawOrders = res.data.orders || [];
          this.setupCategoryFilter();
          this.render();
        } else {
          this.renderLoadError(res ? res.message : 'ไม่สามารถโหลดข้อมูลสรุปยอดจองได้');
        }
      } catch (e) {
        Swal.close(); this.renderLoadError(e.message);
      }
    },
    setupCategoryFilter: function() {
      const sel = document.getElementById('bsCategoryFilter');
      if (!sel) return;
      const products = window.app.globalData.products || [];
      const seen = {}; const cats = [];
      products.forEach(p => {
        const c = (p['Category'] || '').toString().trim();
        if (c && !seen[c]) { seen[c] = true; cats.push(c); }
      });
      // ให้ "โมบาย" ขึ้นก่อนเสมอถ้ามี — ที่เหลือคงลำดับตามที่เจอในชีต Products
      cats.sort((a, b) => (a === 'โมบาย' ? -1 : b === 'โมบาย' ? 1 : 0));
      sel.innerHTML = cats.map(c => '<option value="' + window.app.esc(c) + '">' + window.app.esc(c) + '</option>').join('');
      this.currentCategory = cats.includes('โมบาย') ? 'โมบาย' : (cats[0] || '');
      sel.value = this.currentCategory;
    },
    onCategoryChange: function() {
      const sel = document.getElementById('bsCategoryFilter');
      this.currentCategory = sel ? sel.value : '';
      this.render();
    },
    // error state มาตรฐาน (5A.4) พร้อมปุ่มลองใหม่ — ห้ามเงียบเฉยตาม error contract
    renderLoadError: function(msg) {
      const wrap = document.getElementById('bookingSummaryTableWrap');
      if (!wrap) { Swal.fire('Error', msg, 'error'); return; }
      wrap.innerHTML = window.app.emptyState({
        icon: 'fa-exclamation-triangle',
        title: 'โหลดข้อมูลไม่สำเร็จ',
        subtitle: msg,
        actionLabel: 'ลองใหม่',
        onclick: 'window.app.bookingSummary.init()'
      });
    },
    // สร้าง HTML ตาราง pivot หนึ่งตาราง แบบสลับแกน: แถว = Model/Capacity (สินค้า), คอลัมน์ = columns[] (วันที่ หรือ สถานะจอง), ท้ายตาราง Grand Total
    // rowCombos: [{model, variant, label}] เรียงตามยอดรวมมาก->น้อย ; columns: [{key,label}] ; matrix: columns[i].key -> model -> variant -> qty
    buildTransposedPivotTable: function(title, columns, matrix, rowCombos, rowHeaderLabel) {
      let headRow = '<th class="py-2.5 px-4 text-left text-[11px] font-bold text-slate-500 uppercase tracking-wider sticky left-0 bg-slate-50 z-20">' + window.app.esc(rowHeaderLabel) + '</th>';
      columns.forEach(c => {
        headRow += '<th class="py-2.5 px-3 text-center text-[11px] font-bold text-slate-500 uppercase tracking-wider border-l border-slate-100">' + window.app.esc(c.label) + '</th>';
      });
      headRow += '<th class="py-2.5 px-4 text-right text-[11px] font-bold text-slate-500 uppercase tracking-wider border-l-2 border-slate-300 bg-slate-50">ยอดรวม</th>';

      let bodyRows = '';
      const colTotals = {}; // colKey -> qty
      let grandTotal = 0;
      rowCombos.forEach(r => {
        let rowTotal = 0;
        let cells = '';
        columns.forEach(c => {
          const colMatrix = matrix[c.key] || {};
          const qty = (colMatrix[r.model] && colMatrix[r.model][r.variant]) || 0;
          rowTotal += qty;
          colTotals[c.key] = (colTotals[c.key] || 0) + qty;
          cells += '<td class="py-2.5 px-3 text-center text-slate-600 border-l border-slate-100">' + (qty > 0 ? qty.toLocaleString() : '<span class="text-slate-300">-</span>') + '</td>';
        });
        grandTotal += rowTotal;
        bodyRows += '<tr class="hover:bg-slate-50 transition-colors">'
          + '<td class="py-2.5 px-4 text-slate-700 font-medium sticky left-0 bg-white z-10">' + window.app.esc(r.label) + '</td>'
          + cells
          + '<td class="py-2.5 px-4 text-right text-indigo-600 font-black border-l-2 border-slate-300 bg-slate-50/60">' + rowTotal.toLocaleString() + '</td>'
          + '</tr>';
      });

      let footCells = '';
      columns.forEach(c => {
        footCells += '<td class="py-3 px-3 text-center text-slate-800 border-l border-slate-100">' + (colTotals[c.key] || 0).toLocaleString() + '</td>';
      });
      const footRow = '<tr class="bg-slate-100 font-black border-t-2 border-slate-300">'
        + '<td class="py-3 px-4 text-slate-800 sticky left-0 bg-slate-100 z-10">Grand Total</td>'
        + footCells
        + '<td class="py-3 px-4 text-right text-indigo-700 border-l-2 border-slate-300">' + grandTotal.toLocaleString() + '</td>'
        + '</tr>';

      const tableHtml = '<table class="w-full text-sm text-left whitespace-nowrap">'
        + '<thead class="sticky top-0 z-10"><tr class="bg-slate-50/95 backdrop-blur-sm border-b border-slate-200">' + headRow + '</tr></thead>'
        + '<tbody class="divide-y divide-slate-100">' + bodyRows + '</tbody>'
        + '<tfoot>' + footRow + '</tfoot>'
        + '</table>';

      return '<div class="chart-card !p-0 overflow-hidden mb-6">'
        + '<div class="bg-slate-50 border-b border-slate-200/80 p-4">'
        + '<h6 class="!mb-0"><i class="fas fa-table text-indigo-500"></i>' + window.app.esc(title) + '</h6>'
        + '</div>'
        + '<div class="w-full overflow-x-auto custom-scrollbar max-h-[400px]">' + tableHtml + '</div>'
        + '</div>';
    },
    render: function() {
      // กัน async race: element อาจถูกเปลี่ยนหน้าไปแล้วระหว่างรอข้อมูล
      const wrap = document.getElementById('bookingSummaryTableWrap');
      if (!wrap) return;

      const category = this.currentCategory;
      if (!category) {
        wrap.innerHTML = window.app.emptyState({ icon: 'fa-boxes-stacked', title: 'ไม่มีข้อมูลหมวดหมู่สินค้า', subtitle: '' });
        return;
      }

      // SKU -> {model, variant, category} จากชีต Products (Model คือกลุ่มรุ่นหลัก, Capacity คือ sub-column ความจุ)
      const products = window.app.globalData.products || [];
      const skuInfo = {};
      products.forEach(p => {
        if (!p.SKU) return;
        const model = (p['Model'] || '').toString().trim() || (p['Product Name'] || '').toString().trim() || 'ไม่ระบุรุ่น';
        const cap = (p['Capacity'] || '').toString().trim();
        const cat = (p['Category'] || '').toString().trim() || 'ไม่ระบุหมวดหมู่';
        skuInfo[p.SKU] = { model: model, variant: (cap && cap !== '-') ? cap : '-', category: cat };
      });

      // ห้ามใช้ toISOString() ทำ date key — เป็น UTC ทำให้วันเลื่อนถอยหลัง 1 วันในโซน UTC+7 (กฎข้อ 1 ของโปรเจกต์)
      const toLocalKey = (d) => d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
      const formatDisplay = (d) => d.getDate() + '/' + (d.getMonth() + 1) + '/' + d.getFullYear();

      // แถว Reservation Status มีแค่แถวแรกของแต่ละ OrderID — ต้อง join กลับด้วย OrderID (เหมือน renderProductQuotaTable)
      const orderResStatusMap = {};
      this.rawOrders.forEach(o => { if (o['Reservation Status'] && o['Reservation Status'].toString().trim() !== '') orderResStatusMap[o.OrderID] = o['Reservation Status']; });

      // ตารางที่ 1: dateMatrix[dateKey][model][variant] = qty (กรองเฉพาะหมวดหมู่ที่เลือกจาก dropdown เท่านั้น)
      const dateMatrix = {};
      const dateDisplay = {};    // dateKey -> "28/9/2026"
      const modelVariantTotals = {}; // model -> variant -> qty (ใช้ร่วมทั้ง 2 ตาราง สำหรับจัดลำดับแถว)

      // ตารางที่ 2: resMatrix['T'|'F'][model][variant] = qty (หมวดหมู่เดียวกับตารางที่ 1)
      const resMatrix = { 'T': {}, 'F': {} };

      this.rawOrders.forEach(o => {
        if (o['Order Status'] === 'Cancelled') return;
        if (o.SKU === 'DISCOUNT') return; // แถวส่วนลดไม่ใช่สินค้า
        let qty = parseInt((o.Qty || '0').toString().replace(/,/g, ''));
        if (isNaN(qty) || qty <= 0) return;

        const info = skuInfo[o.SKU] || { model: (o['Product Name'] || '').toString().trim() || 'ไม่ระบุรุ่น', variant: '-', category: 'ไม่ระบุหมวดหมู่' };
        if (info.category !== category) return; // กรองเฉพาะหมวดหมู่ที่เลือกอยู่
        const model = info.model, variant = info.variant;

        if (!modelVariantTotals[model]) modelVariantTotals[model] = {};
        modelVariantTotals[model][variant] = (modelVariantTotals[model][variant] || 0) + qty;

        if (o.Timestamp) {
          const d = new Date(o.Timestamp);
          if (!isNaN(d.getTime())) {
            const dateKey = toLocalKey(d);
            dateDisplay[dateKey] = formatDisplay(d);
            if (!dateMatrix[dateKey]) dateMatrix[dateKey] = {};
            if (!dateMatrix[dateKey][model]) dateMatrix[dateKey][model] = {};
            dateMatrix[dateKey][model][variant] = (dateMatrix[dateKey][model][variant] || 0) + qty;
          }
        }

        const rStatus = (o['Reservation Status'] || orderResStatusMap[o.OrderID] || '').toString();
        let sKey = null;
        if (rStatus.includes('จอง T')) sKey = 'T';
        else if (rStatus.includes('จอง F')) sKey = 'F';
        if (sKey) {
          if (!resMatrix[sKey][model]) resMatrix[sKey][model] = {};
          resMatrix[sKey][model][variant] = (resMatrix[sKey][model][variant] || 0) + qty;
        }
      });

      const dateKeys = Object.keys(dateMatrix).sort();
      const hasResData = Object.keys(resMatrix['T']).length > 0 || Object.keys(resMatrix['F']).length > 0;

      if (dateKeys.length === 0 && !hasResData) {
        wrap.innerHTML = window.app.emptyState({ icon: 'fa-calendar-times', title: 'ยังไม่มีข้อมูลยอดจอง (หมวดหมู่ ' + category + ')', subtitle: 'เมื่อมีการคีย์ออเดอร์แรก ข้อมูลสรุปจะแสดงที่นี่' });
        return;
      }

      // จัดลำดับแถว Model/Capacity ตามยอดรวมมาก->น้อย — ใช้ร่วมกันทั้ง 2 ตาราง
      const rowCombos = [];
      const modelTotals = {};
      Object.keys(modelVariantTotals).forEach(m => {
        modelTotals[m] = Object.values(modelVariantTotals[m]).reduce((s, v) => s + v, 0);
      });
      const modelNames = Object.keys(modelVariantTotals).sort((a, b) => modelTotals[b] - modelTotals[a]);
      modelNames.forEach(m => {
        const variants = Object.keys(modelVariantTotals[m]).sort((a, b) => modelVariantTotals[m][b] - modelVariantTotals[m][a]);
        variants.forEach(v => rowCombos.push({ model: m, variant: v, label: (v && v !== '-') ? (m + ' (' + v + ')') : m }));
      });

      let html = '';

      // ตารางที่ 1 — แถว = Model (Capacity), คอลัมน์ = วันที่จอง
      if (dateKeys.length > 0) {
        const columns = dateKeys.map(dk => ({ key: dk, label: dateDisplay[dk] }));
        html += this.buildTransposedPivotTable('สรุปยอดจองรายวัน (' + category + ')', columns, dateMatrix, rowCombos, 'รุ่น (ความจุ)');
      }

      // ตารางที่ 2 — แถว = Model (Capacity), คอลัมน์ = สถานะจอง (T/F)
      if (hasResData) {
        const columns = [{ key: 'T', label: 'T' }, { key: 'F', label: 'F' }];
        html += this.buildTransposedPivotTable('สรุปยอดจองตามสถานะการจอง (' + category + ')', columns, resMatrix, rowCombos, 'รุ่น (ความจุ)');
      }

      wrap.innerHTML = html;
      wrap.querySelectorAll('.chart-card').forEach(c => window.app.tableExportButtons(c));
    }
  },

  // สรุปยอดตามรุ่น/แอเรีย/ช่องทางขาย: 3 ตาราง กรองด้วยหมวดหมู่สินค้า (ค่าเริ่มต้น "โมบาย")
  salesSummary: {
    rawOrders: [],
    currentCategory: '',
    init: async function() {
      const content = document.getElementById('page-content');
      const tmpl = document.getElementById('tmpl-salessummary');
      if (content && tmpl) content.innerHTML = tmpl.innerHTML;

      window.app.showLoading('กำลังโหลดข้อมูลสรุปยอด...');
      try {
        const res = await window.app.api('GET_ADVANCED_DASHBOARD', {});
        Swal.close();
        if (res && res.status === 'success') {
          this.rawOrders = res.data.orders || [];
          this.setupCategoryFilter();
          this.render();
        } else {
          this.renderLoadError(res ? res.message : 'ไม่สามารถโหลดข้อมูลได้');
        }
      } catch (e) {
        Swal.close(); this.renderLoadError(e.message);
      }
    },
    // error state มาตรฐาน (5A.4) พร้อมปุ่มลองใหม่ — ห้ามเงียบเฉยตาม error contract
    renderLoadError: function(msg) {
      const wrap = document.getElementById('salesSummaryTablesWrap');
      if (!wrap) { Swal.fire('Error', msg, 'error'); return; }
      wrap.innerHTML = window.app.emptyState({
        icon: 'fa-exclamation-triangle',
        title: 'โหลดข้อมูลไม่สำเร็จ',
        subtitle: msg,
        actionLabel: 'ลองใหม่',
        onclick: 'window.app.salesSummary.init()'
      });
    },
    setupCategoryFilter: function() {
      const sel = document.getElementById('massCategoryFilter');
      if (!sel) return;
      const products = window.app.globalData.products || [];
      const seen = {}; const cats = [];
      products.forEach(p => {
        const c = (p['Category'] || '').toString().trim();
        if (c && !seen[c]) { seen[c] = true; cats.push(c); }
      });
      // ให้ "โมบาย" ขึ้นก่อนเสมอถ้ามี — ที่เหลือคงลำดับตามที่เจอในชีต Products
      cats.sort((a, b) => (a === 'โมบาย' ? -1 : b === 'โมบาย' ? 1 : 0));
      sel.innerHTML = cats.map(c => '<option value="' + window.app.esc(c) + '">' + window.app.esc(c) + '</option>').join('');
      this.currentCategory = cats.includes('โมบาย') ? 'โมบาย' : (cats[0] || '');
      sel.value = this.currentCategory;
    },
    onCategoryChange: function() {
      const sel = document.getElementById('massCategoryFilter');
      this.currentCategory = sel ? sel.value : '';
      this.render();
    },
    // ตัวช่วยสร้างตาราง pivot 2 มิติแบบเรียบ (rows x columns -> qty ตรงๆ ไม่มีการจัดกลุ่มย่อยแบบ Model/Capacity) พร้อม Grand Total ทั้งแถวและคอลัมน์
    buildFlatPivotTable: function(title, columns, matrix, rows, rowHeaderLabel) {
      // หัวตารางโทนเดียวกับตารางสรุปหน้าอื่น (slate อ่อน + ตัวเทา) + ตรึงคอลัมน์แรก (Model/Product Name/แอเรีย) ให้เหมือนหน้าสรุปยอดจองรายวัน (owner request 2026-07-12, เดิมสั่งไม่ตรึงเมื่อ 2026-07-11)
      let headRow = '<th class="py-2.5 px-4 text-left text-[11px] font-bold text-slate-500 uppercase tracking-wider sticky left-0 bg-slate-50 z-20">' + window.app.esc(rowHeaderLabel) + '</th>';
      columns.forEach(c => {
        headRow += '<th class="py-2.5 px-3 text-center text-[11px] font-bold text-slate-500 uppercase tracking-wider border-l border-slate-200">' + window.app.esc(c.label) + '</th>';
      });
      headRow += '<th class="py-2.5 px-4 text-right text-[11px] font-bold text-slate-500 uppercase tracking-wider border-l-2 border-slate-300">Grand Total</th>';

      let bodyRows = '';
      const colTotals = {}; // colKey -> qty
      let grandTotal = 0;
      rows.forEach(r => {
        const rowMatrix = matrix[r.key] || {};
        let rowTotal = 0;
        let cells = '';
        columns.forEach(c => {
          const qty = rowMatrix[c.key] || 0;
          rowTotal += qty;
          colTotals[c.key] = (colTotals[c.key] || 0) + qty;
          cells += '<td class="py-2.5 px-3 text-center text-slate-600 border-l border-slate-100">' + (qty > 0 ? qty.toLocaleString() : '') + '</td>';
        });
        grandTotal += rowTotal;
        bodyRows += '<tr class="hover:bg-slate-50 transition-colors">'
          + '<td class="py-2.5 px-4 text-slate-700 font-medium sticky left-0 bg-white z-10">' + window.app.esc(r.label) + '</td>'
          + cells
          + '<td class="py-2.5 px-4 text-right text-slate-700 font-bold border-l-2 border-slate-300 bg-slate-50/60">' + (rowTotal > 0 ? rowTotal.toLocaleString() : '') + '</td>'
          + '</tr>';
      });

      let footCells = '';
      columns.forEach(c => {
        footCells += '<td class="py-3 px-3 text-center text-slate-800 border-l border-slate-100">' + (colTotals[c.key] || 0).toLocaleString() + '</td>';
      });
      const footRow = '<tr class="bg-slate-100 font-black border-t-2 border-slate-300">'
        + '<td class="py-3 px-4 text-slate-800 sticky left-0 bg-slate-100 z-10">Grand Total</td>'
        + footCells
        + '<td class="py-3 px-4 text-right text-amber-700 border-l-2 border-slate-300">' + grandTotal.toLocaleString() + '</td>'
        + '</tr>';

      const tableHtml = '<table class="w-full text-sm text-left whitespace-nowrap">'
        + '<thead class="sticky top-0 z-10"><tr class="bg-slate-50/95 backdrop-blur-sm border-b border-slate-200">' + headRow + '</tr></thead>'
        + '<tbody class="divide-y divide-slate-100">' + bodyRows + '</tbody>'
        + '<tfoot>' + footRow + '</tfoot>'
        + '</table>';

      return '<div class="chart-card !p-0 overflow-hidden mb-6">'
        + '<div class="bg-slate-50 border-b border-slate-200/80 p-4">'
        + '<h6 class="!mb-0"><i class="fas fa-table text-indigo-500"></i>' + window.app.esc(title) + '</h6>'
        + '</div>'
        + '<div class="w-full overflow-x-auto custom-scrollbar max-h-[500px]">' + tableHtml + '</div>'
        + '</div>';
    },
    render: function() {
      // กัน async race: element อาจถูกเปลี่ยนหน้าไปแล้วระหว่างรอข้อมูล
      const wrap = document.getElementById('salesSummaryTablesWrap');
      if (!wrap) return;

      const category = this.currentCategory;
      if (!category) {
        wrap.innerHTML = window.app.emptyState({ icon: 'fa-boxes-stacked', title: 'ไม่มีข้อมูลหมวดหมู่สินค้า', subtitle: '' });
        return;
      }

      const products = (window.app.globalData.products || []).filter(p => (p['Category'] || '').toString().trim() === category);
      if (products.length === 0) {
        wrap.innerHTML = window.app.emptyState({ icon: 'fa-boxes-stacked', title: 'ไม่มีสินค้าในหมวดหมู่นี้', subtitle: '' });
        return;
      }

      // SKU -> {modelCap, productName} — modelCap = Model + Capacity (ไม่รวมสี), productName = ชื่อเต็มต่อ SKU (รวมสีตามที่บันทึกในชีต)
      const skuInfo = {};
      const modelCapRowsSeen = {};
      const modelCapRows = []; // [{key,label}] ตามลำดับที่เจอในชีต Products
      const productNameRows = []; // [{key,label}] ใช้ SKU เป็น key กันชื่อซ้ำข้ามสี/ตัวเลือกที่ไม่ตั้งใจ

      products.forEach(p => {
        if (!p.SKU) return;
        const model = (p['Model'] || '').toString().trim() || (p['Product Name'] || '').toString().trim() || 'ไม่ระบุรุ่น';
        const cap = (p['Capacity'] || '').toString().trim();
        const modelCap = (cap && cap !== '-') ? (model + ' ' + cap) : model;
        const pName = (p['Product Name'] || '').toString().trim() || modelCap;
        skuInfo[p.SKU] = { modelCap: modelCap, productName: pName };
        if (!modelCapRowsSeen[modelCap]) { modelCapRowsSeen[modelCap] = true; modelCapRows.push({ key: modelCap, label: modelCap }); }
        productNameRows.push({ key: p.SKU, label: pName });
      });

      // คอลัมน์ Channel — ใช้ลำดับจากชีต Channels ถ้ามี ไม่งั้น fallback เป็นค่าที่เจอจริงในออเดอร์
      // normChannelMap: ชื่อช่องทาง (ตัดช่องว่าง+lowercase) -> ชื่อมาตรฐาน — กันไม่ให้ช่องทางเดียวกันที่พิมพ์เว้นวรรค/ตัวพิมพ์เล็กใหญ่ต่างกันกลายเป็นคนละคอลัมน์ (1 ช่องทาง = 1 หัวคอลัมน์เท่านั้น)
      const channelsSheet = window.app.globalData.channels || [];
      const channelColumns = [];
      const normChannelMap = {};
      channelsSheet.forEach(c => {
        const name = (c['Channel Name'] || '').toString().trim();
        if (!name) return;
        const norm = name.toLowerCase();
        if (!(norm in normChannelMap)) { normChannelMap[norm] = name; channelColumns.push({ key: name, label: name }); }
      });
      const resolveChannel = (raw) => {
        const trimmed = (raw || '').toString().trim();
        if (!trimmed) return 'ไม่ระบุช่องทาง';
        const norm = trimmed.toLowerCase();
        if (!(norm in normChannelMap)) { normChannelMap[norm] = trimmed; channelColumns.push({ key: trimmed, label: trimmed }); }
        return normChannelMap[norm];
      };

      // แถว Area — join ผ่าน Branch Code จากชีต Branches (หา key "Area" แบบไม่สนตัวพิมพ์ เหมือน target module)
      const branches = window.app.globalData.branches || [];
      const areaKey = branches.length > 0 ? (Object.keys(branches[0]).find(k => k.toLowerCase().trim() === 'area') || 'Area') : 'Area';
      const branchAreaMap = {}; // Branch Code (upper) -> Area
      const areaRowsSeen = {};
      const areaRows = [];
      branches.forEach(b => {
        const code = (b['Branch Code'] || '').toString().trim().toUpperCase();
        const area = (b[areaKey] || '').toString().trim();
        if (code && area) branchAreaMap[code] = area;
        if (area && !areaRowsSeen[area]) { areaRowsSeen[area] = true; areaRows.push({ key: area, label: area }); }
      });

      // สะสมยอด: matrix1[modelCap][channel] / matrix2[area][modelCap] / matrix3[SKU][channel]
      const matrix1 = {}, matrix2 = {}, matrix3 = {};
      const UNMAPPED_AREA = 'ไม่ระบุแอเรีย';
      let hasUnmappedArea = false;

      this.rawOrders.forEach(o => {
        if (o['Order Status'] === 'Cancelled') return;
        if (o.SKU === 'DISCOUNT') return; // แถวส่วนลดไม่ใช่สินค้า
        let qty = parseInt((o.Qty || '0').toString().replace(/,/g, ''));
        if (isNaN(qty) || qty <= 0) return;
        const info = skuInfo[o.SKU];
        if (!info) return; // สินค้าไม่ได้อยู่ในหมวดหมู่ที่กำลังกรอง — ข้าม

        const channel = resolveChannel(o.Channel);
        const branchCode = (o['Branch Code'] || '').toString().trim().toUpperCase();
        const area = branchAreaMap[branchCode] || UNMAPPED_AREA;
        if (area === UNMAPPED_AREA) hasUnmappedArea = true;

        if (!matrix1[info.modelCap]) matrix1[info.modelCap] = {};
        matrix1[info.modelCap][channel] = (matrix1[info.modelCap][channel] || 0) + qty;

        if (!matrix2[area]) matrix2[area] = {};
        matrix2[area][info.modelCap] = (matrix2[area][info.modelCap] || 0) + qty;

        if (!matrix3[o.SKU]) matrix3[o.SKU] = {};
        matrix3[o.SKU][channel] = (matrix3[o.SKU][channel] || 0) + qty;
      });

      // ออเดอร์ที่หาสาขา/แอเรียไม่เจอ — เพิ่มแถว "ไม่ระบุแอเรีย" ท้ายตารางที่ 3
      if (hasUnmappedArea && !areaRowsSeen[UNMAPPED_AREA]) areaRows.push({ key: UNMAPPED_AREA, label: UNMAPPED_AREA });

      let html = '';
      html += this.buildFlatPivotTable('ยอดจองตามรุ่น × ช่องทางขาย', channelColumns, matrix1, modelCapRows, 'Model');
      html += this.buildFlatPivotTable('ยอดจองตามสินค้า (รวมสี) × ช่องทางขาย', channelColumns, matrix3, productNameRows, 'Product Name');

  // สรุปข้อมูลจองทั้งหมด: ย้ายมาจากหน้า Dashboard (owner request) — ใช้ rawOrders (ยอดรวมทั้งหมด) ไม่มีตัวกรองวันที่/สาขา
  // เพราะ "โควต้า"/"คงเหลือ" เป็นค่าสต๊อกปัจจุบัน ไม่มีมิติเวลา — หนึ่งการ์ด/ตาราง ต่อหมวดหมู่ (Category)
  allBookingSummary: {
    rawOrders: [],
    init: async function() {
      const content = document.getElementById('page-content');
      const tmpl = document.getElementById('tmpl-allbookingsummary');
      if (content && tmpl) content.innerHTML = tmpl.innerHTML;

      window.app.showLoading('กำลังโหลดข้อมูลสรุปการจอง...');
      try {
        const res = await window.app.api('GET_ADVANCED_DASHBOARD', {});
        Swal.close();
        if (res && res.status === 'success') {
          this.rawOrders = res.data.orders || [];
          this.render();
        } else {
          this.renderLoadError(res ? res.message : 'ไม่สามารถโหลดข้อมูลได้');
        }
      } catch (e) {
        Swal.close(); this.renderLoadError(e.message);
      }
    },
    // error state มาตรฐาน (5A.4) พร้อมปุ่มลองใหม่ — ห้ามเงียบเฉยตาม error contract
    renderLoadError: function(msg) {
      const container = document.getElementById('allBookingSummaryTablesContainer');
      if (!container) { Swal.fire('Error', msg, 'error'); return; }
      container.innerHTML = window.app.emptyState({
        icon: 'fa-exclamation-triangle',
        title: 'โหลดข้อมูลไม่สำเร็จ',
        subtitle: msg,
        actionLabel: 'ลองใหม่',
        onclick: 'window.app.allBookingSummary.init()'
      });
    },
    // Orders ไม่มีคอลัมน์ Category ของตัวเอง จึงต้อง join ผ่าน SKU กับ Products sheet เพื่อรู้ว่าแต่ละแถวออเดอร์อยู่หมวดไหน
    render: function() {
      // กัน async race: element อาจถูกเปลี่ยนหน้าไปแล้วระหว่างรอข้อมูล
      const container = document.getElementById('allBookingSummaryTablesContainer');
      if (!container) return;

      const products = window.app.globalData.products || [];
      const skuCategory = {};
      const catData = {}; // Category -> { productName: {stock,t,f} }
      products.forEach(p => {
        const name = (p['Product Name'] || '').toString().trim(); if (!name) return;
        const cat = (p['Category'] || '').toString().trim() || 'ไม่ระบุหมวดหมู่';
        if (p.SKU) skuCategory[p.SKU] = cat;
        let stock = parseFloat((p.Stock || '0').toString().replace(/,/g, '')); if (isNaN(stock)) stock = 0;
        if (!catData[cat]) catData[cat] = {};
        if (!catData[cat][name]) catData[cat][name] = { stock: 0, t: 0, f: 0 };
        catData[cat][name].stock += stock;
      });
      const orderResStatusMap = {};
      this.rawOrders.forEach(o => { if (o['Reservation Status'] && o['Reservation Status'].trim() !== '') { orderResStatusMap[o.OrderID] = o['Reservation Status']; } });
      this.rawOrders.forEach(o => {
        if (o['Order Status'] === 'Cancelled') return;
        if (o.SKU === 'DISCOUNT') return; // แถวส่วนลดไม่ใช่สินค้า — Product Name ของมันคือชื่อโปรโมชั่น
        const name = (o['Product Name'] || '').toString().trim();
        if (!name) return;
        const cat = skuCategory[o.SKU] || 'ไม่ระบุหมวดหมู่';
        if (!catData[cat]) catData[cat] = {};
        if (!catData[cat][name]) catData[cat][name] = { stock: 0, t: 0, f: 0 };
        let qty = parseInt(String(o.Qty || 0).replace(/,/g,''), 10); if (isNaN(qty)) qty = 0;
        const rStatus = o['Reservation Status'] || orderResStatusMap[o.OrderID] || '';
        if (rStatus.includes('จอง T')) catData[cat][name].t += qty;
        else if (rStatus.includes('จอง F')) catData[cat][name].f += qty;
      });
      const sumCat = cat => Object.values(catData[cat]).reduce((s, c) => s + c.t + c.f, 0);
      // ลำดับหมวดตายตัวตามที่เจ้าของกำหนด (2026-07-11) — หมวดนอกลิสต์ต่อท้าย เรียงตามยอดจองรวมเหมือนเดิม
      const catOrder = ['โมบาย', 'อุปกรณ์เสริม', 'สมาร์ทวอทช์', 'หูฟัง', 'ของแถมแบรนด์', 'ของแถมช่องทาง'];
      const catRank = cat => { const i = catOrder.indexOf(cat); return i === -1 ? catOrder.length : i; };
      const catNames = Object.keys(catData).sort((a, b) => (catRank(a) - catRank(b)) || (sumCat(b) - sumCat(a)));
      if (catNames.length === 0) { container.innerHTML = window.app.emptyState({ icon: 'fa-boxes-stacked', title: 'ไม่มีข้อมูลสินค้า', subtitle: '' }); return; }

      let html = '';
      catNames.forEach(cat => {
        const prodMap = catData[cat];
        const names = Object.keys(prodMap).sort((a, b) => (prodMap[b].t + prodMap[b].f) - (prodMap[a].t + prodMap[a].f));
        let rows = ''; let sumStock = 0, sumT = 0, sumF = 0;
        names.forEach(name => {
          const c = prodMap[name]; const total = c.t + c.f; const quota = c.stock + total;
          sumStock += c.stock; sumT += c.t; sumF += c.f;
          rows += '<tr class="hover:bg-slate-50 transition-colors">'
            + '<td class="py-3 px-4 text-slate-700 font-medium">' + window.app.esc(name) + '</td>'
            + '<td class="py-3 px-4 text-right text-slate-600">' + quota.toLocaleString() + '</td>'
            + '<td class="py-3 px-4 text-right text-indigo-600 font-black">' + total.toLocaleString() + '</td>'
            + '<td class="py-3 px-4 text-right text-emerald-600 font-bold">' + c.stock.toLocaleString() + '</td>'
            + '<td class="py-3 px-4 text-right text-amber-600 font-bold">' + c.t.toLocaleString() + '</td>'
            + '<td class="py-3 px-4 text-right text-blue-600 font-bold">' + c.f.toLocaleString() + '</td>'
            + '</tr>';
        });
        const sumTotal = sumT + sumF; const sumQuota = sumStock + sumTotal;
        rows += '<tr class="bg-slate-50 font-black border-t-2 border-slate-200">'
          + '<td class="py-3 px-4 text-slate-800">รวม ' + window.app.esc(cat) + '</td>'
          + '<td class="py-3 px-4 text-right text-slate-800">' + sumQuota.toLocaleString() + '</td>'
          + '<td class="py-3 px-4 text-right text-indigo-700">' + sumTotal.toLocaleString() + '</td>'
          + '<td class="py-3 px-4 text-right text-emerald-700">' + sumStock.toLocaleString() + '</td>'
          + '<td class="py-3 px-4 text-right text-amber-700">' + sumT.toLocaleString() + '</td>'
          + '<td class="py-3 px-4 text-right text-blue-700">' + sumF.toLocaleString() + '</td>'
          + '</tr>';

        html += '<div class="chart-card !p-0 overflow-hidden mb-6">'
          + '<div class="bg-slate-50 border-b border-slate-200/80 p-4">'
          + '<h6 class="!mb-0"><i class="fas fa-boxes-stacked text-indigo-500"></i>' + window.app.esc(cat) + '</h6>'
          + '</div>'
          + '<div class="w-full overflow-x-auto custom-scrollbar max-h-[400px]">'
          + '<table class="w-full text-sm text-left whitespace-nowrap">'
          + '<thead class="sticky top-0 z-10"><tr class="bg-slate-50/95 backdrop-blur-sm border-b border-slate-200">'
          + '<th class="py-2.5 px-4 text-left text-[11px] font-bold text-slate-500 uppercase tracking-wider">สินค้า</th>'
          + '<th class="py-2.5 px-4 text-right text-[11px] font-bold text-slate-500 uppercase tracking-wider">จำนวนโควต้า</th>'
          + '<th class="py-2.5 px-4 text-right text-[11px] font-bold text-slate-500 uppercase tracking-wider">ยอดจองรวม</th>'
          + '<th class="py-2.5 px-4 text-right text-[11px] font-bold text-slate-500 uppercase tracking-wider">คงเหลือ</th>'
          + '<th class="py-2.5 px-4 text-right text-[11px] font-bold text-slate-500 uppercase tracking-wider">ยอดจอง T</th>'
          + '<th class="py-2.5 px-4 text-right text-[11px] font-bold text-slate-500 uppercase tracking-wider">ยอดจอง F</th>'
          + '</tr></thead>'
          + '<tbody class="divide-y divide-slate-100">' + rows + '</tbody>'
          + '</table></div></div>';
      });
      container.innerHTML = html;
      container.querySelectorAll('.chart-card').forEach(c => window.app.tableExportButtons(c));
    }
  },

  pos: {
    cartData: [],
    cartAutoDiscount: 0,
    currentImages: [],
    currentImageIndex: 0,
    // 6A — สถานะ variant ที่เลือกบนการ์ด (per Model, คงอยู่ข้ามการ re-render จาก filter/search)
    cardState: {},

    cardGroups: {},

    storeFilters: { category: '', group: '', capacity: '', priceRange: '', sort: '' },

    openPopover: null,
