<style>
  /* ===================================================
     ENTERPRISE E-COMMERCE DESIGN SYSTEM
     Premium UI - Dark Nav + Light Content
     =================================================== */

  /* === CSS Custom Properties === */
  :root {
    /* รอบปรับโทน "พรีเมี่ยม" (2026-07-10): slate-navy เข้ม+เรียบหรู แทน indigo สดเดิม — ให้ตรงกับ Tailwind indigo scale ที่แก้ใน Index.html */
    --color-primary: #366891;
    --color-primary-dark: #254d71;
    --color-primary-darker: #1b3a59;
    --color-primary-light: #5485ad;
    --color-primary-bg: #eef3f8;
    --color-accent: #06b6d4;
    --color-accent-dark: #0891b2;
    --color-success: #10b981;
    --color-success-bg: #ecfdf5;
    --color-warning: #f59e0b;
    --color-warning-bg: #fffbeb;
    --color-danger: #f43f5e;
    --color-danger-bg: #fff1f2;
    --color-surface: #ffffff;
    --color-surface-secondary: #f8fafc;
    --color-border: #e2e8f0;
    --color-border-light: #f1f5f9;
    --color-text-primary: #0f172a;
    --color-text-secondary: #475569;
    --color-text-muted: #94a3b8;
    --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.03), 0 1px 3px 0 rgb(0 0 0 / 0.04);
    --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.05), 0 2px 4px -2px rgb(0 0 0 / 0.03);
    --shadow-lg: 0 10px 25px -3px rgb(0 0 0 / 0.06), 0 4px 10px -4px rgb(0 0 0 / 0.04);
    --shadow-xl: 0 20px 40px -8px rgb(0 0 0 / 0.08), 0 8px 16px -6px rgb(0 0 0 / 0.04);
    --shadow-glow: 0 0 20px -5px rgba(37, 77, 113, 0.25);
    --radius-sm: 0.5rem;
    --radius-md: 0.75rem;
    --radius-lg: 1rem;
    --radius-xl: 1.25rem;
    /* รอบ "แบนราบ" (flatten, สไตล์ pbzf8): ลด 2xl/3xl ให้ตรงกับ borderRadius override ใน Tailwind config (Index.html)
       เพราะ .chart-card/.login-card/.swal2-popup ฯลฯ อ้างอิง var() ตรงนี้ ไม่ผ่าน Tailwind class */
    --radius-2xl: 0.625rem;
    --radius-3xl: 0.75rem;
    --transition-fast: 150ms cubic-bezier(0.4, 0, 0.2, 1);
    --transition-normal: 250ms cubic-bezier(0.4, 0, 0.2, 1);
    --transition-slow: 400ms cubic-bezier(0.4, 0, 0.2, 1);
  }

  /* === Base Styles === */
  body {
    font-family: 'Sarabun', sans-serif;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    /* รอบ "แบนราบ": พื้นหลังเดิมเป็น gradient พาสเทลไล่สี ทำให้การ์ดแบบทึบ (ไม่ blur แล้ว) ดูขัดกัน — เปลี่ยนเป็นพื้นเรียบสีเดียว */
    background: var(--color-surface-secondary);
  }

  /* === Custom Scrollbar - Ultra Refined === */
  .custom-scrollbar::-webkit-scrollbar { 
    width: 0.3cm; 
    height: 0.3cm; 
  }
  .custom-scrollbar::-webkit-scrollbar-track { 
    background: transparent; 
    border-radius: 10px;
  }
  .custom-scrollbar::-webkit-scrollbar-thumb {
    background: linear-gradient(180deg, #b8cee1, #85abc9);
    border-radius: 10px;
  }
  .custom-scrollbar::-webkit-scrollbar-thumb:hover {
    background: linear-gradient(180deg, #85abc9, #5485ad);
  }

  /* Global scrollbar */
  ::-webkit-scrollbar { width: 0.3cm; height: 0.3cm; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
  ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

  /* === Premium Animations === */
  .animate-fade-in { 
    animation: fadeIn 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; 
  }
  .animate-fade-in-up { 
    animation: fadeInUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; 
  }
  
  @keyframes fadeIn { 
    from { opacity: 0; } 
    to { opacity: 1; } 
  }
  @keyframes fadeInUp {
    from { 
      opacity: 0; 
      transform: translateY(20px) scale(0.98); 
    }
    to { 
      opacity: 1; 
      transform: translateY(0) scale(1); 
    }
  }
  @keyframes shimmer {
    0% { background-position: -200% 0; }
    100% { background-position: 200% 0; }
  }
  @keyframes float {
    0%, 100% { transform: translateY(0px); }
    50% { transform: translateY(-6px); }
  }
  @keyframes gradient-shift {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }
  @keyframes countUp {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* === Skeleton Loading === */
  .skeleton {
    background: linear-gradient(90deg, #f1f5f9 25%, #e2e8f0 37%, #f1f5f9 63%);
    background-size: 400% 100%;
    animation: shimmer 1.8s infinite ease-in-out;
    border-radius: var(--radius-lg);
  }

  /* === Premium Glass Navigation === */
  .glass-nav {
    background: var(--color-surface);
    border-bottom: 1px solid var(--color-border);
    box-shadow: var(--shadow-sm);
  }

  /* === KPI Cards - Premium Gradient System === */
  /* รอบ "แบนราบ" (flatten, สไตล์ pbzf8): เอา radial-glow (::after) กับพื้นหลัง gradient ออก
     เหลือพื้นผิวเรียบสีเดียว + เส้นซ้ายสีคาดตามหมวด (accent) เป็นตัวแยกความหมายแทน */
  .kpi-gradient-total {
    background: var(--color-surface);
    border-left: 4px solid var(--color-primary);
  }
  .kpi-gradient-mob {
    background: var(--color-surface);
    border-left: 4px solid var(--color-success);
  }
  .kpi-gradient-acc {
    background: var(--color-surface);
    border-left: 4px solid #64748b;
  }
  .kpi-gradient-resT {
    background: var(--color-surface);
    border-left: 4px solid var(--color-warning);
  }
  .kpi-gradient-resF {
    background: var(--color-surface);
    border-left: 4px solid #3b82f6;
  }
  .kpi-gradient-aov {
    background: var(--color-surface);
    border-left: 4px solid #a855f7;
  }
  .kpi-gradient-conv {
    background: var(--color-surface);
    border-left: 4px solid #10b981;
  }

  /* === SweetAlert Enterprise Theme === */
  .swal2-popup {
    border-radius: var(--radius-2xl) !important;
    font-family: 'Sarabun', sans-serif !important;
    box-shadow: var(--shadow-md) !important;
    padding: 2.25rem !important;
    border: 1px solid var(--color-border) !important;
  }
  .swal2-title { 
    font-size: 1.3rem !important; 
    color: var(--color-text-primary) !important; 
    font-weight: 800 !important; 
    letter-spacing: -0.025em !important;
  }
  .swal2-html-container { 
    font-size: 0.925rem !important; 
    color: var(--color-text-secondary) !important; 
    line-height: 1.7 !important;
  }
  .swal2-actions { 
    margin-top: 1.75rem !important; 
    gap: 0.75rem !important; 
  }
  .swal2-styled.swal2-confirm {
    background: var(--color-primary-dark) !important;
    border-radius: var(--radius-lg) !important;
    font-weight: 700 !important;
    padding: 0.75rem 1.75rem !important;
    font-size: 0.875rem !important;
    box-shadow: var(--shadow-sm) !important;
    border: none !important;
    transition: all var(--transition-fast) !important;
  }
  .swal2-styled.swal2-confirm:hover {
    background: var(--color-primary-darker) !important;
  }
  .swal2-styled.swal2-cancel { 
    background: var(--color-surface) !important; 
    color: var(--color-text-secondary) !important; 
    border: 1px solid var(--color-border) !important; 
    border-radius: var(--radius-lg) !important; 
    font-weight: 700 !important; 
    padding: 0.75rem 1.75rem !important; 
    font-size: 0.875rem !important;
    transition: all var(--transition-fast) !important;
  }
  .swal2-styled.swal2-cancel:hover {
    background: var(--color-surface-secondary) !important;
    border-color: #cbd5e1 !important;
  }

  /* === Data Table - Enterprise Grade === */
  #dataTable {
    border-spacing: 0;
  }
  #dataTable th {
    position: sticky;
    top: 0;
    z-index: 10;
    background: var(--color-primary-dark);
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: #ffffff;
    font-weight: 700;
    padding: 0.875rem 1rem;
    border-bottom: 2px solid #112840;
    white-space: nowrap;
  }
  #dataTable tbody tr {
    transition: all var(--transition-fast);
  }
  #dataTable tbody tr:hover { 
    background-color: rgba(37, 77, 113, 0.03); 
  }
  #dataTable tbody td {
    padding: 0.75rem 1rem;
    font-size: 0.8rem;
    color: var(--color-text-secondary);
  }

  /* === UI Input Focus Effects === */
  input:focus, select:focus, textarea:focus {
    box-shadow: 0 0 0 3px rgba(37, 77, 113, 0.12), 0 1px 2px 0 rgba(0, 0, 0, 0.05) !important;
    border-color: var(--color-primary) !important;
    outline: none !important;
  }

  /* === Active Navigation State === */
  .nav-link.active-link {
    background: var(--color-primary-dark) !important;
    color: #ffffff !important;
    font-weight: 700 !important;
  }

  /* === Blob Background Animations === */
  @keyframes blob {
    0% { transform: translate(0px, 0px) scale(1); }
    33% { transform: translate(30px, -50px) scale(1.1); }
    66% { transform: translate(-20px, 20px) scale(0.9); }
    100% { transform: translate(0px, 0px) scale(1); }
  }
  .animate-blob {
    animation: blob 8s infinite;
  }
  .animation-delay-2000 {
    animation-delay: 2s;
  }
  .animation-delay-4000 {
    animation-delay: 4s;
  }

  /* === Premium Button Styles === */
  .btn-enterprise {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 0.5rem;
    padding: 0.625rem 1.25rem;
    font-weight: 700;
    font-size: 0.8125rem;
    border-radius: var(--radius-lg);
    transition: all var(--transition-fast);
    cursor: pointer;
    border: none;
    outline: none;
    position: relative;
    overflow: hidden;
  }
  .btn-enterprise-primary {
    background: var(--color-primary-dark);
    color: white;
    box-shadow: var(--shadow-sm);
  }
  .btn-enterprise-primary:hover {
    background: var(--color-primary-darker);
  }
  .btn-enterprise-secondary {
    background: var(--color-surface);
    color: var(--color-text-secondary);
    border: 1px solid var(--color-border);
    box-shadow: var(--shadow-sm);
  }
  .btn-enterprise-secondary:hover {
    background: var(--color-surface-secondary);
    border-color: #cbd5e1;
    transform: translateY(-1px);
    box-shadow: var(--shadow-md);
  }

  /* === Chart Card Wrapper === */
  .chart-card {
    background: var(--color-surface);
    border: 1px solid var(--color-border);
    border-radius: var(--radius-2xl);
    box-shadow: var(--shadow-sm);
    transition: all var(--transition-normal);
    padding: 1.5rem;
  }
  .chart-card:hover {
    box-shadow: var(--shadow-md);
  }
  .chart-card h6 {
    font-weight: 700;
    font-size: 0.8125rem;
    color: var(--color-text-primary);
    margin-bottom: 1rem;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }

  /* === Chart export (download/copy) buttons — วางไว้บนกราฟ ในกรอบ .relative ที่ห่อ canvas อยู่แล้ว === */
  .chart-export-btns {
    position: absolute;
    top: 2px;
    right: 2px;
    z-index: 5;
    display: flex;
    gap: 0.25rem;
  }
  /* ตารางสรุป (ไม่ใช่กราฟ) มีแถบหัวข้อของตัวเองอยู่แล้ว — วางปุ่มแบบ static ในแถบหัวแทนการลอยทับเนื้อหา
     ตั้งใจไม่ใช้ชื่อ class "inline" — ชนกับ utility class ของ Tailwind (display:inline) ที่โหลดทีหลัง CSS.html
     ใน cascade แล้วชนะ (กฎข้อ 18 ของโปรเจกต์) จนปุ่มเรียงตัวผิดเพี้ยน — ใช้ !important กันเผื่อไว้ด้วย */
  .table-export-btns {
    position: static !important;
    display: flex !important;
    gap: 0.25rem;
  }
  .chart-export-btn {
    width: 26px;
    height: 26px;
    border-radius: var(--radius-sm);
    background: rgba(255, 255, 255, 0.92);
    border: 1px solid var(--color-border);
    color: var(--color-text-secondary);
    font-size: 11px;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: var(--shadow-sm);
    cursor: pointer;
    transition: var(--transition-fast);
  }
  .chart-export-btn:hover {
    background: var(--color-primary);
    color: #ffffff;
    border-color: var(--color-primary);
  }

  /* === Login Page Enhancements === */
  .login-container {
    position: relative;
  }
  .login-card {
    background: var(--color-surface);
    border: 1px solid var(--color-border);
    box-shadow: var(--shadow-lg);
  }

  /* === Cart Drawer Enhancement === */
  .cart-drawer-shadow {
    box-shadow: -4px 0 16px -4px rgba(0, 0, 0, 0.12);
  }

  /* ============================================================
     Cart Drawer — 3-Zone Flexbox Layout
     Zone 1: Header  — fixed 60px  (flex: 0 0 60px)
     Zone 2: Content — fills gap   (flex: 1 1 0  + min-height:0)
     Zone 3: Footer  — natural h   (flex-shrink: 0)
     รายการสินค้าไม่มีทางเลื่อนใต้ Header หรือ Footer ได้เลย
  ============================================================ */

  /* Drawer wrapper: Flexbox column เต็มความสูงจอ */
  #cartDrawer {
    display: flex;
    flex-direction: column;
    height: 100vh;            /* fallback สำหรับเบราว์เซอร์ที่ไม่รองรับ dvh */
    height: 100dvh;           /* เต็มความสูง viewport บนมือถือ */
    overflow: hidden;          /* ป้องกัน drawer เองไม่ scroll */
  }

  /* Zone 1 — Header: สูง 60px, อยู่คงที่ (sticky) */
  .cart-drawer-header {
    flex: 0 0 60px;
    height: 60px;
    min-height: 60px;
    max-height: 60px;
    position: sticky;
    top: 0;
    z-index: 10;
  }

  /* Zone 2 — Scrollable Content: ความสูง = calc(100vh - 60px - footer จริง) */
  .cart-drawer-content {
    height: calc(100vh - 60px - 50px - env(safe-area-inset-bottom));
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    flex: 1 1 0;
    min-height: 0; /* CRITICAL: prevents flex child from expanding beyond parent */
  }

  /* Zone 3 — Footer: สูง 50px + safe-area (ปุ่ม checkout ไม่โดน home indicator บัง), อยู่คงที่ (sticky) */
  .cart-drawer-footer {
    flex: 0 0 calc(50px + env(safe-area-inset-bottom));
    height: calc(50px + env(safe-area-inset-bottom));
    min-height: calc(50px + env(safe-area-inset-bottom));
    max-height: calc(50px + env(safe-area-inset-bottom));
    padding-bottom: env(safe-area-inset-bottom) !important; /* Tailwind CDN's <style> is injected after this block, ties on specificity */
    box-sizing: border-box;
    position: sticky;
    bottom: 0;
    z-index: 10;
  }

  /* === Responsive Navigation Enhancement === */
  @media (max-width: 1023px) {
    .glass-nav {
      background: var(--color-surface);
    }
  }

  /* === Countdown Timer Cards === */
  .countdown-digit {
    background: #16293f;
    color: white;
    padding: 0.375rem 0.5rem;
    border-radius: var(--radius-sm);
    font-weight: 900;
    font-size: 0.875rem;
    min-width: 2rem;
    text-align: center;
    box-shadow: var(--shadow-sm);
  }

  /* === Print Styles === */
  @media print {
    .glass-nav, footer, .animate-blob { display: none !important; }
    body { background: white !important; }
    .chart-card {
      box-shadow: none !important;
      border: 1px solid #e2e8f0 !important;
    }
  }

  @media print {
    body * { visibility: hidden; }
    #invoice-paper, #invoice-paper * { visibility: visible; }
    #invoice-paper {
      position: absolute;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0 !important;
      border: none !important;
      box-shadow: none !important;
    }
    .no-print, .no-print * { display: none !important; }
  }

  /* === Cross-device: กัน iOS Safari auto-zoom เมื่อ focus input ที่ font-size < 16px === */
  @media (max-width: 767px) {
    input:not([type="checkbox"]):not([type="radio"]):not([type="range"]),
    select,
    textarea {
      font-size: 16px !important;
    }
  }

  /* === Cross-device: safe-area สำหรับ iPhone มี notch / home indicator (ต้องมี viewport-fit=cover ด้วย) === */
  @media (max-width: 1023px) {
    .glass-nav {
      padding-top: env(safe-area-inset-top);
    }
    #posCartFab {
      bottom: calc(1.5rem + env(safe-area-inset-bottom)) !important;
    }
  }

  /* === Accessibility (5B.4): focus ring เฉพาะตอนนำทางด้วยคีย์บอร์ด — ไม่กวนตอนคลิกเมาส์ === */
  button:focus-visible,
  a:focus-visible,
  input:focus-visible,
  select:focus-visible,
  textarea:focus-visible {
    outline: 2px solid var(--color-primary);
    outline-offset: 2px;
    border-radius: inherit;
  }

  /* === 6A POS storefront — scoped ด้วย .pos-storefront เท่านั้น ห้ามรั่วไปหน้าอื่น === */
  .pos-storefront .pos-card {
    transition: box-shadow .2s ease, transform .2s ease;
  }
  .pos-storefront .pos-card:hover {
    box-shadow: 0 8px 24px rgba(15, 23, 42, .08);
  }
  .pos-storefront .color-dot {
    position: relative;
  }
  /* สีที่หมดสต๊อกทุกความจุ: จาง + เส้นทแยงขีดทับ แต่ยังกดได้ (กดแล้วเห็นราคา/สถานะของสีนั้น) */
  .pos-storefront .color-dot.oos {
    opacity: .45;
  }
  .pos-storefront .color-dot.oos::after {
    content: '';
    position: absolute;
    left: -3px;
    right: -3px;
    top: 50%;
    height: 1.5px;
    background: #64748b;
    transform: rotate(-45deg);
    pointer-events: none;
  }

  /* === Sidebar collapse/expand toggle — redesigned (2026-07-21) === */
  /* ปุ่มในหัว sidebar: ใช้ตอน sidebar เปิดอยู่ กดแล้วยุบ */
  .sidebar-toggle-btn {
    width: 2.25rem;
    height: 2.25rem;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    border-radius: var(--radius-lg);
    color: var(--color-text-secondary);
    background: transparent;
    border: 1px solid transparent;
    transition: all var(--transition-fast);
    cursor: pointer;
    flex-shrink: 0;
  }
  .sidebar-toggle-btn:hover {
    background: var(--color-primary-bg);
    color: var(--color-primary-dark);
    border-color: var(--color-border);
  }
  .sidebar-toggle-btn i {
    transition: transform var(--transition-fast);
  }
  .sidebar-toggle-btn:hover i {
    transform: translateX(-2px);
  }

  /* ปุ่ม "แสดงแถบเมนู" ตอน sidebar ถูกยุบ — ออกแบบเป็น handle เกาะขอบจอแทนปุ่มลอย
     ดูเหมือนหูจับที่ยื่นออกมาจาก sidebar ที่ซ่อนอยู่ ไม่ใช่ปุ่มลอยเดี่ยวๆ กลางที่ว่าง */
  .sidebar-show-handle {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 1.75rem;
    height: 2.75rem;
    border-radius: 0 var(--radius-xl) var(--radius-xl) 0;
    background: var(--color-surface);
    border: 1px solid var(--color-border);
    border-left: none;
    color: var(--color-text-secondary);
    box-shadow: var(--shadow-md);
    transition: all var(--transition-fast);
    cursor: pointer;
  }
  .sidebar-show-handle:hover {
    width: 2.25rem;
    color: var(--color-primary-dark);
    box-shadow: var(--shadow-lg);
  }
  .sidebar-show-handle i {
    font-size: 0.8rem;
    transition: transform var(--transition-fast);
  }
  .sidebar-show-handle:hover i {
    transform: translateX(1px);
  }

  /* === Premium micro-interaction polish (flat theme, no structural change) === */
  .chart-card, .login-card, .swal2-popup, .glass-nav, #cartDrawer, .cart-drawer-footer,
  .kpi-gradient-total, .kpi-gradient-mob, .kpi-gradient-acc, .kpi-gradient-resT, .kpi-gradient-resF, .kpi-gradient-aov, .kpi-gradient-conv {
    transition: background-color var(--transition-normal), border-color var(--transition-normal), box-shadow var(--transition-normal), color var(--transition-normal);
  }
  .chart-card:hover {
    transform: translateY(-2px);
  }
  .btn-enterprise-primary:hover {
    transform: translateY(-1px);
    box-shadow: var(--shadow-md);
  }
