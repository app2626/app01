<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบแจ้งขออนุมัติ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; }
        [v-cloak] { display: none; }
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen">

    <!-- Loading Overlay -->
    <div id="loading" class="loading-overlay">
        <div class="flex flex-col items-center">
            <div class="animate-spin rounded-full h-16 w-16 border-t-4 border-b-4 border-blue-600 mb-4"></div>
            <p class="text-blue-600 font-medium">กำลังโหลด...</p>
        </div>
    </div>

    <!-- App Container -->
    <div class="container mx-auto px-4 py-8">
        <!-- Header -->
        <header class="mb-8 flex flex-col md:flex-row md:items-center md:justify-between gap-4">
            <div>
                <h1 class="text-3xl font-bold text-slate-800">ระบบแจ้งขออนุมัติ</h1>
                <p class="text-slate-500">จัดการคำขออนุมัติและติดตามสถานะ</p>
            </div>
            <button onclick="toggleForm()" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2.5 rounded-lg shadow-lg flex items-center justify-center transition-all">
                <i class="fas fa-plus mr-2"></i> สร้างรายการใหม่
            </button>
        </header>

        <!-- Stats Cards -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="bg-white p-6 rounded-xl shadow-sm border-l-4 border-blue-500">
                <div class="flex items-center">
                    <div class="p-3 bg-blue-100 rounded-lg text-blue-600 mr-4">
                        <i class="fas fa-file-alt text-2xl"></i>
                    </div>
                    <div>
                        <p class="text-slate-500 text-sm">รายการทั้งหมด</p>
                        <p id="stat-total" class="text-2xl font-bold text-slate-800">0</p>
                    </div>
                </div>
            </div>
            <div class="bg-white p-6 rounded-xl shadow-sm border-l-4 border-yellow-500">
                <div class="flex items-center">
                    <div class="p-3 bg-yellow-100 rounded-lg text-yellow-600 mr-4">
                        <i class="fas fa-clock text-2xl"></i>
                    </div>
                    <div>
                        <p class="text-slate-500 text-sm">รออนุมัติ</p>
                        <p id="stat-pending" class="text-2xl font-bold text-slate-800">0</p>
                    </div>
                </div>
            </div>
            <div class="bg-white p-6 rounded-xl shadow-sm border-l-4 border-green-500">
                <div class="flex items-center">
                    <div class="p-3 bg-green-100 rounded-lg text-green-600 mr-4">
                        <i class="fas fa-check-circle text-2xl"></i>
                    </div>
                    <div>
                        <p class="text-slate-500 text-sm">อนุมัติแล้ว</p>
                        <p id="stat-approved" class="text-2xl font-bold text-slate-800">0</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Form Section (Hidden by default) -->
        <div id="form-container" class="hidden mb-8 bg-white p-8 rounded-xl shadow-lg border border-slate-100">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-bold text-slate-800"><i class="fas fa-edit mr-2 text-blue-600"></i>แบบฟอร์มขออนุมัติ</h2>
                <button onclick="toggleForm()" class="text-slate-400 hover:text-slate-600"><i class="fas fa-times text-xl"></i></button>
            </div>
            
            <form id="request-form" onsubmit="handleFormSubmit(event)" class="space-y-6">
                <input type="hidden" name="id" id="form-id">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <!-- Column 1 -->
                    <div class="space-y-4">
                        <div>
                            <label class="block text-sm font-medium text-slate-700 mb-1">เรื่อง <span class="text-red-500">*</span></label>
                            <input type="text" name="subject" required class="w-full px-4 py-2 border border-slate-200 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-slate-700 mb-1">สาขา <span class="text-red-500">*</span></label>
                            <input type="text" name="branch" required class="w-full px-4 py-2 border border-slate-200 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-slate-700 mb-1">รายละเอียดสินค้า</label>
                            <textarea name="productDetail" rows="3" class="w-full px-4 py-2 border border-slate-200 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all"></textarea>
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="block text-sm font-medium text-slate-700 mb-1">บาร์ขาย</label>
                                <input type="text" name="barcode" class="w-full px-4 py-2 border border-slate-200 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-slate-700 mb-1">ราคาในระบบ</label>
                                <input type="number" name="systemPrice" step="0.01" class="w-full px-4 py-2 border border-slate-200 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all">
                            </div>
                        </div>
                    </div>

                    <!-- Column 2 -->
                    <div class="space-y-4">
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="block text-sm font-medium text-slate-700 mb-1">ราคาสุทธิ <span class="text-red-500">*</span></label>
                                <input type="number" name="netPrice" step="0.01" required class="w-full px-4 py-2 border border-slate-200 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-slate-700 mb-1">ระยะเวลาโปรโมชั่น</label>
                                <input type="text" name="promotionPeriod" class="w-full px-4 py-2 border border-slate-200 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all">
                            </div>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-slate-700 mb-1">ชื่อ-นามสกุล / เบอร์โทรลูกค้า <span class="text-red-500">*</span></label>
                            <input type="text" name="customerInfo" required class="w-full px-4 py-2 border border-slate-200 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-slate-700 mb-1">แพ็คเกจ AIS</label>
                            <input type="text" name="aisPackage" class="w-full px-4 py-2 border border-slate-200 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-slate-700 mb-1">IMEI เครื่องเก่า</label>
                            <input type="text" name="oldImei" class="w-full px-4 py-2 border border-slate-200 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-slate-700 mb-1">Area</label>
                            <select name="area" class="w-full px-4 py-2 border border-slate-200 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all">
                                <option value="">เลือก Area</option>
                                <option value="BKK">กรุงเทพและปริมณฑล</option>
                                <option value="North">ภาคเหนือ</option>
                                <option value="South">ภาคใต้</option>
                                <option value="East">ภาคตะวันออก</option>
                                <option value="West">ภาคตะวันตก</option>
                                <option value="Central">ภาคกลาง</option>
                            </select>
                        </div>
                    </div>
                </div>

                <div class="flex justify-end pt-4 border-t border-slate-100 gap-3">
                    <button type="button" onclick="toggleForm()" class="px-6 py-2 rounded-lg text-slate-600 hover:bg-slate-100 transition-all">ยกเลิก</button>
                    <button type="submit" class="bg-blue-600 hover:bg-blue-700 text-white px-8 py-2 rounded-lg shadow-md transition-all">บันทึกข้อมูล</button>
                </div>
            </form>
        </div>

        <!-- Table Section -->
        <div class="bg-white rounded-xl shadow-sm border border-slate-100 overflow-hidden">
            <div class="p-6 border-b border-slate-100 flex flex-col md:flex-row md:items-center justify-between gap-4">
                <h3 class="text-lg font-bold text-slate-800">รายการขออนุมัติ</h3>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-slate-400">
                        <i class="fas fa-search"></i>
                    </span>
                    <input type="text" id="search-input" onkeyup="filterTable()" placeholder="ค้นหาข้อมูล..." class="pl-10 pr-4 py-2 border border-slate-200 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none w-full md:w-64 transition-all">
                </div>
            </div>
            
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead class="bg-slate-50 text-slate-600 text-sm uppercase font-semibold">
                        <tr>
                            <th class="px-6 py-4">วันเวลาที่แจ้ง</th>
                            <th class="px-6 py-4">เรื่อง/สาขา</th>
                            <th class="px-6 py-4">ลูกค้า</th>
                            <th class="px-6 py-4">ราคาสุทธิ</th>
                            <th class="px-6 py-4">สถานะ</th>
                            <th class="px-6 py-4 text-center">จัดการ</th>
                        </tr>
                    </thead>
                    <tbody id="data-body" class="divide-y divide-slate-100">
                        <!-- Data will be loaded here -->
                    </tbody>
                </table>
            </div>
            
            <div id="empty-state" class="hidden py-12 text-center">
                <div class="text-slate-300 mb-4">
                    <i class="fas fa-folder-open text-6xl"></i>
                </div>
                <p class="text-slate-500">ไม่พบข้อมูลในขณะนี้</p>
            </div>
        </div>

        <!-- Footer -->
        <footer class="mt-8 text-center text-slate-500 text-sm border-t border-slate-200 pt-6">
            <p class="flex items-center justify-center gap-2">
                <i class="fas fa-code text-blue-500"></i> พัฒนาโดย <span class="font-semibold text-slate-700">app01</span>
                <span class="text-slate-300">|</span>
                <i class="fas fa-phone-alt text-green-500"></i> ติดต่อ <span class="font-semibold text-slate-700">999</span>
            </p>
        </footer>
    </div>

    <script>
        // Global variables
        let allData = [];

        // Initial Load
        window.onload = function() {
            loadData();
        };

        function showLoading(show) {
            document.getElementById('loading').style.display = show ? 'flex' : 'none';
        }

        function toggleForm() {
            const form = document.getElementById('form-container');
            form.classList.toggle('hidden');
            if (form.classList.contains('hidden')) {
                resetForm();
            } else {
                form.scrollIntoView({ behavior: 'smooth' });
            }
        }

        function resetForm() {
            const form = document.getElementById('request-form');
            form.reset();
            document.getElementById('form-id').value = '';
        }

        function editItem(id) {
            const item = allData.find(i => i.ID === id);
            if (!item) return;

            document.getElementById('form-id').value = item.ID;
            const form = document.getElementById('request-form');
            
            // Map table headers to form input names
            const mapping = {
                'เรื่อง': 'subject',
                'สาขา': 'branch',
                'รายละเอียดสินค้า': 'productDetail',
                'บาร์ขาย': 'barcode',
                'ราคาในระบบ': 'systemPrice',
                'ราคาสุทธิ': 'netPrice',
                'ระยะเวลาโปรโมชั่น': 'promotionPeriod',
                'ลูกค้า/เบอร์โทร': 'customerInfo',
                'แพ็คเกจ AIS': 'aisPackage',
                'IMEI เครื่องเก่า': 'oldImei',
                'Area': 'area'
            };

            for (const [key, name] of Object.entries(mapping)) {
                if (form.elements[name]) {
                    form.elements[name].value = item[key] || '';
                }
            }

            const formContainer = document.getElementById('form-container');
            formContainer.classList.remove('hidden');
            formContainer.scrollIntoView({ behavior: 'smooth' });
        }

        function loadData() {
            showLoading(true);
            google.script.run
                .withSuccessHandler(function(response) {
                    showLoading(false);
                    if (response.success) {
                        allData = response.data;
                        renderTable(allData);
                        updateStats(allData);
                    } else {
                        Swal.fire('ผิดพลาด', response.message, 'error');
                    }
                })
                .withFailureHandler(function(error) {
                    showLoading(false);
                    Swal.fire('ผิดพลาด', 'ไม่สามารถเชื่อมต่อเซิร์ฟเวอร์ได้: ' + error, 'error');
                })
                .getData();
        }

        function renderTable(data) {
            const body = document.getElementById('data-body');
            const emptyState = document.getElementById('empty-state');
            body.innerHTML = '';

            if (data.length === 0) {
                emptyState.classList.remove('hidden');
                return;
            } else {
                emptyState.classList.add('hidden');
            }

            // Sort by timestamp descending
            const sortedData = [...data].sort((a, b) => new Date(b.Timestamp) - new Date(a.Timestamp));

            sortedData.forEach(item => {
                const date = new Date(item.Timestamp).toLocaleString('th-TH');
                const statusClass = getStatusClass(item.สถานะ);
                
                const tr = document.createElement('tr');
                tr.className = 'hover:bg-slate-50 transition-colors';
                tr.innerHTML = `
                    <td class="px-6 py-4 text-sm text-slate-600">${date}</td>
                    <td class="px-6 py-4">
                        <div class="font-medium text-slate-800">${item.เรื่อง}</div>
                        <div class="text-xs text-slate-500">${item.สาขา}</div>
                    </td>
                    <td class="px-6 py-4 text-sm text-slate-600">${item['ลูกค้า/เบอร์โทร']}</td>
                    <td class="px-6 py-4 text-sm font-semibold text-slate-800">${Number(item.ราคาสุทธิ).toLocaleString()} บาท</td>
                    <td class="px-6 py-4">
                        <span class="px-3 py-1 rounded-full text-xs font-medium ${statusClass}">
                            ${item.สถานะ}
                        </span>
                    </td>
                    <td class="px-6 py-4">
                        <div class="flex justify-center gap-2">
                            <button onclick="editItem('${item.ID}')" class="p-2 text-amber-600 hover:bg-amber-50 rounded-lg transition-colors" title="แก้ไขข้อมูล">
                                <i class="fas fa-edit"></i>
                            </button>
                            <button onclick="changeStatus('${item.ID}')" class="p-2 text-blue-600 hover:bg-blue-50 rounded-lg transition-colors" title="อัปเดตสถานะ">
                                <i class="fas fa-tasks"></i>
                            </button>
                            <button onclick="deleteItem('${item.ID}')" class="p-2 text-red-600 hover:bg-red-50 rounded-lg transition-colors" title="ลบ">
                                <i class="fas fa-trash-alt"></i>
                            </button>
                        </div>
                    </td>
                `;
                body.appendChild(tr);
            });
        }

        function getStatusClass(status) {
            switch(status) {
                case 'รอดำเนินการ': return 'bg-yellow-100 text-yellow-700';
                case 'อนุมัติแล้ว': return 'bg-green-100 text-green-700';
                case 'ไม่อนุมัติ': return 'bg-red-100 text-red-700';
                default: return 'bg-slate-100 text-slate-700';
            }
        }

        function updateStats(data) {
            document.getElementById('stat-total').innerText = data.length;
            document.getElementById('stat-pending').innerText = data.filter(i => i.สถานะ === 'รอดำเนินการ').length;
            document.getElementById('stat-approved').innerText = data.filter(i => i.สถานะ === 'อนุมัติแล้ว').length;
        }

        function handleFormSubmit(e) {
            e.preventDefault();
            const form = e.target;
            const formData = new FormData(form);
            const data = Object.fromEntries(formData.entries());
            const id = data.id;

            showLoading(true);
            
            const successCallback = function(response) {
                showLoading(false);
                if (response.success) {
                    Swal.fire({
                        icon: 'success',
                        title: 'สำเร็จ!',
                        text: response.message,
                        timer: 2000,
                        showConfirmButton: false
                    });
                    resetForm();
                    document.getElementById('form-container').classList.add('hidden');
                    loadData();
                } else {
                    Swal.fire('ผิดพลาด', response.message, 'error');
                }
            };

            const failureCallback = function(error) {
                showLoading(false);
                Swal.fire('ผิดพลาด', 'ไม่สามารถดำเนินการได้: ' + error, 'error');
            };

            if (id) {
                google.script.run
                    .withSuccessHandler(successCallback)
                    .withFailureHandler(failureCallback)
                    .updateData(id, data);
            } else {
                google.script.run
                    .withSuccessHandler(successCallback)
                    .withFailureHandler(failureCallback)
                    .saveData(data);
            }
        }

        function deleteItem(id) {
            Swal.fire({
                title: 'ยืนยันการลบ?',
                text: "คุณจะไม่สามารถเรียกคืนข้อมูลนี้ได้!",
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#d33',
                cancelButtonColor: '#3085d6',
                confirmButtonText: 'ใช่, ลบเลย!',
                cancelButtonText: 'ยกเลิก'
            }).then((result) => {
                if (result.isConfirmed) {
                    showLoading(true);
                    google.script.run
                        .withSuccessHandler(function(response) {
                            showLoading(false);
                            if (response.success) {
                                Swal.fire('ลบแล้ว!', response.message, 'success');
                                loadData();
                            } else {
                                Swal.fire('ผิดพลาด', response.message, 'error');
                            }
                        })
                        .withFailureHandler(function(error) {
                            showLoading(false);
                            Swal.fire('ผิดพลาด', 'ไม่สามารถลบข้อมูลได้: ' + error, 'error');
                        })
                        .deleteData(id);
                }
            });
        }

        function changeStatus(id) {
            Swal.fire({
                title: 'เปลี่ยนสถานะ',
                input: 'select',
                inputOptions: {
                    'รอดำเนินการ': 'รอดำเนินการ',
                    'อนุมัติแล้ว': 'อนุมัติแล้ว',
                    'ไม่อนุมัติ': 'ไม่อนุมัติ'
                },
                inputPlaceholder: 'เลือกสถานะใหม่',
                showCancelButton: true,
                confirmButtonText: 'อัปเดต',
                cancelButtonText: 'ยกเลิก'
            }).then((result) => {
                if (result.isConfirmed && result.value) {
                    showLoading(true);
                    google.script.run
                        .withSuccessHandler(function(response) {
                            showLoading(false);
                            if (response.success) {
                                Swal.fire('สำเร็จ!', response.message, 'success');
                                loadData();
                            } else {
                                Swal.fire('ผิดพลาด', response.message, 'error');
                            }
                        })
                        .withFailureHandler(function(error) {
                            showLoading(false);
                            Swal.fire('ผิดพลาด', 'ไม่สามารถอัปเดตสถานะได้: ' + error, 'error');
                        })
                        .updateStatus(id, result.value);
                }
            });
        }

        function filterTable() {
            const input = document.getElementById('search-input');
            const filter = input.value.toLowerCase();
            const filteredData = allData.filter(item => {
                return Object.values(item).some(val => 
                    String(val).toLowerCase().includes(filter)
                );
            });
            renderTable(filteredData);
        }
    </script>
</body>
</html>
