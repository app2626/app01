<script>
let premiumOptions = []; // Store premium options globally

function getFileBase64(file) {
  return new Promise((resolve, reject) => {
    if (!file) return resolve(null);
    let reader = new FileReader();
    reader.onload = () => resolve({
      base64: reader.result.split(',')[1],
      mimeType: file.type,
      name: file.name
    });
    reader.onerror = error => reject(error);
    reader.readAsDataURL(file);
  });
}

async function addData(form) {

  let premiumSelects = document.querySelectorAll('.premium-select');
  let premiumValues = [];
  premiumSelects.forEach(select => {
    if (select.value) premiumValues.push(select.value);
  });
  
  let formObj = {};
  new FormData(form).forEach((value, key) => {
    if (value instanceof File) return;
    formObj[key] = value;
  });
  formObj.premium_combined = premiumValues.join(", ");

  // Combine barcodes with discount amounts
  if (formObj.barcode_ais && formObj.barcode_ais.trim() !== '') formObj.discountais = `[${formObj.barcode_ais}] ` + formObj.discountais;
  if (formObj.barcode_promotion && formObj.barcode_promotion.trim() !== '') formObj.discountpromotion = `[${formObj.barcode_promotion}] ` + formObj.discountpromotion;
  if (formObj.barcode_tradein && formObj.barcode_tradein.trim() !== '') formObj.discounttradein = `[${formObj.barcode_tradein}] ` + formObj.discounttradein;
  if (formObj.barcode_tradeup && formObj.barcode_tradeup.trim() !== '') formObj.discounttradeup = `[${formObj.barcode_tradeup}] ` + formObj.discounttradeup;
  if (formObj.barcode_bigc && formObj.barcode_bigc.trim() !== '') formObj.discountbigc = `[${formObj.barcode_bigc}] ` + formObj.discountbigc;

  Swal.fire({
    position: 'top',
    icon: 'info',
    title: 'กำลังบันทึกข้อมูล กรุณารอสักครู่ (อาจใช้เวลาอัปโหลดรูปและ PDF)...',
    showConfirmButton: false,
    allowOutsideClick: false,
  });
  Swal.showLoading();

  try {
    let file1 = document.getElementById('myFile').files[0];
    let file2 = document.getElementById('myFile2').files[0];
    
    formObj.file1Data = await getFileBase64(file1);
    formObj.file2Data = await getFileBase64(file2);

    google.script.run.withSuccessHandler((data) => {
      getData();
      $('#myForm')[0].reset();
      $('.select2').val('').trigger('change');
      
      const container = document.getElementById('premium-container');
      container.innerHTML = '';
      addPremium();

      resetSteps(); // กลับไปหน้าแรกเสมอเมื่อบันทึกเสร็จ

      if (typeof switchView === 'function') switchView('table-view');

      const Toast = Swal.mixin({
        toast: true, position: 'top-end', showConfirmButton: false,
        timer: 3000, timerProgressBar: true,
        didOpen: (toast) => {
          toast.addEventListener('mouseenter', Swal.stopTimer)
          toast.addEventListener('mouseleave', Swal.resumeTimer)
        }
      });
      Toast.fire({ icon: 'success', title: 'Save successfully' });
    }).withFailureHandler((error) => {
      Swal.fire('ข้อผิดพลาด', 'ไม่สามารถบันทึกข้อมูลได้: ' + (error.message || error), 'error');
    }).saveDataB64(formObj);
  } catch (err) {
    Swal.fire('ข้อผิดพลาด', 'อ่านไฟล์ล้มเหลว: ' + err, 'error');
  }
}

 
// ---- Dynamic Premium Functions ----
function addPremium() {
  const container = document.getElementById('premium-container');
  const div = document.createElement('div');
  div.className = 'input-group mb-2 premium-row';
  
  let selectHTML = '<select class="form-control premium-select select2" name="premium_dynamic">';
  selectHTML += '<option disabled selected value="">เลือกของแถม</option>';
  premiumOptions.forEach(opt => {
    selectHTML += `<option value="${opt[0]}">${opt[0]}</option>`;
  });
  selectHTML += '</select>';
  
  div.innerHTML = selectHTML + '<button class="btn btn-outline-danger" type="button" onclick="removePremium(this)"><i class="fa-solid fa-trash"></i></button>';
  container.appendChild(div);
  
  // Re-initialize select2 for new element
  $(div.querySelector('.select2')).select2({ theme: 'bootstrap-5' });
}

function removePremium(btn) {
  const container = document.getElementById('premium-container');
  if (container.children.length > 1) {
    btn.parentElement.remove();
  } else {
    Swal.fire('แจ้งเตือน', 'ต้องมีของแถมอย่างน้อย 1 ช่อง (หากไม่มีให้เลือก "ไม่มี")', 'warning');
  }
}

// ---- Dropdown Loaders ----
$(document).ready(function() {
  loadAllDropdowns();
  $('.select2').select2({ theme: 'bootstrap-5' });
});

function loadAllDropdowns() {
  google.script.run.withSuccessHandler(function(data) {
    // Location
    let locSelect = document.getElementById("location");
    data.location.forEach(item => {
      let opt = document.createElement("option");
      opt.value = item[0]; opt.text = item[0];
      locSelect.appendChild(opt);
    });

    // Product
    let prodSelect = document.getElementById("productname");
    data.product.forEach(item => {
      let opt = document.createElement("option");
      opt.value = item[0]; opt.text = item[0];
      prodSelect.appendChild(opt);
    });

    // Premium
    premiumOptions = data.premium; // Store globally for addPremium()
    const premSelects = document.querySelectorAll(".premium-select");
    premSelects.forEach(select => {
      data.premium.forEach(item => {
        let opt = document.createElement("option");
        opt.value = item[0]; opt.text = item[0];
        select.appendChild(opt);
      });
    });

    // Guarantee
    let guarSelect = document.getElementById("guarantee");
    data.guarantee.forEach(item => {
      let opt = document.createElement("option");
      opt.value = item[0]; opt.text = item[0];
      guarSelect.appendChild(opt);
    });
  }).getAllDropdownData();
}
</script>

<script>
// ---- General Config Settings ----
function addEmailInput(type, value = '') {
  let container = document.getElementById(type === 'to' ? 'emailToContainer' : 'emailCcContainer');
  let className = type === 'to' ? 'email-to-input' : 'email-cc-input';
  let div = document.createElement('div');
  div.className = "input-group mb-2";
  div.innerHTML = `
    <input type="email" class="form-control ${className}" placeholder="example@gmail.com" value="${value}">
    <button class="btn btn-outline-danger" type="button" onclick="this.parentElement.remove()"><i class="fa-solid fa-minus"></i></button>
  `;
  container.appendChild(div);
}

function loadGeneralConfig() {
  google.script.run.withSuccessHandler(function(config) {
    document.getElementById('notifyNewToken').value = config.notifyNewToken || '';
    document.getElementById('notifyNewChatId').value = config.notifyNewChatId || '';
    document.getElementById('notifyApproveToken').value = config.notifyApproveToken || '';
    document.getElementById('notifyApproveChatId').value = config.notifyApproveChatId || '';
    document.getElementById('driveFolderId').value = config.driveFolderId || '';
    
    let toContainer = document.getElementById('emailToContainer');
    toContainer.innerHTML = '';
    let toEmails = config.emailTo ? config.emailTo.split(',') : [''];
    toEmails.forEach((email, index) => {
       if (index === 0) {
         toContainer.innerHTML = `<input type="email" class="form-control email-to-input mb-2" placeholder="example@gmail.com" value="${email}">`;
       } else {
         addEmailInput('to', email);
       }
    });

    let ccContainer = document.getElementById('emailCcContainer');
    ccContainer.innerHTML = '';
    let ccEmails = config.emailCc ? config.emailCc.split(',') : [''];
    ccEmails.forEach((email, index) => {
       if (index === 0) {
         ccContainer.innerHTML = `<input type="email" class="form-control email-cc-input mb-2" placeholder="example@gmail.com" value="${email}">`;
       } else {
         addEmailInput('cc', email);
       }
    });
  }).getConfigProperties();
}

function saveGeneralConfig() {
  let toEmails = Array.from(document.querySelectorAll('.email-to-input')).map(el => el.value.trim()).filter(v => v !== '');
  let ccEmails = Array.from(document.querySelectorAll('.email-cc-input')).map(el => el.value.trim()).filter(v => v !== '');
  
  let config = {
    notifyNewToken: document.getElementById('notifyNewToken').value,
    notifyNewChatId: document.getElementById('notifyNewChatId').value,
    notifyApproveToken: document.getElementById('notifyApproveToken').value,
    notifyApproveChatId: document.getElementById('notifyApproveChatId').value,
    emailTo: toEmails.join(','),
    emailCc: ccEmails.join(','),
    driveFolderId: document.getElementById('driveFolderId').value
  };
  
  Swal.fire({ title: 'กำลังบันทึก...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
  google.script.run.withSuccessHandler(function() {
    Swal.fire('บันทึกสำเร็จ!', 'อัปเดตการตั้งค่าแล้ว', 'success');
  }).setConfigProperties(config);
}

// ---- Admin Settings Scripts ----

function loadSettingsData(sheetName) {
  google.script.run.withSuccessHandler(function(data) {
    let tbody = document.querySelector('#table-' + sheetName + ' tbody');
    if(!tbody) return;
    tbody.innerHTML = '';
    
    if (data.length === 0) {
      let colCount = sheetName === 'Admin' ? 5 : 2;
      tbody.innerHTML = `<tr><td colspan="${colCount}" class="text-center text-muted">ไม่มีข้อมูล</td></tr>`;
      return;
    }

    data.forEach((row, index) => {
      let tr = document.createElement('tr');
      if (sheetName === 'Admin') {
        tr.innerHTML = `
          <td>${row[0] || ''}</td>
          <td>${row[1] || ''}</td>
          <td>${row[2] || ''}</td>
          <td><span class="badge bg-primary">${row[3] || 'แอดมิน'}</span></td>
          <td class="text-center"><button class="btn btn-sm btn-danger" onclick="deleteSetting('${sheetName}', ${index})"><i class="fa-solid fa-trash"></i></button></td>
        `;
      } else {
        tr.innerHTML = `
          <td>${row[0] || ''}</td>
          <td class="text-center"><button class="btn btn-sm btn-danger" onclick="deleteSetting('${sheetName}', ${index})"><i class="fa-solid fa-trash"></i></button></td>
        `;
      }
      tbody.appendChild(tr);
    });
  }).getSettingsData(sheetName);
}

function loadAllSettings() {
  loadGeneralConfig();
  ['Admin', 'location', 'Product', 'Premium', 'guarantee'].forEach(sheet => loadSettingsData(sheet));
}

// ---- สร้าง Sheet ทั้งหมด ----
function initAllSheets() {
  let btn = document.getElementById('btnInitSheets');
  let resultBox = document.getElementById('initSheetsResult');
  
  // Loading state
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner-border spinner-border-sm me-1"></span> กำลังสร้าง...';
  resultBox.style.display = 'none';

  google.script.run
    .withSuccessHandler(function(results) {
      btn.disabled = false;
      btn.innerHTML = '<i class="fa-solid fa-database"></i> สร้าง Sheet ทั้งหมด &amp; ตั้งหัวตาราง';

      // สร้างตารางผลลัพธ์
      let sheetColors = {
        'Data':      '#1a73e8',
        'Log':       '#34a853',
        'Admin':     '#ea4335',
        'Config':    '#5f6368',
        'location':  '#fbbc04',
        'Product':   '#9334e6',
        'Premium':   '#ff6d00',
        'guarantee': '#00897b'
      };

      let rows = results.map(r => {
        let color = sheetColors[r.name] || '#888';
        let isDone = r.status.includes('✅');
        return `
          <tr>
            <td><span class="badge" style="background:${color};font-size:.8rem;">${r.name}</span></td>
            <td class="${isDone ? 'text-success fw-bold' : 'text-muted'}">${r.status}</td>
          </tr>`;
      }).join('');

      resultBox.innerHTML = `
        <div class="card border-0 shadow-sm">
          <div class="card-header bg-success text-white py-2">
            <i class="fa-solid fa-circle-check"></i> ดำเนินการเสร็จสิ้น
          </div>
          <div class="card-body p-0">
            <table class="table table-sm table-hover mb-0">
              <thead class="table-light">
                <tr><th>Sheet</th><th>ผลลัพธ์</th></tr>
              </thead>
              <tbody>${rows}</tbody>
            </table>
          </div>
        </div>`;
      resultBox.style.display = 'block';

      // Reload settings tables
      loadAllSettings();
    })
    .withFailureHandler(function(error) {
      btn.disabled = false;
      btn.innerHTML = '<i class="fa-solid fa-database"></i> สร้าง Sheet ทั้งหมด &amp; ตั้งหัวตาราง';
      resultBox.innerHTML = `<div class="alert alert-danger"><i class="fa-solid fa-circle-xmark"></i> เกิดข้อผิดพลาด: ${error.message}</div>`;
      resultBox.style.display = 'block';
    })
    .initializeAllSheets();
}


function deleteSetting(sheetName, rowIndex) {
  Swal.fire({
    title: 'ยืนยันการลบ?',
    text: "คุณต้องการลบข้อมูลนี้ใช่หรือไม่!",
    icon: 'warning',
    showCancelButton: true,
    confirmButtonColor: '#d33',
    cancelButtonColor: '#6c757d',
    confirmButtonText: 'ลบข้อมูล'
  }).then((result) => {
    if (result.isConfirmed) {
      Swal.fire({ title: 'กำลังลบ...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
      google.script.run.withSuccessHandler(() => {
        Swal.fire('ลบสำเร็จ!', '', 'success');
        loadSettingsData(sheetName);
      }).deleteSettingData(sheetName, rowIndex);
    }
  });
}

function addSetting(sheetName) {
  let htmlContent = '';
  if (sheetName === 'Admin') {
    htmlContent = `
      <input id="swal-input1" class="swal2-input" placeholder="Username">
      <input id="swal-input2" class="swal2-input" placeholder="Password">
      <input id="swal-input3" class="swal2-input" placeholder="ชื่อผู้ใช้งาน">
      <select id="swal-input4" class="swal2-select w-75 mt-3">
        <option value="พนักงาน">พนักงาน</option>
        <option value="บัญชี">บัญชี</option>
        <option value="แอดมิน">แอดมิน</option>
      </select>
    `;
  } else {
    htmlContent = `<input id="swal-input1" class="swal2-input" placeholder="กรอกข้อมูลใหม่">`;
  }

  Swal.fire({
    title: 'เพิ่มข้อมูล ' + sheetName,
    html: htmlContent,
    focusConfirm: false,
    showCancelButton: true,
    confirmButtonText: 'บันทึก',
    preConfirm: () => {
      if (sheetName === 'Admin') {
        let v1 = document.getElementById('swal-input1').value;
        let v2 = document.getElementById('swal-input2').value;
        let v3 = document.getElementById('swal-input3').value;
        let v4 = document.getElementById('swal-input4').value;
        if (!v1 || !v2 || !v3) { Swal.showValidationMessage('กรุณากรอกข้อมูลให้ครบถ้วน'); return false; }
        return [v1, v2, v3, v4];
      } else {
        let v1 = document.getElementById('swal-input1').value;
        if (!v1) { Swal.showValidationMessage('กรุณากรอกข้อมูล'); return false; }
        return [v1];
      }
    }
  }).then((result) => {
    if (result.isConfirmed) {
      Swal.fire({ title: 'กำลังบันทึก...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
      google.script.run.withSuccessHandler(() => {
        Swal.fire('เพิ่มสำเร็จ!', '', 'success');
        loadSettingsData(sheetName);
      }).addSettingData(sheetName, result.value);
    }
  });
}

// ฟังก์ชั่นสำหรับเปลี่ยนหน้าฟอร์ม (Step-by-step)
function nextStep(current) {
  const stepDiv = document.getElementById('step' + current);
  const inputs = stepDiv.querySelectorAll('input, select, textarea');
  let isValid = true;
  
  // Validate current step
  for (let i = 0; i < inputs.length; i++) {
    if (!inputs[i].checkValidity()) {
      inputs[i].reportValidity();
      isValid = false;
      break;
    }
  }

  if (isValid) {
    stepDiv.style.display = 'none';
    document.getElementById('step' + (current + 1)).style.display = 'block';
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }
}

function prevStep(current) {
  document.getElementById('step' + current).style.display = 'none';
  document.getElementById('step' + (current - 1)).style.display = 'block';
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function resetSteps() {
  document.querySelectorAll('.step-card').forEach(card => card.style.display = 'none');
  document.getElementById('step1').style.display = 'block';
}

// ฟังก์ชั่นคำนวณราคาสุทธิ
function calculateNetPrice() {
  let price = parseFloat(document.getElementById('price').value) || 0;
  let down = parseFloat(document.getElementById('down').value) || 0;
  let discountais = parseFloat(document.getElementById('discountais').value) || 0;
  let discountpromotion = parseFloat(document.getElementById('discountpromotion').value) || 0;
  let discounttradein = parseFloat(document.getElementById('discounttradein').value) || 0;
  let discounttradeup = parseFloat(document.getElementById('discounttradeup').value) || 0;
  let discountbigc = parseFloat(document.getElementById('discountbigc').value) || 0;
  
  let dues = parseFloat(document.getElementById('dues').value) || 0;
  let netprice = price - down - discountais - discountpromotion - discounttradein - discounttradeup - discountbigc + dues;
  document.getElementById('netprice').value = netprice;
}

$(document).ready(function() {
  $('#price, #down, #discountais, #discountpromotion, #discounttradein, #discounttradeup, #discountbigc, #dues').on('input', calculateNetPrice);
});
</script>
