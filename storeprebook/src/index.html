  <script>
    function switchTab(tabId) {
      $('.tab-pane').addClass('hidden');
      $('#' + tabId).removeClass('hidden');
      
      // Update Tab Styling
      $('[id^="nav-"][id$="-tab"]').removeClass('border-emerald-500 text-emerald-600').addClass('border-transparent text-gray-500');
      $('#' + tabId + '-tab').removeClass('border-transparent text-gray-500').addClass('border-emerald-500 text-emerald-600');
    }
  </script>
