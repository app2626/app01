<div class="p-2">
<div class="flex flex-col md:flex-row gap-4">
  <div class="w-full md:w-3/4">
      <table id="datatable" class="display responsive nowrap w-full">
        <thead class="bg-emerald-500 text-white"></thead>
      </table>
  </div>
  <div class="w-full md:w-1/4">
       <h6 class="font-bold mb-3 text-gray-700">รายการเบิก</h6>
          <div id="mycart" class="space-y-2 max-h-[500px] overflow-y-auto mb-4"> </div>
                <div class="flex justify-end space-x-2">
        <button onclick="clearlist()" class="px-3 py-1.5 border border-red-500 text-red-500 hover:bg-red-50 rounded text-xs transition-colors">
          ยกเลิก
        </button>
        <button  class="px-3 py-1.5 bg-emerald-600 hover:bg-emerald-700 text-white rounded text-xs transition-colors flex items-center" onclick="saveForm()">
          ยืนยัน
          <div class="animate-spin h-3 w-3 border-2 border-white border-t-transparent rounded-full ml-1" id="btnSave1" style="display:none"></div>
        </button>
      </div>
  </div>
</div>
</div>


<script>

  let id = ""
   $(document).ready(()=>{
      google.script.run.withSuccessHandler(showTable).getData()
      google.script.run.withSuccessHandler(showTable2).getData()
      google.script.run.withSuccessHandler(populateUserList).getUserList()
      checkSession()
    });

    function checkSession() {
      const session = localStorage.getItem('storeSession')
      if (session) {
        const data = JSON.parse(session)
        document.getElementById('userID').value = data.id_user
        document.getElementById('userID2').value = data.id_user2
        document.getElementById('userID3').value = data.id_user3
        document.querySelector('#showAdmin').innerHTML = data.adminName
        document.querySelector('#showUserDetail').innerHTML = `ผู้เบิก: ${data.id_user2} (${data.id_user3})`
        
        $('#loginPage').hide()
        $('#mainPage').removeClass('hidden')
      }
    }

    function populateUserList(users) {
      let list = document.getElementById('userList');
      list.innerHTML = '';
      users.forEach(user => {
        let option = document.createElement('option');
        option.value = user[0]; // รหัสสาขา
        option.text = user[0] + ' - ' + user[1]; // รหัสสาขา - ชื่อสาขา
        list.appendChild(option);
      });
    }
        
    function getAllData(id){
         $('#loadingOverlay').removeClass('hidden');
         document.getElementById('wsname').value = id
         google.script.run.withSuccessHandler((item) => {
           showTable(item);
           $('#loadingOverlay').addClass('hidden');
         }).getData(id)
         google.script.run.withSuccessHandler(showTable2).getData(id)
      }


  function showTable(item){
   if(item){
      var result = "<div class='overflow-x-auto'>"+
                   "<table class='w-full text-left border-collapse' style='font-size:11px'>"+
                   "<thead style='white-space: nowrap' class='bg-emerald-500 text-white'>"+
                     "<tr>"+ 
                       "<th class='p-2 border border-emerald-400 font-bold'>หมวดหมู่</th>"+
                       "<th class='p-2 border border-emerald-400 font-bold'>รหัสสินค้า</th>"+
                       "<th class='p-2 border border-emerald-400 font-bold'>ชื่อสินค้า</th>"+
                       "<th class='p-2 border border-emerald-400 font-bold'>ยอดคงคลัง</th>"+
                       "<th class='p-2 border border-emerald-400 font-bold'>เบิกได้จริง</th>"+
                       "<th class='p-2 border border-emerald-400 font-bold'>คงเหลือ</th>"+
                     "</tr>"+
                  "</thead>";

           for(var i=0; i<item.length; i++) {
                var maxCount = item[i][5];
                result += "<tr>";
                result += '<td class="p-2 border border-gray-200">'+ (item[i][0]) + '</td>';   
                result += '<td class="p-2 border border-gray-200">'+ (item[i][1]) + '</td>'; 
                result += '<td class="p-2 border border-gray-200">'+ (item[i][2]) + '</td>'; 
                result += '<td class="p-2 border border-gray-200">'+ (item[i][3]) + '</td>'; 
                result += '<td class="p-2 border border-gray-200">'+ (item[i][5]) + '</td>'; 
                if (maxCount > 0){
                result += "<td class='p-2 border border-gray-200'><button type='button' class='px-3 py-1 bg-emerald-50 border border-emerald-200 text-emerald-600 hover:bg-emerald-100 rounded text-xs transition-colors' onclick='editData(this);'><i class='fa fa-edit mr-1'></i> "+ (item[i][6]) +" </button></td>";   
                }else{
                result += '<td class="p-2 border border-gray-200">'+ (item[i][6]) + '</td>'; 
                }
                result += "</tr>";
      }
                result += "</table></div>";
                var div = document.getElementById('datatable').innerHTML = result;
                $(document).ready(function() {
                $('#datatable').DataTable({

      destroy: true,    //ซ่อนคอลัม
        responsive : true,
dom: 'Bfrtip',
        buttons: [
            { text: 'HANDSET',
              action: function ( e, dt, node, config ) {
              getAllData('HANDSET')
                }},
            { text: 'PREMIUM',
              action: function ( e, dt, node, config ) {
              getAllData('PREMIUM')
                }},
            { text: 'NONMOBILE',
              action: function ( e, dt, node, config ) {
              getAllData('NONMOBILE')
                }},
            { text: 'SIMCARD',
              action: function ( e, dt, node, config ) {
              getAllData('SIMCARD')
                }},
            { text: 'FILM',
              action: function ( e, dt, node, config ) {
              getAllData('FILM')
                }},
                
        ],
        columnDefs:[{
          targets: [1,2,5],
          className: 'all',
          },
       ],
order: [[5, 'desc']],

           });
        });
    }
  }


function editData(el){
    productID = el.parentNode.parentNode.cells[1].innerHTML;  
    productName = el.parentNode.parentNode.cells[2].innerHTML;  
    productCount = el.parentNode.parentNode.cells[4].innerHTML;  
    addtocart()
}

var cart = [];
function addtocart() {
    var pass = true;
    for (let i = 0; i < cart.length; i++) {
        if(cart[i].id == productID) {
            cart[i].count++;
            pass = false;
        }
    }
    if(pass) {
        var obj = {
            id: productID,
            name: productName,
            countT: productCount,
            count: 1
        };
        cart.push(obj)
    }
    Swal.fire({
        icon: 'success',
        title: 'เพิ่ม ' + productName + ' ลงรายการเรียบร้อย'
    })
    // $("#cartcount").css('display','flex').text(cart.length)
rendercart();
}


function rendercart() {
    if(cart.length > 0) {
        var html = '';
        for (let i = 0; i < cart.length; i++) {
            html += `<div class="flex flex-col p-3 bg-gray-50 rounded-lg border border-gray-200 mb-2">
                     <p class="font-bold text-gray-800 mb-2">${cart[i].id} : ${cart[i].name}</p>
<div class="flex items-center justify-between">
  <div class="flex items-center space-x-1">
    <button onclick="deinitems('-', ${i})" class="w-8 h-8 flex items-center justify-center bg-red-100 text-red-600 hover:bg-red-200 rounded transition-colors">-</button>
    <input type="number" id="countitems${i}" class="w-12 h-8 border border-gray-300 rounded text-center outline-none focus:ring-1 focus:ring-emerald-500" value="${cart[i].count}" min="1" oninput="updateItemCount(event, ${i})">
    <button onclick="deinitems('+', ${i})" class="w-8 h-8 flex items-center justify-center bg-emerald-100 text-emerald-600 hover:bg-emerald-200 rounded transition-colors">+</button>
  </div>
  <p class="text-xs text-gray-400">สต็อก: ${cart[i].countT}</p>
</div>
</div>`;
        }
        $("#mycart").html(html)
    }
    else {
        $("#mycart").html(`<p>Not found product list</p>`)
    }
}

function deinitems(action, index) {
    if(action == '-') {
        if(cart[index].count > 0) {
            cart[index].count--;
            $("#countitems"+index).text(cart[index].count)

            if(cart[index].count <= 0) {
                Swal.fire({
                    icon: 'warning',
                    title: 'Are you sure to delete?',
                    showConfirmButton: true,
                    showCancelButton: true,
                    confirmButtonText: 'Delete',
                    cancelButtonText: 'Cancel'
                }).then((res) => {
                  if(res.isConfirmed) {
                     cart.splice(index, 1) 
                     console.log(cart)
                     rendercart();
                     $("#cartcount").css('display','flex').text(cart.length)
                     
                     if(cart.length <= 0) {
                        $("#cartcount").css('display','none')
                     }
                  }  
                  else {
                    cart[index].count++;
                    $("#countitems"+index).text(cart[index].count)
                    rendercart();
                  }
                })
            }
            rendercart();
        }
        
    }
    else if(action == '+') {
        cart[index].count++;
        $("#countitems"+index).text(cart[index].count)
        if(cart[index].countT < cart[index].count ){
               Swal.fire(
            'เกินจำนวนที่เบิกได้',
          )
        }else{
        rendercart();
        }
    }
}

function updateItemCount(event, index) {
  cart[index].count = parseInt(event.target.value);
  if(cart[index].countT < cart[index].count ){
        Swal.fire(
            'เกินจำนวนที่เบิกได้',
          )
    cart[index].count = 1
    rendercart();
  }else{
  rendercart();
  }
}

function saveForm(){
var id_user = document.getElementById('userID').value
var id_user2 = document.getElementById('userID2').value
var id_user3 = document.getElementById('userID3').value
var name_user = document.getElementById('showAdmin').innerHTML
$('#btnSave1').show()
if(name_user,id_user2,id_user3 ==""){
       Swal.fire(
            'กรุณาเข้าระบบด้วยรหัสสาขา,ชื่อผู้เบิก,เบอร์โทร',
          )
}else{

     google.script.run.withSuccessHandler(()=>{
        Swal.fire(
            'บันทึกข้อมูลเรียบร้อย',
          )
$('#btnSave1').hide()
          google.script.run.withSuccessHandler(showTable).getData()
          clearlist()
      }).saveData(cart,id_user,id_user2,id_user3,name_user)

}

}

function clearlist() {
    cart = [];
    $("#mycart").html(`<p>โปรดเลือกรายการ</p>`)
}

function searchForm(){
  var id_user = document.getElementById('userID').value
  var id_user2 = document.getElementById('userID2').value
  var id_user3 = document.getElementById('userID3').value
  
  if(id_user == "" || id_user2 == "" || id_user3 == ""){
    Swal.fire('กรุณากรอกข้อมูลให้ครบทุกช่อง', '', 'warning')
    return
  }
  
  $('#spinner2').show()
  $('#loginText').hide()
  
  google.script.run.withSuccessHandler(formserach).readIdUser(id_user)
}

function formserach(result){
    $('#spinner2').hide()
    $('#loginText').show()
    
    if(result != null){
      const id_user = document.getElementById('userID').value
      const id_user2 = document.getElementById('userID2').value
      const id_user3 = document.getElementById('userID3').value
      const adminName = result[1]

      // Save to localStorage
      localStorage.setItem('storeSession', JSON.stringify({
        id_user, id_user2, id_user3, adminName
      }))

      document.querySelector('#showAdmin').innerHTML = adminName
      document.querySelector('#showUserDetail').innerHTML = `ผู้เบิก: ${id_user2} (${id_user3})`
      
      $('#loginPage').hide()
      $('#mainPage').removeClass('hidden').hide().fadeIn()
      
      Swal.fire({
        icon: 'success',
        title: 'ยินดีต้อนรับ',
        text: adminName,
        timer: 1500,
        showConfirmButton: false
      })
    } else {
      Swal.fire('รหัสสาขาไม่ถูกต้อง', 'กรุณาตรวจสอบอีกครั้ง', 'error')
    }
}

function logout(){
  Swal.fire({
    title: 'ยืนยันการออกจากระบบ?',
    icon: 'question',
    showCancelButton: true,
    confirmButtonColor: '#d33',
    cancelButtonColor: '#3085d6',
    confirmButtonText: 'ออกจากระบบ',
    cancelButtonText: 'ยกเลิก'
  }).then((result) => {
    if (result.isConfirmed) {
      localStorage.removeItem('storeSession')
      $('#mainPage').addClass('hidden')
      $('#loginPage').fadeIn()
      document.getElementById('userID').value = ''
      document.getElementById('userID2').value = ''
      document.getElementById('userID3').value = ''
      document.querySelector('#showAdmin').innerHTML = ''
      document.querySelector('#showUserDetail').innerHTML = ''
      clearlist()
    }
  })
}
</script>
