<!-- Tailwind Modal -->
<div id="exampleModal" class="fixed inset-0 z-[60] hidden overflow-y-auto" aria-labelledby="modal-title" role="dialog" aria-modal="true">
  <div class="flex items-end justify-center min-h-screen pt-4 px-4 pb-20 text-center sm:block sm:p-0">
    <!-- Overlay -->
    <div class="fixed inset-0 bg-gray-500 bg-opacity-75 transition-opacity" aria-hidden="true" onclick="closeModal()"></div>

    <span class="hidden sm:inline-block sm:align-middle sm:h-screen" aria-hidden="true">&#8203;</span>

    <div class="inline-block align-bottom bg-white rounded-lg text-left overflow-hidden shadow-xl transform transition-all sm:my-8 sm:align-middle sm:max-w-lg sm:w-full">
      <div class="bg-white px-4 pt-5 pb-4 sm:p-6 sm:pb-4">
        <div class="flex justify-between items-center mb-4">
          <h3 class="text-lg leading-6 font-bold text-gray-900" id="modal-title">แก้ไขข้อมูลสินค้า</h3>
          <button type="button" class="text-gray-400 hover:text-gray-500" onclick="closeModal()">
            <i class='bx bx-x text-2xl'></i>
          </button>
        </div>
        
        <form id="editForm" class="space-y-4" onsubmit="saveFormE(this)">
          <div>
            <label class="block text-gray-700 font-medium mb-1">รหัสสินค้า</label>
            <input type="text" class="w-full p-2 bg-gray-100 border border-gray-300 rounded outline-none" id="data1" name="data1" readonly>
          </div>
          <div>
            <label class="block text-gray-700 font-medium mb-1">ชื่อสินค้า</label>
            <input type="text" class="w-full p-2 bg-gray-100 border border-gray-300 rounded outline-none" id="data2" name="data2" readonly>
          </div>
          <div>
            <label class="block text-gray-700 font-medium mb-1">ยอดคงคลัง</label>
            <input type="text" class="w-full p-2 border border-gray-300 rounded focus:ring-emerald-500 focus:border-emerald-500 outline-none" id="data3" name="data3" oninput="delnum()">
          </div>
          <div>
            <label class="block text-gray-700 font-medium mb-1">ยอดขั้นต่ำ</label>
            <input type="text" class="w-full p-2 border border-gray-300 rounded focus:ring-emerald-500 focus:border-emerald-500 outline-none" id="data4" name="data4" oninput="delnum()">
          </div>
          <div>
            <label class="block text-gray-700 font-medium mb-1">คงเหลือ</label>
            <input type="text" class="w-full p-2 bg-gray-50 border border-gray-300 rounded outline-none" id="data5" name="data5" readonly>
          </div>
          <div class="pt-4 flex justify-end space-x-2">
            <button type="button" class="px-4 py-2 bg-gray-200 hover:bg-gray-300 rounded font-medium transition-colors" onclick="closeModal()">ยกเลิก</button>
            <button type="submit" class="px-4 py-2 bg-emerald-600 hover:bg-emerald-700 text-white rounded font-medium shadow-md transition-colors">ยืนยัน</button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>

<script>
  function openModal() {
    $('#exampleModal').removeClass('hidden');
    $('body').addClass('overflow-hidden');
  }

  function closeModal() {
    $('#exampleModal').addClass('hidden');
    $('body').removeClass('overflow-hidden');
  }

  // Update existing function to open modal manually
  // This will be called by editBtn which was updated in dataReturn.html
  window.addEventListener('click', function(e) {
    if (e.target.classList.contains('editBtn') || e.target.closest('.editBtn')) {
      openModal();
    }
  });

  function saveFormE(obj) { 
        event.preventDefault();
        var cc = document.getElementById('showAdmin').innerHTML
        if(cc !="admin"){
           Swal.fire({
            icon: 'error',
            title: "ไม่อนุญาต",
            text: "กรุณาเข้าระบบ ADMIN"
          })  
        }else{
        google.script.run.withSuccessHandler(()=> {
          google.script.run.withSuccessHandler(showTable).getData()
          google.script.run.withSuccessHandler(showTable2).getData()
          closeModal();
          Swal.fire({
            icon: 'success',
            title: "บันทึกข้อมูลเรียบร้อย"
          })  
           }).editAppData(obj);
        }
      }
</script>
